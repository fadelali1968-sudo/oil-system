function importRafidXLSX(input){
  const file=input.files[0];if(!file||typeof XLSX==='undefined')return;
  const reader=new FileReader();
  reader.onload=async function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    
    // قراءة الرصيد الافتتاحي بدقة
    // هيكل الملف:
    // Row 0: عنوان | col11=رصيد الدينار النهائي | col13=رصيد الدولار النهائي
    // Row 1: رؤوس الأعمدة
    // Row 2: فارغ أو صفر
    // Row 3: "الباقي من شهر X" | col10=مدين دينار | col11=رصيد دولار | col12=رصيد دينار (سالب)
    // Row 4+: البيانات
    let opDinar=0, opDollar=0;
    
    // البحث عن صف "الباقي" في الصفوف الأولى (3-7)
    for(let ri=2;ri<Math.min(rows.length,8);ri++){
      const row=rows[ri];
      const rowStr=row.map(v=>String(v||'')).join('|');
      if(rowStr.includes('الباقي')||rowStr.includes('السابق')||rowStr.includes('مدور')){
        // col12 = رصيد الدينار (القيمة السالبة = مدين)
        const balD=parseFloat(String(row[12]||'').replace(/,/g,''));
        const balDol=parseFloat(String(row[11]||'').replace(/,/g,''));
        if(!isNaN(balD)) opDinar=balD; // نأخذ القيمة كما هي (سالبة أو موجبة)
        if(!isNaN(balDol)) opDollar=balDol;
        break;
      }
    }
    
    // إذا لم نجد صف "الباقي" - نأخذ من Row 0
    if(opDinar===0){
      const row0=rows[0]||[];
      // col11 = رصيد الدينار, col13 = رصيد الدولار
      const d0=parseFloat(String(row0[11]||'').replace(/,/g,''));
      const dl0=parseFloat(String(row0[13]||'').replace(/,/g,''));
      if(!isNaN(d0)&&d0) opDinar=d0;
      if(!isNaN(dl0)) opDollar=dl0;
    }
    
    let list=[],imported=0;
    // البيانات من Row 4 (index 4) - نتجاهل صفوف الرصيد السابق
    const dataStartRow=4; // بعد الرأس وصف الباقي
    for(let r=dataStartRow;r<rows.length;r++){
      const row=rows[r];
      const num=parseFloat(String(row[0]||''));
      if(!num||isNaN(num))continue;
      
      // التاريخ
      let date='';
      const rawDate=row[1];
      if(rawDate instanceof Date){
        date=rawDate.toISOString().split('T')[0];
      } else {
        const ds=String(rawDate||'').trim();
        const m1=ds.match(/^(\d{4})-(\d{2})-(\d{2})/);
        const m2=ds.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        const m3=ds.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if(m1)date=m1[1]+'-'+m1[2]+'-'+m1[3];
        else if(m2)date=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
        else if(m3)date=m3[3]+'-'+m3[2].padStart(2,'0')+'-'+m3[1].padStart(2,'0');
        else{const n=parseFloat(ds);if(!isNaN(n)&&n>40000){const d2=new Date((n-25569)*86400*1000);date=d2.toISOString().split('T')[0];}}
      }
      
      const desc=String(row[2]||'').trim();
      const benef=String(row[3]||'').trim();
      const recv=String(row[4]||'').trim();
      
      // المبالغ - من الأعمدة المباشرة
      const dainDol=parseFloat(String(row[7]||'').replace(/,/g,''))||0;
      const madinDol=parseFloat(String(row[8]||'').replace(/,/g,''))||0;
      const dainDin=parseFloat(String(row[9]||'').replace(/,/g,''))||0;
      const madinDin=parseFloat(String(row[10]||'').replace(/,/g,''))||0;
      const opType=String(row[13]||'').trim();
      // العمولات - الأعمدة 14 و 15
      const commDinar=parseFloat(String(row[14]||'').replace(/,/g,''))||0;
      const commDollar=parseFloat(String(row[15]||'').replace(/,/g,''))||0;
      
      if(!dainDin&&!madinDin&&!dainDol&&!madinDol&&!desc)continue;
      
      const dinar=dainDin||madinDin||0;
      const dollar=dainDol||madinDol||0;
      
      const entry={
        id:'rf_xl_'+r+'_'+Date.now(),
        date, description:desc, beneficiary:benef, receiver:recv,
        op_type:opType,
        dinar, type_dinar:dainDin>0?'دائن':'مدين',
        dollar, type_dollar:dainDol>0?'دائن':'مدين',
        commission:commDinar, commission_dollar:commDollar,
        accountant:'import', time:Date.now()+r
      };
      list.push(entry);
      imported++;
    }

    if(!list.length){showToast('لم يتم العثور على بيانات صالحة في الملف','error');return;}

    // تحديد الشهر المستهدف: الشهر الأكثر تكراراً في البيانات (لتجنب خلل تاريخ يوم 31 من الشهر السابق)
    list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const _monthCounts={};
    list.forEach(e=>{if(e.date){const m=e.date.slice(0,7);_monthCounts[m]=(_monthCounts[m]||0)+1;}});
    const targetMonth=Object.entries(_monthCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'';
    if(!targetMonth){showToast('لا يمكن تحديد شهر الملف — تأكد من صحة عمود التاريخ','error');return;}

    // حذف سجلات الشهر المستهدف فقط من البيانات الحالية
    let existing=DB.get('rafid_accounts',[]);
    const toDelete=existing.filter(e=>(e.date||'').startsWith(targetMonth));
    toDelete.forEach(e=>{try{FDB.delete('rafid_accounts',e.id);}catch(err){}});
    existing=existing.filter(e=>!(e.date||'').startsWith(targetMonth));

    // دمج الشهر الجديد مع باقي الأشهر
    const allRafid=[...existing,...list];
    allRafid.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));

    // تحديث الرصيد الافتتاحي فقط إذا كان الشهر المستورد هو الأقدم في النظام
    const firstMonth=allRafid.find(e=>e.date)?.date?.slice(0,7)||'';
    const shouldUpdateOpening=(opDinar!==0||opDollar!==0)&&targetMonth===firstMonth;
    if(shouldUpdateOpening) DB.set('rafid_opening',{dinar:opDinar,dollar:opDollar});

    DB.set('rafid_accounts',allRafid);
    DB.set('rafid_cleared',false);
    renderContent();
    showToast('⏳ جاري الحفظ في السحابة...','info',3000);
    try{
      const saves=list.map(k=>FDB.save('rafid_accounts',k.id,k));
      if(shouldUpdateOpening) saves.push(FDB.save('rafid_opening','opening',{dinar:opDinar,dollar:opDollar}));
      await Promise.all(saves);
      showToast('✅ تم استيراد '+imported+' حركة لشهر '+targetMonth+' وحفظها في السحابة ☁️','success',5000);
    }catch(err){showToast('✅ تم الاستيراد محلياً | ⚠️ فشل الحفظ في السحابة','warning',5000);}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

const REFINERY_PRICE_PER_KG = 42;

// خريطة أسماء الأشهر العربية/السريانية إلى أرقامها
const ARABIC_MONTH_MAP = {
  'كانون الثاني':1,'يناير':1,
  'شباط':2,'فبراير':2,
  'آذار':3,'مارس':3,
  'نيسان':4,'أبريل':4,'ابريل':4,
  'أيار':5,'مايو':5,
  'حزيران':6,'يونيو':6,
  'تموز':7,'يوليو':7,
  'آب':8,'أغسطس':8,
  'أيلول':9,'سبتمبر':9,
  'تشرين الأول':10,'أكتوبر':10,
  'تشرين الثاني':11,'نوفمبر':11,
  'كانون الأول':12,'ديسمبر':12
};
function extractMonthFromDesc(desc){
  const norm=desc.replace(/[أإآ]/g,'ا');
  for(const [name,num] of Object.entries(ARABIC_MONTH_MAP)){
    if(norm.includes(name.replace(/[أإآ]/g,'ا'))) return num;
  }
  return null;
}

// جلب مبالغ المصفى من سجلات الكروب
// يطابق على حقل الجهة المستفيدة أو حقل البيان، ويفلتر بتاريخ الحركة الفعلي
function getKroobRefineryPayments(refineryName, wFrom, wTo){
  const kroob=DB.get('kroob',[]);
  const byDate={};
  const details={};

  kroob.forEach(k=>{
    const benefMatch = (k.beneficiary||'').trim() === refineryName.trim();
    const descMatch  = (k.description||'').includes(refineryName.trim());
    if(!benefMatch && !descMatch) return;
    if((k.type_dinar||'مدين')!=='مدين') return;

    // فلترة بالتاريخ الفعلي للحركة
    if(wFrom && (k.date||'') < wFrom) return;
    if(wTo   && (k.date||'') > wTo)   return;

    const date=k.date||'';
    const amt=parseFloat(k.amount_dinar||0);
    if(!byDate[date])byDate[date]=0;
    byDate[date]+=amt;
    if(!details[date])details[date]=[];
    details[date].push({desc:k.description,amt,date});
  });
  return {byDate, details};
}

function saveRefineryReceived(refinery,date,value){
  let data=DB.get('refinery_received',{});
  if(!data[refinery])data[refinery]={};
  data[refinery][date]={amount:parseFloat(value)||0,updated:Date.now()};
  DB.set('refinery_received',data);
  FDB.save('refinery_received',refinery.replace(/\s+/g,'_')+'_'+date,{refinery,date,amount:parseFloat(value)||0});
}

function sendRefineryWhatsapp(){
  var entries=DB.get('entries',[]);
  var wf=S.wFrom,wt=S.wTo;
  var NL='\n';
  var periodLabel=wf&&wt?(wf+' -> '+wt):wf?('من '+wf):wt?('إلى '+wt):'الكلي';
  var sep='─────────────────────────';
  var lines=[];
  lines.push('🏭 حساب المصفى');
  lines.push('📅 الفترة: '+periodLabel);
  lines.push(sep);
  var refineries=['مصفى كربلاء','مصفى صلاح الدين'];
  refineries.forEach(function(ref){
    var list=entries.filter(function(e){return e.refinery===ref;});
    if(wf)list=list.filter(function(e){return e.date>=wf;});
    if(wt)list=list.filter(function(e){return e.date<=wt;});
    if(!list.length)return;
    var totalKg=list.reduce(function(s,e){return s+parseFloat(e.weight_kg||0);},0);
    var grandAmount=Math.round(totalKg*REFINERY_PRICE_PER_KG);
    var kroobData=getKroobRefineryPayments(ref, wf, wt);
    var grandReceived=Object.values(kroobData.byDate).reduce(function(s,v){return s+v;},0);
    var grandRemaining=grandAmount-grandReceived;
    lines.push('');
    lines.push('🏭 *'+ref+'*');
    lines.push('🚛 السيارات: '+list.length);
    lines.push('⚖️ الكغم: '+fmt(totalKg));
    lines.push('💰 المبلغ المستحق: '+fmtM(grandAmount)+' د.ع');
    lines.push('✅ المستلم: '+fmtM(grandReceived)+' د.ع');
    lines.push((grandRemaining>0?'⚠️':'✅')+' المتبقي: '+fmtM(Math.abs(grandRemaining))+' د.ع '+(grandRemaining>0?'(غير مسوى)':'(مسوى)'));
    lines.push(sep);
  });
  lines.push('✅ نظام المراقبة v44.0');
  var msg=lines.join(NL);
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(function(){showToast('تم نسخ نص الواتساب','success');}).catch(function(){});
  } else {
    var ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('تم نسخ نص الواتساب','success');
  }
}

function generateRefineryPDF(refineryName){
  const entries=DB.get('entries',[]);
  const wf=S.wFrom,wt=S.wTo;
  let list=entries.filter(e=>(e.refinery||'').trim()===refineryName);
  if(wf)list=list.filter(e=>e.date>=wf);
  if(wt)list=list.filter(e=>e.date<=wt);
  const color=refineryName==='مصفى كربلاء'?'#b45309':'#1e3a8a';
  const periodLabel=wf&&wt?(wf+' → '+wt):wf?('من '+wf):wt?('إلى '+wt):'الكلي';
  const byFactory={};
  list.forEach(e=>{
    const f=e.factory||'غير محدد';
    if(!byFactory[f])byFactory[f]={cars:0,kg:0,amount:0};
    byFactory[f].cars++;
    byFactory[f].kg+=parseFloat(e.weight_kg||0);
    byFactory[f].amount+=Math.round(parseFloat(e.weight_kg||0)*REFINERY_PRICE_PER_KG);
  });
  const kroobData=getKroobRefineryPayments(refineryName,wf,wt);
  const grandKg=list.reduce((s,e)=>s+parseFloat(e.weight_kg||0),0);
  const grandAmount=Math.round(grandKg*REFINERY_PRICE_PER_KG);
  const grandReceived=Object.values(kroobData.byDate).reduce((s,v)=>s+v,0);
  const grandRemaining=grandAmount-grandReceived;
  const dataRows=Object.keys(byFactory).map((f,i)=>{
    const d=byFactory[f];
    return`<tr><td>${i+1}</td><td>${f}</td><td>${d.cars}</td><td>${fmt(d.kg)}</td><td>${fmtM(d.amount)}</td><td>—</td><td>—</td></tr>`;
  }).join('');
  const totalRow=`<tr style="background:${color};color:#fff;font-weight:900"><td colspan="2">الإجمالي — ${list.length} سيارة</td><td></td><td>${fmt(grandKg)} كغم</td><td>${fmtM(grandAmount)}</td><td>${fmtM(grandReceived)}</td><td>${fmtM(Math.abs(grandRemaining))} ${grandRemaining>0?'(غير مسوى)':'(مسوى)'}</td></tr>`;
  const printWin=window.open('','_blank');
  if(!printWin){showToast('يرجى السماح بفتح النوافذ المنبثقة','error');return;}
  printWin.document.write(`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>${refineryName}</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Cairo',sans-serif;direction:rtl;padding:20px;color:#000;}.header{text-align:center;border-bottom:3px solid ${color};padding-bottom:14px;margin-bottom:18px;}h1{font-size:20px;font-weight:900;color:${color};}p{font-size:12px;color:#333;margin-top:5px;font-weight:700;}table{width:100%;border-collapse:collapse;font-size:12px;border:2px solid #000;}th{background:#fff;color:#000;padding:9px 6px;text-align:center;font-weight:900;border:2px solid #000;}td{padding:7px 6px;text-align:center;border:2px solid #000;color:#000;font-weight:700;}@media print{body{padding:10px;}}</style></head><body><div class="header"><h1>🏭 ${refineryName}</h1><p>الفترة: ${periodLabel} | عدد السيارات: ${list.length} | ${new Date().toLocaleString('ar-IQ')}</p></div><table><thead><tr><th>ت</th><th>المعمل</th><th>السيارات</th><th>الكغم</th><th>المبلغ المستحق</th><th>المستلم</th><th>المتبقي</th></tr></thead><tbody>${dataRows}${totalRow}</tbody></table><script>window.onload=()=>{window.print();};<\/script></body></html>`);

async function changeMyPassword(){
  const oldPass=gv('chg_old'), newPass=gv('chg_new'), confirm=gv('chg_confirm');
  const msg=document.getElementById('chg-msg');
  const show=(text,color)=>{msg.style.display='block';msg.style.background=color==='red'?'#fef2f2':'#f0fdf4';msg.style.color=color==='red'?'#dc2626':'#059669';msg.textContent=text;};
  if(!oldPass||!newPass||!confirm){show('يرجى تعبئة جميع الحقول','red');return;}
  if(newPass.length<6){show('كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل','red');return;}
  if(newPass!==confirm){show('كلمة المرور الجديدة وتأكيدها غير متطابقتين','red');return;}
  try{
    // Firebase Auth هو المرجع الحقيقي — نتحقق منه أولاً
    if(window._auth){
      const {auth,reauthenticateWithCredential,EmailAuthProvider,updatePassword:fbUpdatePw}=window._auth;
      const fbUser=auth.currentUser;
      if(fbUser){
        const cred=EmailAuthProvider.credential(currentUser.email,oldPass);
        await reauthenticateWithCredential(fbUser,cred);
        await fbUpdatePw(fbUser,newPass);
      }
    }
    // تحديث الهاش في localStorage وFirestore ليتزامنا مع Firebase Auth
    const users=DB.get('users',{});
    const k=uid(currentUser.email);
    const newHash=await hashPassword(newPass);
    if(users[k]){users[k].password=newHash;DB.set('users',users);await FDB.save('users',k,users[k]);}
    document.getElementById('chg_old').value='';
    document.getElementById('chg_new').value='';
    document.getElementById('chg_confirm').value='';
    show('✅ تم تغيير كلمة المرور بنجاح','green');
  } catch(err){
    if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential')show('كلمة المرور الحالية غير صحيحة','red');
    else show('حدث خطأ: '+err.message,'red');
  }
}

async function addUser(){
  const email=gv('new_email'),pass=gv('new_pass'),role=gv('new_role'),factory=gv('new_factory_sel');
  if(!email||!pass){showToast('البريد وكلمة السر مطلوبان','error');return;}
  if(pass.length<6){showToast('كلمة السر يجب أن تكون 6 أحرف على الأقل','error');return;}
  const addBtn=document.querySelector('button[onclick="addUser()"]');
  if(addBtn){addBtn.textContent='⏳ جاري الإنشاء...';addBtn.disabled=true;}
  try{
    // إنشاء حساب Firebase Auth
    if(window._auth){
      const {auth,createUserWithEmailAndPassword:cup}=window._auth;
      await cup(auth,email,pass);
    }
    // حفظ بيانات المستخدم في Firestore
    const k=uid(email);
    const hash=await hashPassword(pass);
    let users=DB.get('users',{});
    users[k]={email,password:hash,role,factory,createdAt:Date.now()};
    DB.set('users',users);
    await FDB.save('users',k,users[k]);
    auditLog('إضافة مستخدم', `${email} | الدور: ${role} | المعمل: ${factory}`);
    showToast('✅ تم إنشاء الحساب في Firebase Auth وحفظ بياناته','success');
    setTimeout(()=>{if(addBtn){addBtn.textContent='إضافة المستخدم';addBtn.disabled=false;}renderContent();},800);
  } catch(err){
    let msg='خطأ في إنشاء الحساب';
    if(err.code==='auth/email-already-in-use')msg='هذا البريد مسجل مسبقاً في Firebase Auth';
    else if(err.code==='auth/weak-password')msg='كلمة السر ضعيفة جداً';
    else if(err.code==='auth/invalid-email')msg='البريد الإلكتروني غير صحيح';
    showToast(msg,'error');
    if(addBtn){addBtn.textContent='إضافة المستخدم';addBtn.disabled=false;}
  }
}

function exportBackup(){

  const backup={_version:44,_date:new Date().toISOString()};
  keys.forEach(k=>{backup[k]=DB.get(k,null);});
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date().toLocaleDateString('ar-IQ').replace(/\//g,'-');
  a.download='backup_oil_'+d+'.json';
  a.click();
  showToast('تم تصدير النسخة الاحتياطية بنجاح','success');
}

async function restoreFromBackup(input){

async function clearTypeData(factory,type){
  const typeLabel=type==='purchases'?'المشتريات':'المبيعات';
  if(!confirm('مسح '+typeLabel+' لمعمل: '+factory+'?'))return;
  if(!confirm('تأكيد نهائي: مسح '+typeLabel+' لـ "'+factory+'" ؟'))return;
  
  const col=type==='purchases'?'entries':'sales';
  const key=type==='purchases'?'entries':'sales';
  
  // خطوة 1: مسح من localStorage أولاً
  const localData=DB.get(key,[]);
  const toDelete=localData.filter(x=>x.factory===factory);
  const remaining=localData.filter(x=>x.factory!==factory);
  DB.set(key,remaining);
  
  // خطوة 2: مسح من Firebase
  let fbDeleted=0;
  if(window._fbReady){
    try{
      const {db,collection:col2,getDocs,deleteDoc,doc}=window._fb;
      const snap=await getDocs(col2(db,col));
      const toDelFB=snap.docs.filter(d=>d.data().factory===factory);
      fbDeleted=toDelFB.length;
      // حذف على دفعات
      const batchSize=20;
      for(let i=0;i<toDelFB.length;i+=batchSize){
        const batch=toDelFB.slice(i,i+batchSize);
        await Promise.all(batch.map(d=>deleteDoc(doc(db,col,d.id))));
      }
    }catch(e){console.warn('Firebase delete error:',e);}
  }
  
  showToast('تم مسح '+toDelete.length+' سجل من '+factory,'success');
  renderContent();
}

function _applyAuditFilter(){
  const fromVal = document.getElementById('al_from')?.value;
  const toVal   = document.getElementById('al_to')?.value;
  const action  = document.getElementById('al_action')?.value || '';
  const user    = document.getElementById('al_user')?.value   || '';
  const fromTs  = fromVal ? new Date(fromVal).setHours(0,0,0,0)   : 0;
  const toTs    = toVal   ? new Date(toVal).setHours(23,59,59,999) : Infinity;
  const rows = document.querySelectorAll('#audit_tbody tr');
  let visible = 0;
  rows.forEach(row => {
    const ts  = parseInt(row.dataset.ts) || 0;
    const act = row.dataset.action || '';
    const usr = row.dataset.user   || '';
    const show = ts >= fromTs && ts <= toTs && (!action || act === action) && (!user || usr === user);
    row.style.display = show ? '' : 'none';
    if(show) visible++;
  });
  const counter = document.getElementById('al_count');
  if(counter) counter.textContent = visible + ' سجل';
  const empty = document.getElementById('al_empty');
  if(empty) empty.style.display = visible === 0 ? 'block' : 'none';
}
function _resetAuditFilter(){
  ['al_from','al_to'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  ['al_action','al_user'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  _applyAuditFilter();
}

function addNotif(title,msg){const all=DB.get('notifs',[]);all.push({id:'n_'+Date.now(),title,msg,time:Date.now(),read:false});DB.set('notifs',all.slice(-50));initNotifications();}

// ===== قائمة السائقين =====
function showDriversList(inputId,carId,locId){
  const drivers=DB.get('drivers',{});const list=Object.values(drivers);if(!list.length)return;
  const old=document.getElementById('drv-drop');if(old)old.remove();
  const input=el(inputId);if(!input)return;
  const rect=input.getBoundingClientRect();
  const drop=document.createElement('div');
  drop.id='drv-drop';
  drop.style.cssText=`position:fixed;top:${rect.bottom+2}px;right:${window.innerWidth-rect.right}px;width:${Math.max(rect.width,200)}px;background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:99999;max-height:220px;overflow-y:auto;`;
  const filter=(input.value||'').toLowerCase();
  const filtered=filter?list.filter(d=>(d.name||'').toLowerCase().includes(filter)||(d.car_no||'').toLowerCase().includes(filter)):list;
  if(!filtered.length){const empty=document.createElement('div');empty.style.cssText='padding:12px;text-align:center;color:#94a3b8;font-size:12px';empty.textContent='لا توجد نتائج';drop.appendChild(empty);}
  filtered.slice(0,50).forEach(d=>{
    const item=document.createElement('div');item.style.cssText='padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9';
    item.innerHTML=`<div style="font-size:13px;font-weight:900;color:#0f172a">${d.name||''}</div><div style="font-size:10px;color:#64748b;margin-top:2px">🚗 ${d.car_no||'—'} | 📍 ${d.location||'—'}</div>`;
    item.onmouseover=()=>item.style.background='#eff6ff';item.onmouseout=()=>item.style.background='';
    item.onmousedown=(ev)=>{ev.preventDefault();input.value=d.name||'';const c=el(carId),l=el(locId);if(c)c.value=d.car_no||'';if(l)l.value=d.location||'';drop.remove();};
    drop.appendChild(item);
  });
  document.body.appendChild(drop);
  input.addEventListener('input',()=>{drop.remove();showDriversList(inputId,carId,locId);},{once:true});
  input.addEventListener('blur',()=>setTimeout(()=>{const d=document.getElementById('drv-drop');if(d)d.remove();},200),{once:true});
}

function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)">
    <div style="background:#fff;border-radius:20px;padding:40px;width:360px;box-shadow:0 25px 60px rgba(0,0,0,.3)">
      <div style="text-align:center;margin-bottom:28px">
        <div style="width:60px;height:60px;background:#2563eb;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;margin:0 auto 12px">HFO</div>
        <h2 style="font-size:18px;font-weight:900;color:#0f172a">نظام المشتريات النفطية</h2>
        <p style="font-size:12px;color:#94a3b8;margin-top:4px">إدارة المشتريات النفطية</p>
      </div>
      <div style="margin-bottom:14px"><label class="lbl">📧 البريد الإلكتروني</label><input class="inp" id="login_email" type="email" placeholder="user@example.com" style="font-size:14px"></div>
      <div style="margin-bottom:20px"><label class="lbl">🔐 كلمة السر</label><input class="inp" id="login_pass" type="password" placeholder="••••••••" style="font-size:14px" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-blue" style="width:100%;padding:12px;font-size:15px" onclick="doLogin()">🚀 تسجيل الدخول</button>
      <div style="margin-top:10px;background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:10px;color:#1e40af;font-weight:700;text-align:center">🔐 مؤمّن بـ Firebase Authentication</div>
    </div>
  </div>`;
}

async function doLogin(){
  const email=gv('login_email'),pass=gv('login_pass');
  if(!email||!pass){showToast('يرجى إدخال البريد وكلمة السر','error');return;}
  const loginBtn=document.querySelector('button[onclick="doLogin()"]');
  if(loginBtn){loginBtn.textContent='⏳ جاري التحقق...';loginBtn.disabled=true;}
  try{
    // Firebase Auth أولاً
    if(window._auth){
      const {auth,signInWithEmailAndPassword:sip}=window._auth;
      await sip(auth,email,pass);
    }
    // بعد نجاح Firebase Auth، نحمّل بيانات المستخدم من localStorage/Firestore
    const users=DB.get('users',{});const k=uid(email);
    let user=users[k];
    if(!user){
      // حاول جلبه من Firebase
      const fbUsers=await FDB.getAll('users');
      if(fbUsers){const found=fbUsers.find(u=>u.email===email);if(found){user=found;const obj={};fbUsers.forEach(u=>{if(u.email)obj[uid(u.email)]=u;});DB.set('users',obj);}}
    }
    if(!user){showToast('المستخدم غير موجود في النظام — راجع المدير','error');if(loginBtn){loginBtn.textContent='🚀 تسجيل الدخول';loginBtn.disabled=false;}return;}
    currentUser=_userGuard.seal({...user,uid:k});
    S.selectedFactory=user.factory==='الكل'?'الكل':(user.factory||'الكل');
    DB.set('last_user',currentUser);
    auditLog('تسجيل دخول', `${email}`);
    if(isManager())syncFromCloud().then(()=>render());
    else render();
  } catch(err){
    let msg='خطأ في تسجيل الدخول';
    if(err.code==='auth/user-not-found'||err.code==='auth/invalid-credential')msg='البريد الإلكتروني أو كلمة السر غير صحيحة';
    else if(err.code==='auth/wrong-password')msg='كلمة السر غير صحيحة';
    else if(err.code==='auth/too-many-requests')msg='تم حظر الحساب مؤقتاً — حاول لاحقاً';
    else if(err.code==='auth/network-request-failed')msg='تحقق من الاتصال بالإنترنت';
    showToast(msg,'error');
    if(loginBtn){loginBtn.textContent='🚀 تسجيل الدخول';loginBtn.disabled=false;}
  }
}

function logout(){
  auditLog('تسجيل خروج', currentUser?.email||'');
  // Firebase Auth signOut
  if(window._auth){try{window._auth.signOut(window._auth.auth);}catch(e){}}
  currentUser=null;DB.set('last_user',null);
  S={view:'dashboard',selectedFactory:'الكل',filterFrom:'',filterTo:'',editEntry:null,editSale:null,wFrom:'',wTo:'',pSearch:'',pRefinery:'',pType:'',sSearch:'',sTypeFilter:'',salafPerson:'',salafEditId:'',salafTab:'manual',salafMonthFilter:'',salafSettlementMonth:'',expFactory:'',expEditId:'',expDate:'',expDinar:0,expDollar:0,expDetails:'',expMonth:'',kroobEditId:'',kroobSearch:'',kroobSearchAll:false,rafidEditId:'',rafidSearch:'',rafidSearchAll:false,kroobPdfData:null,rafidPdfData:null,kroobPdfFrom:'',kroobPdfTo:'',rafidPdfFrom:'',rafidPdfTo:''};
  renderLogin();
}

// ===== Session Timeout (30 دقيقة خمول) =====
(function(){
  const TIMEOUT_MS  = 30 * 60 * 1000;   // 30 دقيقة
  const WARNING_MS  =  1 * 60 * 1000;   // تحذير قبل دقيقة واحدة
  let _timer, _warnTimer, _warnShown = false;

  function _resetTimers(){
    if(!currentUser) return;
    clearTimeout(_timer);
    clearTimeout(_warnTimer);
    _warnShown = false;
    const warnEl = document.getElementById('_session_warn');
    if(warnEl) warnEl.remove();

    _warnTimer = setTimeout(()=>{
      if(!currentUser || _warnShown) return;
      _warnShown = true;
      const div = document.createElement('div');
      div.id = '_session_warn';
      div.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#7f1d1d;color:#fff;padding:12px 24px;border-radius:12px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;z-index:99999;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:12px;';
      div.innerHTML = '⚠️ سيتم تسجيل خروجك تلقائياً خلال دقيقة واحدة بسبب الخمول <button onclick="document.getElementById(\'_session_warn\').remove()" style="background:#fff;color:#7f1d1d;border:none;border-radius:6px;padding:4px 10px;font-weight:900;cursor:pointer;font-family:Cairo,sans-serif">تمديد</button>';
      div.querySelector('button').addEventListener('click', _resetTimers);
      document.body.appendChild(div);
    }, TIMEOUT_MS - WARNING_MS);

    _timer = setTimeout(()=>{
      if(!currentUser) return;
      const warnEl = document.getElementById('_session_warn');
      if(warnEl) warnEl.remove();
      showToast('تم تسجيل خروجك تلقائياً بسبب الخمول','error');
      setTimeout(logout, 1500);
    }, TIMEOUT_MS);
  }

  ['mousemove','keydown','mousedown','touchstart','scroll','click'].forEach(ev =>
    document.addEventListener(ev, _resetTimers, {passive:true})
  );

  const _origRender = window.render;
  window.render = function(){ if(typeof _origRender==='function') _origRender(); _resetTimers(); };
  const _origLogout = window.logout;
  window.logout = function(){ clearTimeout(_timer); clearTimeout(_warnTimer); const w=document.getElementById('_session_warn'); if(w)w.remove(); if(typeof _origLogout==='function') _origLogout(); };
})();

// ===== التشغيل الرئيسي =====
document.addEventListener('fb-ready', function(){
  const lastUser=DB.get('last_user',null);
  if(lastUser&&lastUser.email){
    const users=DB.get('users',{});const k=uid(lastUser.email);const fresh=users[k];
    const sealed=_userGuard.seal(fresh?{...lastUser,role:fresh.role,permissions:fresh.permissions,factory:fresh.factory}:lastUser);
    currentUser=sealed;
    if(isManager())syncFromCloud().then(()=>render());else render();
  }
  else renderLogin();
  // مزامنة المعامل من Firebase
  FDB.getAll('users').then(users=>{if(users&&users.length){const obj={};users.forEach(u=>{if(u.email)obj[uid(u.email)]=u;});const local=DB.get('users',{});const merged={...local,...obj};DB.set('users',merged);}});
});

// تشغيل فوري لو Firebase تأخر
setTimeout(()=>{
  if(!window._fbReady){const lastUser=DB.get('last_user',null);if(lastUser&&lastUser.email){const users=DB.get('users',{});const k=uid(lastUser.email);const fresh=users[k];currentUser=_userGuard.seal(fresh?{...lastUser,role:fresh.role,permissions:fresh.permissions,factory:fresh.factory}:lastUser);render();}else renderLogin();}
},3000);
