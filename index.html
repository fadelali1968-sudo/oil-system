  set(key, val) { try { localStorage.setItem('oil_'+key, JSON.stringify(val)); } catch {} }
};

const FDB = {
  async save(col, id, data) {
    try { if(!window._fbReady) return; const {db,doc,setDoc}=window._fb; await setDoc(doc(db,col,id),{...data,_updated:Date.now()}); } catch(e) { console.warn('FDB.save error:',e); }
  },
  async delete(col, id) {
    try { if(!window._fbReady) return; const {db,doc,deleteDoc}=window._fb; await deleteDoc(doc(db,col,id)); } catch(e) { console.warn('FDB.delete error:',e); }
  },
  async getAll(col) {
    try { if(!window._fbReady) return null; const {db,collection,getDocs}=window._fb; const snap=await getDocs(collection(db,col)); return snap.docs.map(d=>d.data()); } catch(e) { return null; }
  },
  listen(col, cb) {
    try { if(!window._fbReady){setTimeout(()=>this.listen(col,cb),1000);return;} const {db,collection,onSnapshot}=window._fb; return onSnapshot(collection(db,col),snap=>{cb(snap.docs.map(d=>d.data()));}); } catch(e) {}
  }
};

async function syncFromCloud(silent=false) {
  try {
    const [entries,sales,drivers,salaf] = await Promise.all([FDB.getAll('entries'),FDB.getAll('sales'),FDB.getAll('drivers'),FDB.getAll('salaf')]);
    // المزامنة الذكية: localStorage يفوز إذا كان أحدث أو متطابق
    // المزامنة: Firebase هو المصدر الوحيد للحقيقة - نستبدل localStorage كاملاً
    if(Array.isArray(entries)){
      const byId={};entries.forEach(e=>{byId[e.id]=e;});
      DB.set('entries',Object.values(byId));
    }
    if(Array.isArray(sales)){
      const byId={};sales.forEach(s=>{byId[s.id]=s;});
      DB.set('sales',Object.values(byId));
    }
    if(Array.isArray(salaf)) DB.set('salaf',salaf);
    const expenses=await FDB.getAll('expenses');
    if(expenses&&expenses.length){
      const tombstones=DB.get('deleted_expense_ids',[]);
      const localExp=DB.get('expenses',[]);
      // دمج بدلاً من استبدال: الاحتفاظ بالأحدث لكل ID
      const merged={};
      localExp.forEach(function(e){if(e.id)merged[e.id]=e;});
      expenses.forEach(function(e){if(!e.id)return;if(!merged[e.id]||(e._updated||0)>(merged[e.id]._updated||0))merged[e.id]=e;});
      const filtered=Object.values(merged).filter(function(e){return!tombstones.includes(e.id);});
      filtered.sort(function(a,b){return(a.factory+'_'+(a.date||'')).localeCompare(b.factory+'_'+(b.date||''));});
      DB.set('expenses',filtered);
    }
    // الكروب: نتجاهل Firebase إذا تم الحذف محلياً مؤخراً
    if(!DB.get('kroob_cleared',false)){
      const kroob=await FDB.getAll('kroob'); if(kroob&&kroob.length) DB.set('kroob',kroob);
      const kroobOpArr=await FDB.getAll('kroob_opening'); if(kroobOpArr&&kroobOpArr.length){const op=kroobOpArr.find(x=>x.id==='opening')||kroobOpArr[0];if(op)DB.set('kroob_opening',{dinar:parseFloat(op.dinar||0),dollar:parseFloat(op.dollar||0)});}
      const kroobMonthOp=await FDB.getAll('kroob_month_openings'); if(kroobMonthOp&&kroobMonthOp.length){const map=DB.get('kroob_month_openings',{});kroobMonthOp.forEach(x=>{if(x.id)map[x.id]={dinar:x.dinar,dollar:x.dollar};});DB.set('kroob_month_openings',map);}
    }
    if(drivers&&drivers.length){const drObj={};drivers.forEach(d=>{if(d.name)drObj[d.name]=d;});DB.set('drivers',drObj);}
    // مزامنة حسابات سيد رافد
    // رافد: نتجاهل Firebase إذا تم الحذف محلياً مؤخراً
    if(!DB.get('rafid_cleared',false)){
      const rafidAccounts = await FDB.getAll('rafid_accounts'); if(rafidAccounts&&rafidAccounts.length) DB.set('rafid_accounts',rafidAccounts);
      const rafidOpArr = await FDB.getAll('rafid_opening'); if(rafidOpArr&&rafidOpArr.length){const op=rafidOpArr.find(x=>x.id==='opening')||rafidOpArr[0];if(op)DB.set('rafid_opening',{dinar:parseFloat(op.dinar||0),dollar:parseFloat(op.dollar||0)});}
    }
    const settings=await FDB.getAll('settings');if(settings&&settings.length){const fd=settings.find(x=>x.id==='factories');if(fd&&fd.list&&fd.list.length){DB.set('factories',fd.list);}const kot=settings.find(x=>x.id==='kroob_op_types');if(kot&&kot.list&&kot.list.length)DB.set('kroob_op_types',kot.list);}
    const settlementArr=await FDB.getAll('expenses_settlement');if(settlementArr&&settlementArr.length){const stl={};settlementArr.forEach(s=>{if(s.id){const k=s.id.replace(/_/g,' ');stl[k]={received_dinar:parseFloat(s.received_dinar||0),received_dollar:parseFloat(s.received_dollar||0),updated:s.updated||0};}});if(Object.keys(stl).length)DB.set('expenses_settlement',stl);}
    const expEntArr=await FDB.getAll('expense_entities');if(expEntArr&&expEntArr.length)DB.set('expense_entities',expEntArr);
    if(!silent) showToast('تمت المزامنة مع Firebase','info',2000);
    return true;
  } catch(e) { console.warn('Sync error:',e); return false; }
}

// ===== كلمات السر =====
async function hashPassword(password) {
  const msgBuffer=new TextEncoder().encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(password,hash) {
  if(!hash||!hash.match(/^[0-9a-f]{64}$/)) return password===hash;
  return (await hashPassword(password))===hash;
}

const _userGuard = (() => {
  // سر عشوائي داخل closure — لا يمكن قراءته من Console
  const _s = Array.from(crypto.getRandomValues(new Uint8Array(24))).map(b=>b.toString(16).padStart(2,'0')).join('');
  function _cs(u){ return btoa(encodeURIComponent([u.email||'',u.role||'',u.factory||'',(u.permissions||[]).slice().sort().join('|')].join('§')+_s)); }
  return {
    seal(u){ return Object.freeze({...u, _cs:_cs(u)}); },
    verify(u){ return !!(u && u._cs && u._cs===_cs(u)); }
  };
})();

}

function sc(v){ return parseFloat(v)||0; }

// ===== Toast System =====
function showToast(msg, type='success', duration=3000){
  const container = document.getElementById('toast-container');
  if(!container) return;
  const icons = {success:'✅', error:'❌', warning:'⚠️', info:'ℹ️'};
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span style="font-size:16px">' + (icons[type]||'✅') + '</span><span>' + msg + '</span>';
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function fmt(v,d=3){ const n=parseFloat(v); if(!n||isNaN(n))return'0'; const fixed=n.toFixed(d); const parts=fixed.split('.'); parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,','); const dec=parts[1]?parts[1].replace(/0+$/,''):''; return dec?parts[0]+'.'+dec:parts[0]; }
function safeNum(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtM(v){ var n=Math.round(safeNum(v)); return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function fmtTon(v){ return fmt(sc(v)); }
function fmtLiter(v){ return fmt(sc(v)); }
function fmtKg(v){ return fmt(sc(v)); }
function fmtKaban(v){ const n=parseFloat(v); if(!n||isNaN(n))return'0'; return n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:3}); }
function today(){ return new Date().toISOString().split('T')[0]; }
function uid(e){ return e.replace(/[\.\@\+]/g,'_'); }
function el(id){ return document.getElementById(id); }
function gv(id){ return el(id)?.value?.trim()||''; }
function isManager(){ return currentUser?.role==='manager'; }
function hasPerm(perm){ if(!_checkIntegrity())return false; if(isManager())return true; const perms=currentUser?.permissions; if(!perms)return false; return perms.includes(perm); }
function canEdit(section){ if(!_checkIntegrity())return false; if(isManager())return true; if(currentUser?.email==='mohammed.ridha@gmail.com')return true; if(section==='purchases'&&hasPerm('table'))return true; if(section==='sales'&&hasPerm('sale_table'))return true; if(section==='salaf'&&hasPerm('salaf'))return true; if(section==='expenses'&&hasPerm('expenses'))return true; return false; }

// ===== سجل النشاط (Audit Log) =====
function auditLog(action, details){
  if(!currentUser) return;
  const entry = {
    id: 'al_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    time: Date.now(),
    date: new Date().toLocaleDateString('ar-IQ'),
    clock: new Date().toLocaleTimeString('ar-IQ'),
    user: currentUser.email,
    factory: currentUser.factory || 'الكل',
    action,
    details: details || ''
  };
  const logs = DB.get('audit_log', []);
  logs.unshift(entry);
  if(logs.length > 500) logs.length = 500;
  DB.set('audit_log', logs);
  FDB.save('audit_log', entry.id, entry);
}
function fixEntry(e){ return e; }
function fixSale(s){ return s; }
function loadEntries(){ return DB.get('entries',[]).map(fixEntry); }
function loadSales(){ return DB.get('sales',[]).map(fixSale); }

function getAnalysis(fromDate,toDate){
  let entries=loadEntries();
  if(fromDate)entries=entries.filter(e=>e.date>=fromDate);
  if(toDate)entries=entries.filter(e=>e.date<=toDate);
  const t=today(),res={};
  for(const f of FACTORIES){
    const ft=entries.filter(e=>e.factory===f),fd=ft.filter(e=>e.date===t);
    const agg=arr=>({cars:arr.length,tons:arr.reduce((s,e)=>s+sc(e.qty_tons),0),liters:arr.reduce((s,e)=>s+sc(e.natural_liters),0),kg:arr.reduce((s,e)=>s+sc(e.weight_kg),0),money:arr.reduce((s,e)=>s+parseFloat(e.refinery_price||0),0)});
    res[f]={today:agg(fd),total:agg(ft)};
  }
  return res;
}
function getSaleAnalysis(fromDate,toDate){
  let sales=loadSales();
  if(fromDate)sales=sales.filter(s=>s.date>=fromDate);
  if(toDate)sales=sales.filter(s=>s.date<=toDate);
  const t=today(),res={};
  for(const f of FACTORIES){
    const ft=sales.filter(s=>s.factory===f),fd=ft.filter(s=>s.date===t);
    const agg=arr=>({cars:arr.length,kaban:arr.reduce((s,e)=>s+parseFloat(e.kaban||0),0),liters:arr.reduce((s,e)=>s+parseFloat(e.qty_liters||0),0),money:arr.reduce((s,e)=>s+(parseFloat(e.advance||0)*parseFloat(e.received||0)),0)});
    res[f]={today:agg(fd),total:agg(ft)};
  }
  return res;
}
function getList(){
  const sf=S.selectedFactory;
  let list=loadEntries();
  if(sf!=='الكل')list=list.filter(e=>e.factory===sf);
  if(S.wFrom)list=list.filter(e=>e.date>=S.wFrom);
  if(S.wTo)list=list.filter(e=>e.date<=S.wTo);
  return list.reverse();
}
function getSaleList(){
  const sf=S.selectedFactory;
  let list=loadSales();
  if(sf!=='الكل')list=list.filter(s=>s.factory===sf);
  if(S.wFrom)list=list.filter(s=>s.date>=S.wFrom);
  if(S.wTo)list=list.filter(s=>s.date<=S.wTo);
  return list.reverse();
}

function viewPorts(){

  var html='',wa='موقف مبيعات الموانئ\n'+periodLabel+'\n---\n';
  facts.forEach(function(fac){
    var fH='',fT=fac+'\n',ok=false;
    [['ميناء الخور','الخور'],['ميناء الحرة','الحرة']].forEach(function(p){
      var ps=fs.filter(function(s){return s.factory===fac&&(s.address||'').includes(p[1]);});
      if(ps.length){var c=ps.length,k=ps.reduce((s,e)=>s+(parseFloat(e.kaban)||0),0),m=ps.reduce((s,e)=>s+(parseFloat(e.advance||0)*parseFloat(e.received||0)),0);

function setThisWeek(){const now=new Date(),day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);S.wFrom=mon.toISOString().split('T')[0];S.wTo=sun.toISOString().split('T')[0];renderContent();}
function setThisMonth(){const now=new Date();S.wFrom=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];S.wTo=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];renderContent();}

function copyWhatsapp(){
  const wf=S.wFrom,wt=S.wTo;
  const analysis=getAnalysis(wf,wt),saleAn=getSaleAnalysis(wf,wt),sf=S.selectedFactory;
  const facts=sf==='الكل'?FACTORIES:[sf];
  const periodLabel=wf&&wt?wf+' → '+wt:wf?'من '+wf:wt?'إلى '+wt:'الكلي';
  let txt=`*📊 الموقف الإجمالي*\n📅 ${periodLabel}\n`;
  txt+=`\n*🛢️ المشتريات:*\n`;
  for(const f of facts){const d=analysis[f].total;if(!d.cars)continue;txt+=`🏭 ${f}: ${d.cars} سيارة | ${fmt(d.tons)} طن | ${fmt(d.liters)} لتر | ${fmt(d.kg)} كغم\n`;}
  txt+=`\n*📦 المبيعات:*\n`;
  for(const f of facts){const d=saleAn[f].total;if(!d.cars)continue;txt+=`🏭 ${f}: ${d.cars} سيارة | ${fmtKaban(d.kaban)} كبان\n`;}
  txt+=`\n✅ نظام المراقبة v44.0`;
  navigator.clipboard?.writeText(txt).catch(()=>{});
  const c=el('copy-ok');if(c){c.style.display='block';setTimeout(()=>c.style.display='none',3000);}
}

function updateProduct(){const r=gv('f_ref'),pt=el('f_pt');if(pt)pt.value=r==='مصفى كربلاء'?'HFO':r==='مصفى صلاح الدين'?'VR':'';}
function calcTotal(){const l=parseFloat(el('f_liters')?.value||0),t=el('f_tot');if(t)t.textContent=fmtM(l*150)+' د.ع';}
function validateQty(inp){
  const raw=(inp.value||'').toString().trim();
  if(!raw)return;
  const v=parseFloat(raw);
  const intPart=Math.floor(Math.abs(v)).toString();
  let warn='';
  if(v>0&&intPart.length<5) warn='⚠️ يجب أن يكون 5 أرقام على الأقل (مثال: 31500)';
  else if(v>0&&intPart.length>5) warn='⚠️ يجب ألا يتجاوز 5 أرقام (مثال: 99999)';
  if(warn){
    inp.style.borderColor='#dc2626';
    inp.style.background='#fef2f2';
    // نعرض رسالة تحذير تحت الحقل
    let msg=inp.nextElementSibling;
    if(!msg||!msg.classList.contains('qty-warn')){
      msg=document.createElement('div');
      msg.className='qty-warn';
      msg.style.cssText='font-size:10px;color:#dc2626;font-weight:700;margin-top:2px';
      inp.parentNode.appendChild(msg);
    }
    msg.textContent=warn;
  } else {
    inp.style.borderColor='';
    inp.style.background='';
    const msg=inp.nextElementSibling;
    if(msg&&msg.classList.contains('qty-warn'))msg.remove();
  }
}

function showDriversList(inputId,carId,locId){
  const drivers=DB.get('drivers',{});
  const list=Object.values(drivers);
  if(!list.length)return;
  const old=document.getElementById('drv-drop');if(old)old.remove();
  const input=el(inputId);if(!input)return;
  const rect=input.getBoundingClientRect();
  const drop=document.createElement('div');
  drop.id='drv-drop';
  drop.style.cssText=`position:fixed;top:${rect.bottom+2}px;right:${window.innerWidth-rect.right}px;width:${rect.width}px;background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:99999;max-height:220px;overflow-y:auto`;
  const filter=(input.value||'').toLowerCase();
  const filtered=filter?list.filter(d=>(d.name||'').toLowerCase().includes(filter)||(d.car_no||'').toLowerCase().includes(filter)):list;
  filtered.forEach(d=>{
    const item=document.createElement('div');
    item.style.cssText='padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9';
    item.innerHTML=`<div style="font-size:13px;font-weight:900;color:#0f172a">${d.name}</div><div style="font-size:10px;color:#64748b;margin-top:2px">🚗 ${d.car_no||'—'} | 📍 ${d.location||'—'}</div>`;
    item.onmouseover=()=>item.style.background='#eff6ff';
    item.onmouseout=()=>item.style.background='';
    item.onmousedown=(ev)=>{ev.preventDefault();input.value=d.name;const c=el(carId),l=el(locId);if(c)c.value=d.car_no||'';if(l)l.value=d.location||'';drop.remove();};
    drop.appendChild(item);
  });
  document.body.appendChild(drop);
  input.oninput=()=>{drop.remove();showDriversList(inputId,carId,locId);};
  input.onblur=()=>setTimeout(()=>{const d=document.getElementById('drv-drop');if(d)d.remove();},200);
}

function saveEntry(){
  const sf=S.selectedFactory,e=S.editEntry||{};
  const v=gv('f_voucher'),date=gv('f_date'),ref=gv('f_ref'),pt=gv('f_pt');
  const driver=gv('f_driver'),car=gv('f_car'),loc=gv('f_loc'),po=gv('f_po');
  const tons=parseFloat(el('f_tons')?.value||0),liters=parseFloat(el('f_liters')?.value||0),kg=parseFloat(el('f_kg')?.value||0);
  const allEntries=DB.get('entries',[]);
  const dupVoucher=allEntries.find(x=>x.voucher_no==v&&x.id!==(e.id||''));
  if(dupVoucher){showToast('رقم البوجر '+v+' موجود مسبقاً!','error');return;}
  if(!v||!date||!ref||!driver||!car||!loc||!po||!liters){showToast('يرجى ملء جميع الحقول (*)','error');return;}
  const entry={id:e.id||('e_'+Date.now()),voucher_no:v,refinery:ref,date,product_type:pt,driver_name:driver,car_no:car,location:loc,qty_tons:tons,natural_liters:liters,weight_kg:kg,po_no:po,price:150,transport_fee:42,refinery_price:150*liters,factory:sf,accountant:currentUser.email,time:Date.now()};
  let entries=DB.get('entries',[]);
  if(e.id){const idx=entries.findIndex(x=>x.id===e.id);if(idx>=0)entries[idx]=entry;else entries.push(entry);}else entries.push(entry);
  DB.set('entries',entries);FDB.save('entries',entry.id,entry);
  let drivers=DB.get('drivers',{});drivers[driver]={name:driver,car_no:car,location:loc};DB.set('drivers',drivers);
  FDB.save('drivers',driver.replace(/\s+/g,'_'),drivers[driver]);
  auditLog(e.id ? 'تعديل مشتريات' : 'إضافة مشتريات', `بوجر: ${entry.voucher_no} | سائق: ${entry.driver_name} | ${entry.factory}`);
  S.editEntry=null;S.view='table';render();
}

function updateSaleTotal(){
  const kaban=parseFloat(el('s_kaban')?.value||0),price=parseFloat(el('s_price')?.value||0);
  const t=el('s_total');if(t)t.value=fmtM(price*kaban);
}
function saveSale(){
  const sf=S.selectedFactory,e=S.editSale||{};
  const driver=gv('s_driver'),car=gv('s_car'),date=gv('s_date'),loc=gv('s_loc');
  const addr=gv('s_addr'),type=gv('s_type');
  const kaban=parseFloat(el('s_kaban')?.value||0),liters=parseFloat(el('s_liters')?.value||0);
  const advance=parseFloat(el('s_advance')?.value||0),received=parseFloat(el('s_received')?.value||0);
  const source=gv('s_source');
  const salePrice=parseFloat(el('s_price')?.value||0),saleTotal=salePrice*kaban,driverBonus=parseFloat(el('s_bonus')?.value||0);
  if(!driver||!car||!date||!kaban){showToast('يرجى ملء الحقول الإلزامية (*)','warning');return;}
  const sale={id:e.id||('s_'+Date.now()),driver_name:driver,car_no:car,date,location:loc,address:addr,product_type:type,kaban,qty_liters:liters,advance,received,car_source:source,sale_price:salePrice,sale_total:saleTotal,driver_bonus:driverBonus,factory:sf,accountant:currentUser.email,time:Date.now()};
  let sales=DB.get('sales',[]);
  if(e.id){const idx=sales.findIndex(x=>x.id===e.id);if(idx>=0)sales[idx]=sale;else sales.push(sale);}else sales.push(sale);
  auditLog(e.id ? 'تعديل مبيعات' : 'إضافة مبيعات', `سائق: ${sale.driver_name} | ${sale.product_type} | ${sale.factory}`);
  DB.set('sales',sales);FDB.save('sales',sale.id,sale);
  let drivers=DB.get('drivers',{});drivers[driver]={name:driver,car_no:car,location:loc};DB.set('drivers',drivers);
  FDB.save('drivers',driver.replace(/\s+/g,'_'),drivers[driver]);
  S.editSale=null;S.view='sale_table';render();
}

function exportXLSX(type){
  if(typeof XLSX==='undefined'){showToast('مكتبة Excel غير محملة','error');return;}
  let list,sheetName,fname,rows=[];
  if(type==='purchases'){
    list=getList();sheetName='المشتريات';fname='مشتريات_'+today()+'.xlsx';
    rows.push(['ت','المعمل','البوجر','المصفى','التاريخ','النوع','السائق','السيارة','العائدية','طن','لتر','كغم','PO','السعر','نقل','الإجمالي']);
    list.forEach((e,i)=>rows.push([i+1,e.factory,e.voucher_no,e.refinery,e.date,e.product_type,e.driver_name,e.car_no,e.location,sc(e.qty_tons),sc(e.natural_liters),sc(e.weight_kg),e.po_no,e.price||150,e.transport_fee||42,parseFloat(e.refinery_price)||0]));
  }else{
    list=getSaleList();sheetName='المبيعات';fname='مبيعات_'+today()+'.xlsx';
    rows.push(['ت','المعمل','السائق','السيارة','التاريخ','العائدية','العنوان','النوع','الكبان','لتر','أجرة','الواصل','سعر البيع','إجمالي البيع','مكافأة السائق','المصدر']);
    list.forEach((e,i)=>rows.push([i+1,e.factory,e.driver_name,e.car_no,e.date,e.location,e.address||'',e.product_type,parseFloat(e.kaban)||0,parseFloat(e.qty_liters)||0,parseFloat(e.advance)||0,parseFloat(e.received)||0,parseFloat(e.sale_price)||0,parseFloat(e.sale_total)||((parseFloat(e.sale_price)||0)*(parseFloat(e.kaban)||0)),parseFloat(e.driver_bonus)||0,e.car_source||'']));
  }
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=rows[0].map(()=>({wch:18}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheetName);XLSX.writeFile(wb,fname);
}

function normalizeCol(col,map){
  const c=(col||'').toString().trim().replace(/\s+/g,' ').replace(/\u200f|\u200e|\u202a|\u202c/g,'');
  // Try exact match first
  if(map[c])return map[c];
  // Then includes match (longer keys first to avoid false positives)
  const keys=Object.keys(map).sort((a,b)=>b.length-a.length);
  for(const k of keys){if(c.includes(k))return map[k];}
  return null;
}
function autoScale(val){var n=parseFloat(val)||0;if(n>0&&n<1000)return n*1000;return n;}
function parseXLDate(d){if(!d)return'';d=d.toString().trim();const m1=d.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);if(m1)return`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;const m2=d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);if(m2)return`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;const m3=d.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{4})$/);if(m3)return`${m3[3]}-${m3[2].padStart(2,'0')}-${m3[1].padStart(2,'0')}`;if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;const n=parseFloat(d);if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);return dt.toISOString().split('T')[0];}return d;}

function previewExcel(file){
  if(!file)return;
  const hrow=parseInt(gv('imp_hrow')||'2'),sheetIdx=parseInt(gv('imp_sheet')||'0');
  const iType=gv('imp_type')||'purchases';
  const map=iType==='sales'?COL_MAP_S:COL_MAP_P;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[sheetIdx]||wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const headers=raw[hrow]||[];
      const colMap={};
      headers.forEach((h,i)=>{const m=normalizeCol(h,map);if(m)colMap[i]=m;});
      importedRows=[];
      for(let r=hrow+1;r<raw.length;r++){
        const row=raw[r];
        if(!row[1]&&!row[2])continue;
        const obj={};
        Object.entries(colMap).forEach(([i,f])=>{obj[f]=row[i];});
        if(!obj.driver_name&&!obj.refinery&&!obj.car_no)continue;
        const hasNums=parseFloat(obj.qty_tons||0)||parseFloat(obj.natural_liters||0)||parseFloat(obj.weight_kg||0)||parseFloat(obj.kaban||0)||parseFloat(obj.qty_liters||0);
        const hasText=(obj.driver_name||'').trim()||(obj.refinery||'').trim()||(obj.car_no||'').toString().trim();
        if(!hasNums&&!hasText)continue;
        importedRows.push(obj);
      }
      const info=el('imp-info');
      if(info)info.innerHTML=`✅ الملف: <b>${file.name}</b> | عدد السجلات: <b>${importedRows.length}</b><br>الأعمدة: <b>${Object.values(colMap).join('، ')}</b>`;
      const prev=el('imp-preview');if(prev)prev.style.display='block';
    }catch(err){showToast('خطأ: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

async function doImport(){

      const xlTons=autoScale(row.qty_tons),xlLiters=autoScale(row.natural_liters),xlKg=autoScale(row.weight_kg);

      const entry={id:'xl_p_'+Date.now()+'_'+i,voucher_no:row.voucher_no||(row._num||String(i+1)),refinery:(row.refinery||'').toString().trim(),date:parseXLDate(row.date),product_type:(row.product_type||'').toString().trim(),driver_name:dName,car_no:carNo,location:loc,qty_tons:xlTons,natural_liters:xlLiters,weight_kg:xlKg,po_no:(row.po_no||'').toString().trim(),price:xlPrice,transport_fee:42,refinery_price:xlRefPrice,factory,accountant:currentUser.email,time:Date.now()+i};
      entries.push(entry);newEntries.push(entry);

    });

      sales.push(sale);newSales.push(sale);

const EXPENSE_FACTORIES=['مصاريف الجوهرة','الوطنية','عطاء الذهب','ايجار كراج','الفهد','روعة المشرق','الذهب الأسود','ابرار شط العرب','الذهب الأصفر','نذره الذهب','إياد عودة','الكرستال','حميد جاسم','رافد خاص'];
function getExpenseList(factory){
  const all=DB.get('expenses',[]).map(e=>{
    // normalize legacy field names (dinar→amount_dinar, dollar→amount_dollar)
    if(e.amount_dinar==null&&e.dinar!=null)return Object.assign({},e,{amount_dinar:e.dinar,amount_dollar:e.dollar||0});
    return e;
  });
  if(!factory)return all;
  return all.filter(e=>e.factory===factory);
}
const EXP_IRAQI_MONTHS={'01':'كانون الثاني','02':'شباط','03':'آذار','04':'نيسان','05':'أيار','06':'حزيران','07':'تموز','08':'آب','09':'أيلول','10':'تشرين الأول','11':'تشرين الثاني','12':'كانون الأول'};
function expNormAr(s){return String(s||'').replace(/[أإآ]/g,'ا').trim();}
function expTextMonthToNum(text){const t=expNormAr(text);for(const mm in EXP_IRAQI_MONTHS){if(t.includes(expNormAr(EXP_IRAQI_MONTHS[mm])))return mm;}return null;}
function expDateToYM(d){if(!d)return'';const iso=(d||'').slice(0,7);if(/^\d{4}-\d{2}$/.test(iso))return iso;const mm=expTextMonthToNum(d);if(!mm)return'';const ym=/(\d{4})/.exec(d);const yr=ym?ym[1]:today().slice(0,4);return yr+'-'+mm;}
function expDateMatchesMonth(dateStr,month){
  if(!dateStr||!month)return false;
  // handle ISO dates with or without zero-padded month (2026-06-15 or 2026-6-15)
  const isoM=/^(\d{4})-(\d{1,2})/.exec(dateStr);
  if(isoM)return (isoM[1]+'-'+isoM[2].padStart(2,'0'))===month;
  // handle text month names, extract year if present (e.g. "حزيران 2025")
  const mm=expTextMonthToNum(dateStr);
  if(!mm)return false;
  const yearM=/(\d{4})/.exec(dateStr);
  const year=yearM?yearM[1]:today().slice(0,4);
  return month===(year+'-'+mm);
}
function expDupKey(e){
  const d=Math.round(parseFloat(e.amount_dinar)||0);
  const dl=Math.round((parseFloat(e.amount_dollar)||0)*100)/100;
  return (e.factory||'')+'|'+(e.date||'')+'|'+d+'|'+dl+'|'+(e.details||'').trim();
}
// دفعة الحركة: حركات الاستيراد من نفس عملية الاستيراد تشترك بنفس الدفعة (لا تُعتبر تكراراً فيما بينها)
// الحركات اليدوية كل واحدة دفعة مستقلة بذاتها (لا تُحذف أبداً عبر هذه الأداة)
function expBatchKey(e){
  if(e.id&&e.id.indexOf('exp_xl_')===0){const p=e.id.split('_');return 'xl_'+p[2];}
  return 'manual_'+e.id;
}
// يكتشف فقط التكرار الناتج عن إعادة استيراد نفس الملف (دفعات مختلفة بنفس المحتوى)
// لا يلمس حركتين متطابقتين ضمن نفس عملية الاستيراد لأنهما غالباً حركتان حقيقيتان منفصلتان
function computeDuplicateExpenseCandidates(){
  // فقط حركات الاستيراد مؤهلة للحذف التلقائي — الحركات اليدوية لا تُمس مهما تشابه محتواها
  // والحركات بلا تاريخ فعلي مستبعدة أيضاً (التاريخ الفارغ غير موثوق للمطابقة بين الأشهر)
  const expenses=DB.get('expenses',[]).filter(function(e){return e.id&&e.id.indexOf('exp_xl_')===0&&e.date;});
  const byKey={};
  expenses.forEach(function(e){const k=expDupKey(e);(byKey[k]=byKey[k]||[]).push(e);});
  const candidates=[];
  Object.keys(byKey).forEach(function(k){
    const group=byKey[k];
    if(group.length<2)return;
    const byBatch={};
    group.forEach(function(e){const b=expBatchKey(e);(byBatch[b]=byBatch[b]||[]).push(e);});
    const batches=Object.keys(byBatch);
    if(batches.length<2)return;
    batches.sort(function(a,b){
      const diff=byBatch[b].length-byBatch[a].length;
      if(diff!==0)return diff;
      return(byBatch[a][0].time||0)-(byBatch[b][0].time||0);
    });
    batches.slice(1).forEach(function(b){byBatch[b].forEach(function(e){candidates.push(e);});});
  });
  return candidates;
}
function cleanupDuplicateExpenses(){
  const candidates=computeDuplicateExpenseCandidates();
  if(!candidates.length){alert('لا توجد حركات مكررة (ناتجة عن إعادة استيراد) يمكن رصدها تلقائياً');return;}
  S.dupReviewIds=new Set(candidates.map(function(e){return e.id;}));
  S.view='exp_dup_review';
  renderContent();
}
function viewExpDupReview(){
  const candidates=computeDuplicateExpenseCandidates();
  const selectedIds=S.dupReviewIds||new Set(candidates.map(function(e){return e.id;}));
  const totalD=candidates.reduce(function(s,e){return selectedIds.has(e.id)?s+parseFloat(e.amount_dinar||0):s;},0);

function toggleDupReviewSelect(id,checked){
  if(!S.dupReviewIds)S.dupReviewIds=new Set();
  if(checked)S.dupReviewIds.add(id);else S.dupReviewIds.delete(id);
  renderContent();
}
async function confirmDeleteDupReview(){
  const ids=Array.from(S.dupReviewIds||[]);
  if(!ids.length){alert('لم تحدد أي حركة للحذف');return;}
  if(!confirm('حذف '+ids.length+' حركة محددة نهائياً؟'))return;
  addExpenseTombstones(ids);
  const expenses=DB.get('expenses',[]).filter(function(e){return!ids.includes(e.id);});
  DB.set('expenses',expenses);
  S.view='expenses';S.dupReviewIds=null;
  renderContent();
  showToast('⏳ جاري الحذف من السحابة...','info',3000);
  try{
    await Promise.all(ids.map(function(id){return FDB.delete('expenses',id);}));
    showToast('✅ تم حذف '+ids.length+' حركة مكررة','success',5000);
  }catch(err){showToast('✅ تم الحذف محلياً | ⚠️ فشل الحذف من السحابة','warning',5000);}
}

function viewExpensesSummary(){
  const allExp=getExpenseList('');const settlement=DB.get('expenses_settlement',{});
  const dynFactories=[...new Set(allExp.map(e=>e.factory||'').filter(f=>f))].sort();
  const rows=dynFactories.map((f,i)=>{const list=getExpenseList(f);const tD=list.reduce((s,e)=>s+parseFloat(e.amount_dinar||0),0);const tDol=list.reduce((s,e)=>s+parseFloat(e.amount_dollar||0),0);const stl=settlement[f]||{};const recD=parseFloat(stl.received_dinar||0);const remD=tD-recD;return`<tr><td class="td" style="color:#94a3b8">${i+1}</td><td class="td" style="font-weight:900;cursor:pointer;color:#dc2626" onclick="S.expFactory='${f}';S.view='expenses';renderContent()">${f}</td><td class="td" style="background:#fffbeb;color:#ca8a04;font-weight:900">${fmtM(tD)}</td><td class="td" style="background:#f8fafc;color:#0f172a;font-weight:900">${fmtM(tDol)}</td><td class="td" style="color:#059669">${fmtM(recD)}</td><td class="td" style="color:${remD>0?'#dc2626':'#059669'};font-weight:900">${fmtM(Math.abs(remD))}${remD>0?' ⚠️':' ✅'}</td></tr>`;}).join('');

function saveExpense(){
  const factoryRaw=(document.getElementById('exp_factory_inp')?.value||'').trim();
  if(!factoryRaw){showToast('يرجى كتابة جهة الصرف','error');return;}
  const _eid0=S.expEditId||'';const _orig0=_eid0?(DB.get('expenses',[]).find(e=>e.id===_eid0)||null):null;const date=gv('exp_date')||(_orig0&&_orig0.date)||today();
  const dinar=parseFloat(document.getElementById('exp_dinar')?.value||0);
  const dollar=parseFloat(document.getElementById('exp_dollar')?.value||0);
  const details=gv('exp_details');
  if(!details){showToast('يرجى كتابة التفاصيل','error');return;}
  const personVal=(document.getElementById('exp_person')?.value||'').trim();
  // تقسيم الجهات بعلامة +
  const factories=factoryRaw.split('+').map(f=>f.trim()).filter(f=>f);
  const n=factories.length;
  let expenses=DB.get('expenses',[]);
  const editId=S.expEditId||'';
  // في حالة التعديل: حذف السجل الأصلي
  if(editId){expenses=expenses.filter(e=>e.id!==editId);FDB.delete('expenses',editId);S.expEditId='';}
  // إنشاء سجل لكل جهة بالمبلغ المقسوم
  const newEntries=[];
  factories.forEach((factory,i)=>{
    const shareDinar=Math.round(dinar/n);
    const shareDollar=parseFloat((dollar/n).toFixed(2));
    const entry={id:'exp_'+Date.now()+'_'+i,factory,date,amount_dinar:shareDinar,amount_dollar:shareDollar,details,...(personVal?{person:personVal}:{}),accountant:currentUser.email,time:Date.now()+i};
    newEntries.push(entry);
    expenses.push(entry);
  });
  expenses.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  DB.set('expenses',expenses);
  newEntries.forEach(e=>FDB.save('expenses',e.id,e));
  auditLog(editId ? 'تعديل مصروف' : 'إضافة مصروف', `جهة: ${factoryRaw} | دينار: ${dinar} | دولار: ${dollar} | ${details}`);

  showToast(n>1?`تم الحفظ — وُزِّع المبلغ على ${n} جهات`:'تم الحفظ','success');

}

// ===== استيراد Excel متعدد الشيتات =====
function importExpensesXLSX(input){
  const file=input.files[0];
  if(!file||typeof XLSX==='undefined'){alert('مكتبة Excel غير محملة، يرجى تحديث الصفحة');return;}
  const reader=new FileReader();
  reader.onload=async function(ev){
    const wb=XLSX.read(ev.target.result,{type:'array'});
    // ربط أسماء الشيتات بأسماء الجهات
    const sheetMap={
      'الجوهرة':'مصاريف الجوهرة','مصاريف الجوهرة':'مصاريف الجوهرة','مصاريف الجوههرة':'مصاريف الجوهرة',
      'الوطنية':'الوطنية','الوطنيه':'الوطنية',
      'عطاء الذهب':'عطاء الذهب',
      'ايجار كراج':'ايجار كراج',
      'الفهد':'الفهد','مصارف الفهد':'الفهد','مصاريف الفهد':'الفهد',
      'روعة المشرق':'الروعة المشرق','الروعة المشرق':'الروعة المشرق','الروعه':'الروعة المشرق',
      'الذهب الاسود':'الذهب الأسود','الذهب الأسود':'الذهب الأسود',
      'ابراج شط العرب':'ابرار شط العرب','ابرار شط العرب':'ابرار شط العرب',
      'الذهب الاصفر':'الذهب الأصفر','الذهب الأصفر':'الذهب الأصفر',
      'ندرة الذهب':'نذره الذهب','نذره الذهب':'نذره الذهب',
      'اياد عودة':'اياد عودة','الكرستال':'الكرستال','حميد جاسم':'حميد جاسم'
    };
    const skipKW=['مجموع','المجموع','الواصل','المتبقي','متبقي','واصل','اجمالي','الاجمالي','إجمالي','الإجمالي','جملة','الجملة','ملاحظة','تاريخ','البيان'];
    const normAr=s=>String(s||'').replace(/[أإآ]/g,'ا').trim();
    const isSkip=(...cols)=>skipKW.some(kw=>cols.some(c=>normAr(c).includes(normAr(kw))));
    let expenses=DB.get('expenses',[]);
    let imported=0,skippedDup=0;
    const ts=Date.now();
    // عدّاد تكراري بدل مجموعة: يسمح بحركتين حقيقيتين متطابقتي القيم ضمن نفس الملف،
    // ويتجاهل فقط ما يتجاوز العدد الموجود مسبقاً (إعادة استيراد كاملة أو جزئية لنفس البيانات)
    const existingCounts={};
    expenses.forEach(function(e){const k=expDupKey(e);existingCounts[k]=(existingCounts[k]||0)+1;});
    const importedCounts={};
    wb.SheetNames.forEach(function(sheetName){
      const factory=sheetMap[sheetName.trim()]||sheetName.trim();
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      var lastDate='';
      for(var r=2;r<rows.length;r++){
        var row=rows[r];
        var col0=String(row[0]||'').trim();
        var col2=String(row[2]||'').replace(/,/g,'').trim();
        var col3=String(row[3]||'').replace(/,/g,'').trim();
        var col4=String(row[4]||'').trim();

        // استخراج التاريخ مع دعم Date Object من XLSX
        var col1raw=row[1];
        var col1;
        if(col1raw instanceof Date){
          var y=col1raw.getFullYear(),mo=String(col1raw.getMonth()+1).padStart(2,'0'),dy=String(col1raw.getDate()).padStart(2,'0');
          col1=y+'-'+mo+'-'+dy;
        } else {
          col1=String(col1raw||'').trim();
        }

        if(isSkip(col0,col1,col2,col3,col4))continue;
        var dinar=parseFloat(col2)||0,dollar=parseFloat(col3)||0;
        // تخطي الصف فقط إذا لم يحوِ أي بيانات حقيقية إطلاقاً (لا مبلغ ولا تفاصيل) — صف فارغ/إجمالي حقيقي
        if(!dinar&&!dollar&&!col4)continue;

        // تحديد التاريخ لهذا الصف
        var dateForRow;
        if(col1){
          var parsed=parseXLDate(col1);
          if(parsed&&/^\d{4}-\d{2}-\d{2}$/.test(parsed)){
            // تاريخ صحيح → حدّث lastDate واستخدمه
            lastDate=parsed; dateForRow=parsed;
          } else {
            // نص مثل "شهر ايار" → استخدمه كما هو بدون تحديث lastDate
            dateForRow=col1;
          }
        } else {
          // فارغ → ورث التاريخ السابق
          dateForRow=lastDate;
        }

        var id='exp_xl_'+ts+'_'+r+'_'+Math.random().toString(36).slice(2,5);
        var entry={id,factory,date:dateForRow,amount_dinar:dinar,amount_dollar:dollar,details:col4,accountant:currentUser?currentUser.email:'import',time:ts+r};
        var dupKey=expDupKey(entry);
        importedCounts[dupKey]=(importedCounts[dupKey]||0)+1;
        // التاريخ الفارغ غير موثوق للمطابقة (قد يتطابق صدفة مع شهر آخر له نفس المبلغ والتفاصيل المتكررة)
        // لذا لا نعتبر الصف تكراراً أبداً إذا لم يكن له تاريخ فعلي
        if(dateForRow && importedCounts[dupKey]<=(existingCounts[dupKey]||0)){skippedDup++;continue;}
        expenses.push(entry);
        imported++;
      }
    });
    expenses.sort(function(a,b){return(a.factory+'_'+(a.date||'')).localeCompare(b.factory+'_'+(b.date||''));});
    DB.set('expenses',expenses);
    renderContent();
    showToast('⏳ جاري الحفظ في السحابة...','info',3000);
    try{
      const newExp=expenses.filter(function(e){return e.id.startsWith('exp_xl_'+ts+'_');});
      await Promise.all(newExp.map(function(e){return FDB.save('expenses',e.id,e);}));
      showToast('✅ تم استيراد '+imported+' مصروف'+(skippedDup?(' | ⏭️ تم تجاهل '+skippedDup+' مكرر'):'')+' وحفظها في السحابة ☁️','success',5000);
    }catch(err){showToast('✅ تم الاستيراد محلياً | ⚠️ فشل الحفظ في السحابة','warning',5000);}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function saveRenameExpenseEntity(oldName){
  const newName=(document.getElementById('rename_entity_inp')?.value||'').trim();
  if(!newName){showToast('يرجى كتابة الاسم الجديد','error');return;}
  if(newName===oldName){S.expEntityRenameTarget='';renderContent();return;}
  let expenses=DB.get('expenses',[]);
  const affected=expenses.filter(e=>e.factory===oldName);
  if(!affected.length){showToast('لا توجد مصاريف لهذه الجهة','warning');S.expEntityRenameTarget='';renderContent();return;}
  const mergeExisting=expenses.some(e=>e.factory===newName);
  if(mergeExisting&&!confirm('الجهة "'+newName+'" موجودة مسبقاً — سيتم دمج '+affected.length+' مصروف من "'+oldName+'" معها. متابعة؟'))return;
  affected.forEach(e=>{e.factory=newName;});
  DB.set('expenses',expenses);
  affected.forEach(e=>FDB.save('expenses',e.id,e));
  const settlement=DB.get('expenses_settlement',{});
  if(settlement[oldName]){
    if(!settlement[newName])settlement[newName]=settlement[oldName];
    delete settlement[oldName];
    DB.set('expenses_settlement',settlement);
    if(settlement[newName])FDB.save('expenses_settlement',newName.replace(/\s+/g,'_'),settlement[newName]);
    FDB.delete('expenses_settlement',oldName.replace(/\s+/g,'_'));
  }
  // تحديث الاسم في قائمة الجهات المعرَّفة مسبقاً إن وجدت
  const predefList=DB.get('expense_entities',[]);
  const predefIdx=predefList.findIndex(e=>e.name===oldName);
  if(predefIdx>=0){predefList[predefIdx].name=newName;DB.set('expense_entities',predefList);FDB.save('expense_entities',predefList[predefIdx].id,predefList[predefIdx]);}
  auditLog('تعديل تسمية جهة صرف',`من: ${oldName} إلى: ${newName} | عدد المصاريف: ${affected.length}`);
  S.expEntityRenameTarget='';
  showToast('تم تحديث التسمية في '+affected.length+' مصروف','success');
  setTimeout(()=>renderContent(),500);
}

function getSalafSettlementConfig(){const d=DB.get('salaf_settlement_cfg',{});return{haidar:{personName:'حيدر صبري',factory:'',openDinar:0,openDollar:0,...(d.haidar||{})},mohammed:{personName:'محمد خالد',factory:'',openDinar:0,openDollar:0,...(d.mohammed||{})}};}
function getPersonAdvances(person,month){let d=0,dl=0;if(person==='haidar'){getHaidarKroobSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>{d+=safeNum(e.amount_dinar);dl+=safeNum(e.amount_dollar);});getHaidarRafidSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>{d+=safeNum(e.dinar);dl+=safeNum(e.dollar);});}else{getMohammedKroobSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>{d+=safeNum(e.amount_dinar);dl+=safeNum(e.amount_dollar);});getMohammedRafidSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>{d+=safeNum(e.dinar);dl+=safeNum(e.dollar);});}return{dinar:d,dollar:dl};}
function getPersonAdvancesList(person,month){let list=[];if(person==='haidar'){getHaidarKroobSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>list.push({date:e.date,desc:e.description||'',source:'كروب',dinar:safeNum(e.amount_dinar),dollar:safeNum(e.amount_dollar)}));getHaidarRafidSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>list.push({date:e.date,desc:e.description||'',source:'رافد',dinar:safeNum(e.dinar),dollar:safeNum(e.dollar)}));}else{getMohammedKroobSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>list.push({date:e.date,desc:e.description||'',source:'كروب',dinar:safeNum(e.amount_dinar),dollar:safeNum(e.amount_dollar)}));getMohammedRafidSalaf().filter(e=>(e.date||'').startsWith(month)).forEach(e=>list.push({date:e.date,desc:e.description||'',source:'رافد',dinar:safeNum(e.dinar),dollar:safeNum(e.dollar)}));}return list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));}
function getPersonExpenses(personName,month){if(!personName)return[];return DB.get('expenses',[]).filter(e=>e.person===personName&&(!month||expDateMatchesMonth(e.date,month))).sort((a,b)=>(a.date||'').localeCompare(b.date||''));}
function getPersonExpensesTotal(personName,month){const list=getPersonExpenses(personName,month);return{dinar:list.reduce((s,e)=>s+safeNum(e.amount_dinar),0),dollar:list.reduce((s,e)=>s+safeNum(e.amount_dollar),0)};}
function getFactoryExpensesTotal(factory,month){if(!factory)return{dinar:0,dollar:0};const list=getExpenseList(factory==='__all__'?'':factory).filter(e=>(factory==='__all__'||e.factory===factory)&&expDateMatchesMonth(e.date,month));return{dinar:list.reduce((s,e)=>s+safeNum(e.amount_dinar),0),dollar:list.reduce((s,e)=>s+safeNum(e.amount_dollar),0)};}
function getFactoryExpensesList(factory,month){if(!factory)return[];return getExpenseList(factory==='__all__'?'':factory).filter(e=>(factory==='__all__'||e.factory===factory)&&expDateMatchesMonth(e.date,month)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));}
function getSalafCarryForward(person,month){const cfg=getSalafSettlementConfig(),pcfg=person==='haidar'?cfg.haidar:cfg.mohammed;const personName=pcfg.personName||'';let d=safeNum(pcfg.openDinar),dl=safeNum(pcfg.openDollar);const allAdv=person==='haidar'?[...getHaidarKroobSalaf().map(e=>({date:e.date,d:safeNum(e.amount_dinar),dl:safeNum(e.amount_dollar)})),...getHaidarRafidSalaf().map(e=>({date:e.date,d:safeNum(e.dinar),dl:safeNum(e.dollar)}))]:([...getMohammedKroobSalaf().map(e=>({date:e.date,d:safeNum(e.amount_dinar),dl:safeNum(e.amount_dollar)})),...getMohammedRafidSalaf().map(e=>({date:e.date,d:safeNum(e.dinar),dl:safeNum(e.dollar)}))]);allAdv.filter(e=>(e.date||'').slice(0,7)<month).forEach(e=>{d+=e.d;dl+=e.dl;});if(personName){DB.get('expenses',[]).filter(e=>e.person===personName&&expDateToYM(e.date)<month&&expDateToYM(e.date)!=='').forEach(e=>{d-=safeNum(e.amount_dinar);dl-=safeNum(e.amount_dollar);});}return{dinar:d,dollar:dl};}

        <div style="text-align:center;padding:10px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0">
          <div style="font-size:10px;color:#64748b;font-weight:700">🔄 رصيد مرحّل</div>
          <div style="font-size:13px;font-weight:900;color:${bc(carry.dinar)}">${fmtM(carry.dinar)} د.ع</div>

        </div>
        <div style="text-align:center;padding:10px;background:#fef2f2;border-radius:8px;border:1px solid #fca5a5">
          <div style="font-size:10px;color:#991b1b;font-weight:700">⬇️ سلف ${monthLabel}</div>
          <div style="font-size:13px;font-weight:900;color:#dc2626">${fmtM(adv.dinar)} د.ع</div>
          <div style="font-size:11px;font-weight:700;color:#0f172a">${fmtM(adv.dollar)} $</div>
        </div>
        <div style="text-align:center;padding:10px;background:#f0fdf4;border-radius:8px;border:1px solid #86efac">
          <div style="font-size:10px;color:#166534;font-weight:700">⬆️ مصاريف ${monthLabel}</div>
          <div style="font-size:13px;font-weight:900;color:#059669">${fmtM(exp.dinar)} د.ع</div>

        </div>
        <div style="text-align:center;padding:10px;background:${close.dinar>0?'#fef2f2':'#f0fdf4'};border-radius:8px;border:2px solid ${close.dinar>0?'#dc2626':'#059669'}">

          <button class="btn btn-green" style="font-size:11px;padding:6px 14px" onclick="const c=getSalafSettlementConfig();c.${person}.personName=(document.getElementById('pname_${person}')?.value||'').trim();c.${person}.openDinar=parseFloat(document.getElementById('opd_${person}')?.value||0);c.${person}.openDollar=parseFloat(document.getElementById('opdl_${person}')?.value||0);DB.set('salaf_settlement_cfg',c);renderContent()">💾 حفظ</button>
        </div>
      </details>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>

          ${advList.length?`<div style="overflow-x:auto;max-height:280px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;min-width:360px"><thead style="position:sticky;top:0"><tr><th class="th" style="background:#7f1d1d">ت</th><th class="th" style="background:#7f1d1d">التاريخ</th><th class="th" style="background:#7f1d1d">البيان</th><th class="th" style="background:#7f1d1d">المصدر</th><th class="th" style="background:#991b1b">دينار</th><th class="th" style="background:#991b1b">دولار</th></tr></thead><tbody>${advRows}<tr style="background:#7f1d1d;color:#fff;font-weight:900"><td class="td" style="color:#fff" colspan="4">الإجمالي</td><td class="td" style="color:#fca5a5">${fmtM(adv.dinar)}</td><td class="td" style="color:#fca5a5">${fmtM(adv.dollar)}</td></tr></tbody></table></div>`:`<div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px;background:#fef2f2;border-radius:8px">لا توجد سلف هذا الشهر</div>`}
        </div>
        <div>
          <div style="font-size:11px;font-weight:900;color:#059669;margin-bottom:6px">📋 المصاريف — ${expList.length} سجل</div>
          ${personName?(expList.length?`<div style="overflow-x:auto;max-height:280px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;min-width:340px"><thead style="position:sticky;top:0"><tr><th class="th" style="background:#14532d">ت</th><th class="th" style="background:#14532d">التاريخ</th><th class="th" style="background:#14532d">التفاصيل</th><th class="th" style="background:#14532d">الجهة</th><th class="th" style="background:#166534">دينار</th><th class="th" style="background:#166534">دولار</th></tr></thead><tbody>${expRows}<tr style="background:#14532d;color:#fff;font-weight:900"><td class="td" style="color:#fff" colspan="4">الإجمالي</td><td class="td" style="color:#86efac">${fmtM(exp.dinar)}</td><td class="td" style="color:#86efac">${fmtM(exp.dollar)}</td></tr></tbody></table></div>`:`<div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px;background:#f0fdf4;border-radius:8px">لا توجد مصاريف باسم "${esc(personName)}" في ${monthLabel}</div>`):`<div style="padding:20px;text-align:center;color:#f59e0b;font-size:12px;border:1px dashed #f59e0b;border-radius:8px">⚠️ حدد اسم الشخص في إعدادات الربط أعلاه</div>`}

    <span style="font-size:14px;font-weight:900;color:#92400e">📊 تسوية السلف — ${monthLabel}</span>
    <button onclick="S.salafSettlementMonth=today().slice(0,7);renderContent()" class="btn btn-amber" style="font-size:11px;padding:5px 12px;margin-right:auto">الشهر الحالي</button>
  </div>
  ${buildCard('حيدر صبري','#dc2626','haidar',cfg.haidar)}
  ${buildCard('محمد خالد','#2563eb','mohammed',cfg.mohammed)}

// ===== نظام الكروب =====
function getKroobList(){let list=DB.get('kroob',[]);list.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));return list;}
function calcKroobBalance(list){
  const opening=DB.get('kroob_opening',{dinar:0,dollar:0});
  const monthOpenings=DB.get('kroob_month_openings',{});
  let balDinar=safeNum(opening.dinar),balDollar=safeNum(opening.dollar),lastMonth='';
  return list.map(e=>{
    const eMonth=(e.date||'').slice(0,7);
    if(eMonth&&eMonth!==lastMonth){
      lastMonth=eMonth;
      if(monthOpenings[eMonth]){balDinar=safeNum(monthOpenings[eMonth].dinar);balDollar=safeNum(monthOpenings[eMonth].dollar);}
    }
    const d=safeNum(e.amount_dinar),dl=safeNum(e.amount_dollar),com=safeNum(e.commission),commD=safeNum(e.commission_dollar);
    if(kroobDir(e,'dinar')==='دائن')balDinar+=d;else balDinar-=d;
    if(kroobDir(e,'dollar')==='دائن')balDollar+=dl;else balDollar-=dl;
    balDinar-=com;balDollar-=commD;
    return{...e,bal_dinar:balDinar,bal_dollar:balDollar};
  });
}

function prevMonth(m){const d=new Date(m+'-01');d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function nextMonth(m){const d=new Date(m+'-01');d.setMonth(d.getMonth()+1);return d.toISOString().slice(0,7);}

function getKroobCarryForward(month){
  // أولاً: الرصيد الافتتاحي المخزن مباشرة من ملف الاستيراد لهذا الشهر
  const monthOpenings=DB.get('kroob_month_openings',{});
  if(monthOpenings[month]) return{dinar:safeNum(monthOpenings[month].dinar),dollar:safeNum(monthOpenings[month].dollar)};
  // ثانياً: حساب تراكمي من الحركات السابقة (للأشهر غير المستوردة)
  const allList=getKroobList(),prevList=allList.filter(e=>(e.date||'').slice(0,7)<month);
  if(!prevList.length){const op=DB.get('kroob_opening',{dinar:0,dollar:0});return{dinar:safeNum(op.dinar),dollar:safeNum(op.dollar)};}
  const withBal=calcKroobBalance(prevList),last=withBal[withBal.length-1];
  return{dinar:safeNum(last.bal_dinar),dollar:safeNum(last.bal_dollar)};
}
function kroobDir(e,cur){
  if(cur==='dinar'){if(e.type_dinar)return e.type_dinar.trim();const op=(e.operation_type||'صرف').trim();return(op==='إيداع'||op==='ايداع'||op==='استلام')?'دائن':'مدين';}
  else{if(e.type_dollar)return e.type_dollar.trim();const op=(e.operation_type||'صرف').trim();return(op==='إيداع'||op==='ايداع'||op==='استلام'||op==='شراء_دولار')?'دائن':'مدين';}
}
function calcKroobBalanceFrom(list,startDinar,startDollar){
  let balDinar=safeNum(startDinar),balDollar=safeNum(startDollar);
  return list.map(e=>{const d=safeNum(e.amount_dinar),dl=safeNum(e.amount_dollar),com=safeNum(e.commission),commD=safeNum(e.commission_dollar);if(kroobDir(e,'dinar')==='دائن')balDinar+=d;else balDinar-=d;if(kroobDir(e,'dollar')==='دائن')balDollar+=dl;else balDollar-=dl;balDinar-=com;balDollar-=commD;return{...e,bal_dinar:balDinar,bal_dollar:balDollar};});
}

function getRafidCarryForward(month){
  const allList=getRafidList(),prevList=allList.filter(e=>(e.date||'').slice(0,7)<month);
  if(!prevList.length){const op=DB.get('rafid_opening',{dinar:0,dollar:0});return{dinar:safeNum(op.dinar),dollar:safeNum(op.dollar)};}
  const withBal=calcRafidBalance(prevList),last=withBal[withBal.length-1];
  return{dinar:safeNum(last.bal_dinar),dollar:safeNum(last.bal_dollar)};
}
function calcRafidBalanceFrom(list,startDinar,startDollar){
  let balDinar=safeNum(startDinar),balDollar=safeNum(startDollar);
  return list.map(e=>{const d=safeNum(e.dinar),dl=safeNum(e.dollar),com=safeNum(e.commission),commD=safeNum(e.commission_dollar),tdD=(e.type_dinar||'مدين').trim(),tdDol=(e.type_dollar||'مدين').trim();if(tdD==='دائن')balDinar+=d;else balDinar-=d;if(tdDol==='دائن')balDollar+=dl;else balDollar-=dl;balDinar-=com;balDollar-=commD;return{...e,bal_dinar:balDinar,bal_dollar:balDollar};});
}

function setKroobSearch(val,pos){S.kroobSearch=val;renderContent();setTimeout(()=>{const i=document.getElementById('kroob_search_inp');if(i){i.focus();i.setSelectionRange(pos,pos);}},0);}
function setRafidSearch(val,pos){S.rafidSearch=val;renderContent();setTimeout(()=>{const i=document.getElementById('rafid_search_inp');if(i){i.focus();i.setSelectionRange(pos,pos);}},0);}
function setExpSearch(val,pos){S.expSearch=val;renderContent();setTimeout(()=>{const i=document.getElementById('exp_search_inp');if(i){i.focus();i.setSelectionRange(pos,pos);}},0);}
function viewKroob(){
  const month=S.kroobMonth||today().slice(0,7);
  const mnNames={'01':'يناير','02':'فبراير','03':'مارس','04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'};
  const[yr,mn]=month.split('-');
  const monthLabel=(mnNames[mn]||mn)+' '+yr;
  const[cYr,cMn]=today().slice(0,7).split('-');
  const iraqiMn={'01':'كانون الثاني','02':'شباط','03':'آذار','04':'نيسان','05':'أيار','06':'حزيران','07':'تموز','08':'آب','09':'أيلول','10':'تشرين الأول','11':'تشرين الثاني','12':'كانون الأول'};
  const curMonthLabel=(iraqiMn[cMn]||cMn)+' '+cYr;
  const search=S.kroobSearch||'';
  const searchTrim=search.trim();
  const searchAll=!!S.kroobSearchAll;
  const kroobMatchFn=e=>!searchTrim||[(e.description||''),(e.beneficiary||''),(e.receiver||'')].some(f=>f.includes(searchTrim));
  const editId=S.kroobEditId||'',allList=getKroobList();
  const opening=DB.get('kroob_opening',{dinar:0,dollar:0});
  const carry=getKroobCarryForward(month);
  const monthBaseList=allList.filter(e=>(e.date||'').startsWith(month));
  const monthList=searchTrim?(searchAll?allList:monthBaseList).filter(kroobMatchFn):monthBaseList;
  const monthWithBal=searchTrim?(searchAll?calcKroobBalanceFrom(allList,opening.dinar,opening.dollar).filter(kroobMatchFn):calcKroobBalanceFrom(monthBaseList,carry.dinar,carry.dollar).filter(kroobMatchFn)):calcKroobBalanceFrom(monthBaseList,carry.dinar,carry.dollar);
  const editData=editId?allList.find(e=>e.id===editId):null;
  const lastRow=monthWithBal[monthWithBal.length-1];
  const curBalDinar=lastRow?lastRow.bal_dinar:carry.dinar;
  const curBalDollar=lastRow?lastRow.bal_dollar:carry.dollar;
  const monthComm=monthList.reduce((s,e)=>s+parseFloat(e.commission||0),0);
  const isCurrentMonth=month===today().slice(0,7);

function generateKroobPDF(month,mode){
  const allList=getKroobList(),withBal=calcKroobBalance(allList),opening=DB.get('kroob_opening',{dinar:0,dollar:0});
  const monthList=withBal.filter(e=>(e.date||'').startsWith(month));
  if(!monthList.length){showToast('لا توجد حركات في هذا الشهر','warning');return;}
  const fmt=v=>{const n=parseFloat(v||0);return n?Math.abs(n).toLocaleString('en-US'):'';};
  const fmtS=v=>{const n=parseFloat(v||0);return n?n.toLocaleString('en-US'):'';};
  const carry=getKroobCarryForward(month);
  const opDinar=carry.dinar;
  const opDollar=carry.dollar;
  const lastEntry=monthList[monthList.length-1];
  const mnNames={'01':'يناير','02':'فبراير','03':'مارس','04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'};
  const[yr,mn]=month.split('-');
  const monthLabel=(mnNames[mn]||mn)+' '+yr;
  const rows=monthList.map((e,i)=>{
    const tdD=kroobDir(e,'dinar'),tdDol=kroobDir(e,'dollar');
    const dainD=tdD==='دائن'?fmt(e.amount_dinar):'',madinD=tdD==='مدين'?fmt(e.amount_dinar):'';
    const dainDol=tdDol==='دائن'?fmt(e.amount_dollar):'',madinDol=tdDol==='مدين'?fmt(e.amount_dollar):'';
    return`<tr>
      <td style="text-align:center">${i+1}</td>
      <td style="text-align:center">${e.date||''}</td>
      <td style="text-align:right">${esc(e.description||'')}</td>
      <td style="text-align:right">${esc(e.beneficiary||'')}</td>
      <td style="text-align:right">${esc(e.receiver||'')}</td>
      <td style="text-align:center;color:#059669">${dainD}</td>
      <td style="text-align:center;color:#c00">${madinD}</td>
      <td style="text-align:center;color:#2563eb">${dainDol}</td>
      <td style="text-align:center;color:#c00">${madinDol}</td>
      <td style="text-align:center">${esc(e.operation_type||'')}</td>
      <td style="text-align:center">${fmt(e.commission)}</td>
      <td style="text-align:center">${fmt(e.commission_dollar)}</td>
      <td style="text-align:center;color:${e.bal_dinar>=0?'#000':'#c00'};font-weight:900">${fmtS(e.bal_dinar)}</td>
      <td style="text-align:center;color:${e.bal_dollar>=0?'#000':'#c00'};font-weight:900">${fmtS(e.bal_dollar)}</td>
    </tr>`;
  }).join('');
  const styles=`@page{size:A4 landscape;margin:10mm 8mm}body{font-family:'Cairo',sans-serif;font-size:11px;direction:rtl;color:#000;margin:0}h2{text-align:center;color:#065f46;font-size:15px;margin:0 0 4px}.sub{text-align:center;color:#065f46;font-size:11px;margin:0 0 8px}table{width:100%;border-collapse:collapse;font-size:10px}th{background:#fff;color:#000;font-weight:900;border:2px solid #000;padding:5px 3px;text-align:center}td{border:2px solid #000;padding:4px 3px;color:#000;font-weight:700}.op-row td{background:#e0f2fe;color:#0c4a6e;font-weight:900}.cl-row td{background:#065f46;color:#fff;font-weight:900;text-align:center}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}`;

  if(mode==='save'){

// ──────────── مطابقة PDF الصيرفة ────────────
function parseSairafaPDF(rawText,currency='dinar'){
  const isDollar=currency==='dollar';
  const rows=[];
  const lines=rawText.normalize('NFKC').replace(/\r/g,'').split('\n').map(l=>l.trim()).filter(Boolean);
  // أحرف الناقص في جميع أشكالها: ASCII + رياضي + شرطة en/em
  const MINUS_RE=/[-−–—]/;
  // دالة مساعدة: هل الرمز ناقص؟ (بجميع أشكاله)
  const isMinusChar=c=>MINUS_RE.test(c);
  // فلترة التوكن: يُستبعد إذا كان رقماً (مع فواصل واختياري ناقص في النهاية أو البداية)
  const isNumericToken=t=>/^[−\-]?[\d,]+[−\-]?$/.test(t)||/^[−\-]+$/.test(t);

  let prevBal=null;
  const usedCommLines=new Set(); // يمنع استخدام سطر العمولة مرتين لصفين مختلفين
  for(const line of lines){
    if(/ﻖﺑﺎﺳﺪﻴﺻﺭ/.test(line)||/رصيد.{0,8}سابق/i.test(line)||/سابق.{0,8}رصيد/i.test(line)){
      const amRe=/\b[\d,]+\b/g; let am, lastVal=null, lastNeg=false;
      while((am=amRe.exec(line))!==null){
        const v=parseFloat(am[0].replace(/,/g,''));
        if(v<=100)continue;
        const after=line.slice(am.index+am[0].length, am.index+am[0].length+8);
        const before=line.slice(Math.max(0,am.index-3), am.index);
        // الـ "-" علامة سالبة فقط إذا جاء مباشرة ملاصقاً للرقم (بلا مسافة)
        // وإلا فهو فاصل عمود مثل "1,173,161,399 - - - رصيد سابق"
        const neg=(/^[−\-–—](?!\s*\d)/.test(after))||(/[−\-–]\s*$/.test(before));
        lastVal=v; lastNeg=neg;
      }
      if(lastVal!==null){prevBal=lastNeg?-lastVal:lastVal;break;}
    }
  }

  for(let li=0;li<lines.length;li++){
    const line=lines[li];
    if(!/\d{4}-\d{2}-\d{2}/.test(line))continue;
    const dM=line.match(/(\d{4}-\d{2}-\d{2})/);if(!dM)continue;
    const date=dM[1];
    const docM=line.match(/\b(\d{5,6})\b/);
    const docNo=docM?docM[1]:'';

    // ── استخراج نوع الحركة والبيان أولاً (لاستخدامهما في تحديد الاتجاه) ──
    const tokens=line.split(/\s+/);
    // استبعاد: تواريخ، أرقام بجميع أشكال الناقص، رموز ناقص منفردة، توكنات قصيرة
    const descTokens=tokens.filter(t=>
      !/^\d{4}-\d{2}-\d{2}$/.test(t) &&
      !isNumericToken(t) &&
      t.length>1
    );
    const txType=descTokens.length>0?descTokens[0]:'';
    const desc=descTokens.slice(1).join(' ').trim();

    // الاتجاه من نوع العملية: وارد=دائن، صادر=مدين
    // دينار: ايداع/قبض=دائن | دولار: ايداع/قبض/بيع=دائن
    const _baseCredit=/^([إا]يداع|قبض)$/.test(txType);
    const _dollarBuy=isDollar&&txType==='بيع';
    const typeByText=(_baseCredit||_dollarBuy)?'دائن':'مدين';

    // ── استخراج المبالغ الرئيسية (رصيد + معاملة) مع تتبع المواضع ──
    // المرحلة 1: دائماً يشترط فاصلة و>= 1000 (الرصيد والمعاملات الكبيرة دائماً بفاصلة)
    const amounts=[];
    const amPositions=[];
    const amRe=/\b[\d,]+\b/g; let am;
    while((am=amRe.exec(line))!==null){
      if(!am[0].includes(','))continue;
      const v=parseFloat(am[0].replace(/,/g,''));
      if(v<1000)continue;
      const digitLen=am[0].replace(/,/g,'').length;
      if(digitLen<=4){
        const prevCh=am.index>0?line[am.index-1]:'';
        const nextCh=line[am.index+am[0].length]||'';
        if(prevCh==='-'||nextCh==='-')continue;
      }
      amounts.push(v);
      amPositions.push({start:am.index,end:am.index+am[0].length});
      if(amounts.length>=2)break;
    }
    // المرحلة 2: لـ PDF الدولار فقط — إذا وُجد الرصيد وحده (معاملة صغيرة بلا فاصلة كـ 400$)
    // خذ أكبر رقم بلا فاصلة بعد الرصيد (ليكون المبلغ لا العمولة)
    if(isDollar&&amounts.length===1){
      const rest=line.substring(amPositions[0].end);
      const cands=[];
      const r2=/\b(\d{1,4})\b/g; let m2;
      while((m2=r2.exec(rest))!==null){
        const v2=parseInt(m2[1]);
        if(v2<1)continue;
        const pc=m2.index>0?rest[m2.index-1]:'';
        const nc=rest[m2.index+m2[1].length]||'';
        if(pc==='-'||nc==='-')continue;
        cands.push({v:v2,s:amPositions[0].end+m2.index,e:amPositions[0].end+m2.index+m2[1].length});
      }
      if(cands.length){
        cands.sort((a,b)=>b.v-a.v); // أكبر رقم = المبلغ لا العمولة
        amounts.push(cands[0].v);
        amPositions.push({start:cands[0].s,end:cands[0].e});
      }
    }
    if(amounts.length<2)continue;

    // ── استخراج العمولة ──
    // أولاً: ابحث في النص بين الرقمَين على نفس السطر
    let commAmt=0;
    if(amPositions[0].end<amPositions[1].start){
      const between=line.substring(amPositions[0].end,amPositions[1].start);
      const cRe=/\b(\d{1,5})\b/g; let cm;
      while((cm=cRe.exec(between))!==null){
        const cv=parseInt(cm[1]);
        if(cv<1)continue;
        const pc=cm.index>0?between[cm.index-1]:'';
        const nc=between[cm.index+cm[1].length]||'';
        if(pc==='-'||nc==='-')continue;
        commAmt=cv;
      }
    }
    // ثانياً: ابحث بعد amounts[1] مباشرة في نفس السطر (للدولار فقط)
    // الترتيب الفعلي في PDF الدولار: [رصيد]   [صادر/وارد]   [عمولة]  [نص...]
    if(commAmt===0&&isDollar&&amPositions.length>=2){
      const after=line.substring(amPositions[1].end);
      const firstNum=/^\s*(\d{1,4})\b/.exec(after);
      if(firstNum){
        const cv=parseInt(firstNum[1]);
        if(cv>=1)commAmt=cv;
        // لو كانت 0 → نبقى commAmt=0 (ولا نكمل البحث في الأسطر المجاورة)
      }
    }
    // ثالثاً: إذا لم تُوجد — ابحث في السطور المجاورة (±3 سطور)
    // بعض PDFs تضع قيمة العمولة في سطر Y مختلف قليلاً فتنفصل عن سطر البيانات
    if(commAmt===0){
      outer:for(let dk=1;dk<=3;dk++){
        for(const sign of [1,-1]){
          const adjIdx=li+sign*dk;
          if(adjIdx<0||adjIdx>=lines.length||usedCommLines.has(adjIdx))continue;
          const adj=lines[adjIdx].trim();
          if(!adj||/\d{4}-\d{2}-\d{2}/.test(adj))continue;
          const solo=/^(\d{1,4})$/.exec(adj);
          if(solo){
            const cv=parseInt(solo[1]);
            usedCommLines.add(adjIdx); // احجز السطر حتى لو العمولة صفر
            if(cv>=1)commAmt=cv;
            break outer; // توقف بعد أول رقم منفرد (حتى لو 0)
          }
        }
      }
    }

    // ── تحديد الاتجاه والرصيد ──
    const rawBal=amounts[0];
    const txAmt=amounts[1];
    const mainAmt=txAmt,commission=commAmt;
    // الاتجاه مباشرةً من نوع العملية (لا حسابات رياضية — تفشل مع الأرصدة السالبة)
    const type=typeByText;
    // إشارة الرصيد: نحسب الرصيد المتوقع ثم نأخذ القيمة المطلقة من PDF مع إشارته
    let balance;
    if(prevBal!==null){
      const nb=type==='مدين'?prevBal-mainAmt-commission:prevBal+mainAmt;
      balance=(nb<0?-1:1)*rawBal;
    }else{
      balance=(type==='دائن'?1:-1)*rawBal;
    }
    prevBal=balance;

    if(mainAmt>0)rows.push({date,docNo,txType,desc,amount:mainAmt,commission,type,balance});
  }
  return rows;
}
async function extractPDFText(file){
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc)
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const arr=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:arr}).promise;
  let fullText='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const items=tc.items.map(i=>({str:i.str,x:i.transform[4],y:i.transform[5]}));
    const rowMap={};
    items.forEach(i=>{const yk=Math.round(i.y/5)*5;(rowMap[yk]=rowMap[yk]||[]).push(i);});
    const pageLines=Object.keys(rowMap).map(Number).sort((a,b)=>b-a)
      .map(yk=>rowMap[yk].sort((a,b)=>b.x-a.x).map(i=>i.str).join(' '));
    fullText+=pageLines.join('\n')+'\n';
  }
  return fullText;
}
function matchSysWithPDF(sysRows,pdfRows,amtField,dirFn){
  const used=new Set();
  const matched=[],pdfOnly=[];
  for(const pR of pdfRows){
    if(!pR.amount)continue;
    const cands=[];
    sysRows.forEach((s,idx)=>{
      if(used.has(idx))return;
      const sA=parseFloat(s[amtField]||0);
      if(Math.abs(sA-pR.amount)<1&&dirFn(s)===pR.type)
        cands.push({idx,s,dd:Math.abs(Date.parse(s.date||'')-Date.parse(pR.date))});
    });
    cands.sort((a,b)=>a.dd-b.dd);
    if(cands.length){used.add(cands[0].idx);matched.push({pdf:pR,sys:cands[0].s,dd:cands[0].dd});}
    else pdfOnly.push({pdf:pR});
  }
  const sysOnly=sysRows.map((s,i)=>({s,i})).filter(({i,s})=>!used.has(i)&&parseFloat(s[amtField]||0)>0).map(({s})=>({sys:s}));
  return{matched,pdfOnly,sysOnly};
}

async function importKroobPDF(input,currency){
  const file=input.files[0];if(!file)return;
  if(!window.pdfjsLib){showToast('PDF.js لم يُحمَّل بعد، أعد المحاولة','error');return;}
  showToast('جاري قراءة PDF...','info');
  try{
    const raw=await extractPDFText(file);
    const pdfRows=parseSairafaPDF(raw,currency||'dinar');
    if(!pdfRows.length){showToast('لم يُستخرج أي بيانات — تأكد من الملف','error');return;}
    const dates=pdfRows.map(r=>r.date).filter(Boolean).sort();
    if(dates.length){S.kroobPdfFrom=dates[0];S.kroobPdfTo=dates[dates.length-1];}
    S.kroobPdfData={rows:pdfRows,fileName:file.name,currency:currency||'dinar'};
    showToast('تم استيراد '+pdfRows.length+' حركة من PDF','success');
    renderContent();
  }catch(e){showToast('خطأ: '+(e.message||'فشل قراءة PDF'),'error');}
}

async function cleanKroobDateless(){

  if(!bad.length){showToast('لا توجد حركات بدون تاريخ','info');return;}

  try{await Promise.all(bad.map(e=>FDB.delete('kroob',e.id)));}catch(_){}

function suggestKroobDirection(text){
  const t=(text||'').trim();
  if(!t)return;
  const creditWords=['إيداع','ايداع','استلام','قبض','تحصيل','وارد'];
  const debitWords=['صرف','سحب','حوالة','دفع','صادر'];
  const isCredit=creditWords.some(w=>t.includes(w));
  const isDebit=!isCredit&&debitWords.some(w=>t.includes(w));
  if(!isCredit&&!isDebit)return;
  const dir=isCredit?'دائن':'مدين';
  const selD=document.getElementById('kr_type_dinar'),selDol=document.getElementById('kr_type_dollar');
  if(selD)selD.value=dir;
  if(selDol)selDol.value=dir;
}
function autoKroobCommission(force){
  const opType=(document.getElementById('kr_op_type')?.value||'').trim();
  if(!/حواله|حوالة/.test(opType))return;
  const desc=(document.getElementById('kr_desc')?.value||'').trim();
  const dinar=parseFloat(document.getElementById('kr_dinar')?.value||0);
  if(!dinar&&!force)return;
  const isKurdish=/أربيل|اربيل|سليمانية|سليمانيه|دهوك/.test(desc);
  const rate=isKurdish?0.002:0.001;
  const comm=dinar?Math.ceil(dinar*rate/1000)*1000:0;
  const commEl=document.getElementById('kr_comm');
  if(commEl)commEl.value=comm||'';
  const rateEl=document.getElementById('kr_comm_rate_hint');
  if(rateEl)rateEl.textContent=dinar?(isKurdish?'0.2%':'0.1%'):'';
}

async function clearKroobMonth(){

  const[yr,mn]=month.split('-');
  const label=(mnNames[mn]||mn)+' '+yr;

  const monthOpenings=DB.get('kroob_month_openings',{});

  DB.set('kroob_month_openings',monthOpenings);
  if(window._fbReady){
    try{
      const{db,collection,getDocs,deleteDoc,doc}=window._fb;
      const snap=await getDocs(collection(db,'kroob'));
      const toDelFB=snap.docs.filter(d=>d.data().date?.startsWith(month));

      await deleteDoc(doc(db,'kroob_month_openings',month));
    }catch(e){console.warn('Firebase error:',e);}

function importKroobXLSX(input){
  const file=input.files[0];if(!file||typeof XLSX==='undefined')return;
  const reader=new FileReader();
  reader.onload=async function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    // قراءة الرصيد الافتتاحي — الأولوية: "الرصيد من الشهر السابق" ثم "مدور"
    let opDinar=0,opDollar=0;
    const OPENING_KEYWORDS=['الرصيد من الشهر السابق','من الشهر السابق','رصيد سابق','رصيد أول المدة','رصيد اول المدة'];
    const MADWAR_KEYWORDS=['مدور','رصيد مدور'];
    // يتعامل مع أرقام تحتوي $ أو د.ع أو فراغات أو أرقام عربية
    function parseNum(v){const s=String(v||'').replace(/[$,،\s‏‎‫‬]/g,'').replace(/[^\d.\-]/g,'');return parseFloat(s)||0;}
    function extractBalFromRow(row){
      // العمود L (index 11) = رصيد الدولار | العمود M (index 12) = رصيد الدينار
      const d=parseNum(row[12]);
      const dl=parseNum(row[11]);
      if(d) return{d,dl};
      // fallback إذا كانت الأعمدة فارغة
      let fd=0,fdl=0;
      for(let i=0;i<row.length;i++){const v=parseNum(row[i]);if(v>100000000&&v>fd)fd=v;}
      for(let i=0;i<row.length;i++){const v=parseNum(row[i]);if(v!==0&&Math.abs(v)!==fd&&Math.abs(v)<10000000)fdl=v;}
      return{d:fd,dl:fdl};
    }
    // 1) البحث عن "الرصيد من الشهر السابق" في كل الملف (أول تطابق)
    for(let ri=0;ri<rows.length;ri++){
      const rowStr=rows[ri].map(v=>String(v||'')).join('|');
      if(OPENING_KEYWORDS.some(k=>rowStr.includes(k))){
        const b=extractBalFromRow(rows[ri]);
        if(b.d){opDinar=b.d;opDollar=b.dl;break;}
      }
    }
    // 2) إذا لم يوجد: البحث عن "مدور" في أول 6 صفوف فقط
    if(!opDinar){
      for(let ri=0;ri<Math.min(rows.length,6);ri++){
        const rowStr=rows[ri].map(v=>String(v||'')).join('|');
        if(MADWAR_KEYWORDS.some(k=>rowStr.includes(k))){
          const b=extractBalFromRow(rows[ri]);
          if(b.d){opDinar=b.d;opDollar=b.dl;break;}
        }
      }
    }
    // 3) بديل أخير: البحث في صف العناوين عن "رصيد الدينار" / "رصيد الدولار"
    if(!opDinar){
      const row0=rows[0]||[];
      for(let i=0;i<row0.length-1;i++){
        const lbl=String(row0[i]||'');
        if(lbl.includes('رصيد الدينار')) opDinar=parseFloat(String(row0[i+1]||'').replace(/,/g,''))||0;
        if(lbl.includes('رصيد الدولار')) opDollar=parseFloat(String(row0[i+1]||'').replace(/,/g,''))||0;
      }
    }
    // الرصيد الافتتاحي سيُحدَّث فقط إذا كان الشهر المستورد هو الأقدم — انظر أسفل الدالة

    // ===== قراءة الحركات بأعمدة ثابتة (تنسيق الصيرفة) =====
    // row[0]=ت | row[1]=تاريخ | row[2]=بيان | row[3]=جهة | row[4]=مستلم
    // row[5]=مبلغ دولار | row[6]=مبلغ دينار | row[7]=دائن دولار | row[8]=مدين دولار
    // row[9]=دائن دينار | row[10]=مدين دينار | row[11]=رصيد دولار | row[12]=رصيد دينار
    // row[13]=نوع العملية | row[14]=عمولة دينار | row[15]=عمولة دولار

    let kroob=[],imported=0;

    for(let r=2;r<rows.length;r++){
      const row=rows[r];
      const num=String(row[0]||'').trim();
      if(!num||isNaN(parseFloat(num)))continue;
      // تخطي صفوف الرصيد المرحّل (الرصيد من الشهر السابق / مدور)
      const rowStr2=row.map(v=>String(v||'')).join('|');
      if(OPENING_KEYWORDS.some(k=>rowStr2.includes(k))||MADWAR_KEYWORDS.some(k=>rowStr2.includes(k)))continue;

      // التاريخ
      const rawDate=String(row[1]||'').trim();
      let date='';
      const m1=rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);
      const m2=rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      const m3=rawDate.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if(m1) date=m1[1]+'-'+m1[2]+'-'+m1[3];
      else if(m2) date=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
      else if(m3) date=m3[3]+'-'+m3[2].padStart(2,'0')+'-'+m3[1].padStart(2,'0');
      else{const n=parseFloat(rawDate);if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);date=dt.toISOString().split('T')[0];}}

      const desc         = String(row[2]||'').trim();
      const benef        = String(row[3]||'').trim();
      const recv         = String(row[4]||'').trim();
      const creditDollar = parseNum(row[7]);   // H دائن دولار
      const debitDollar  = parseNum(row[8]);   // I مدين دولار
      const creditDinar  = parseNum(row[9]);   // J دائن دينار
      const debitDinar   = parseNum(row[10]);  // K مدين دينار
      const rawOpType    = String(row[13]||'').trim()||'صرف'; // N نوع العملية
      const commDinar    = parseNum(row[14]);  // O عمولة دينار
      const commDollar   = parseNum(row[15]);  // P عمولة دولار

      // تحديد نوع العملية والمبالغ بدقة من أعمدة H/I/J/K
      let finalOpType, finalAmountDinar, finalAmountDollar;
      if(creditDollar>0 && debitDinar>0){
        // شراء دولار: خصم دينار + إضافة دولار
        finalOpType='شراء_دولار'; finalAmountDinar=debitDinar; finalAmountDollar=creditDollar;
      } else if(creditDinar>0){
        // استلام: إضافة دينار
        finalOpType='استلام'; finalAmountDinar=creditDinar; finalAmountDollar=0;
      } else {
        // صرف/حواله/تحويل: خصم
        finalOpType=rawOpType;
        finalAmountDinar=debitDinar||parseNum(row[6])||0;
        finalAmountDollar=debitDollar||parseNum(row[5])||0;
      }

      if(!finalAmountDinar&&!finalAmountDollar&&!desc)continue;

      const finalTypeDinar=creditDinar>0?'دائن':'مدين';
      const finalTypeDollar=creditDollar>0?'دائن':'مدين';
      const id='kr_xl_'+r+'_'+Date.now();
      kroob.push({id,date,description:desc,operation_type:finalOpType,type_dinar:finalTypeDinar,type_dollar:finalTypeDollar,beneficiary:benef,receiver:recv,
        amount_dinar:finalAmountDinar,amount_dollar:finalAmountDollar,commission:commDinar,commission_dollar:commDollar,
        accountant:currentUser?.email||'import',time:Date.now()+r});
      imported++;
    }

    if(!kroob.length){showToast('لم يتم العثور على بيانات صالحة في الملف','error');return;}

    // تحديد الشهر المستهدف: الشهر الأكثر تكراراً في البيانات (لتجنب خلل تاريخ يوم 31 من الشهر السابق)
    kroob.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));
    const _kroobMonthCounts={};
    kroob.forEach(e=>{if(e.date){const m=e.date.slice(0,7);_kroobMonthCounts[m]=(_kroobMonthCounts[m]||0)+1;}});
    const targetMonth=Object.entries(_kroobMonthCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'';
    if(!targetMonth){showToast('لا يمكن تحديد شهر الملف — تأكد من صحة عمود التاريخ','error');return;}

    // حذف سجلات الشهر المستهدف فقط من البيانات الحالية
    let existing=DB.get('kroob',[]);
    const toDelete=existing.filter(e=>(e.date||'').startsWith(targetMonth));
    if(toDelete.length) await Promise.all(toDelete.map(e=>FDB.delete('kroob',e.id)));
    existing=existing.filter(e=>!(e.date||'').startsWith(targetMonth));

    // دمج الشهر الجديد مع باقي الأشهر
    const allKroob=[...existing,...kroob];
    allKroob.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));

    // تحديث الرصيد الافتتاحي العام فقط إذا كان الشهر المستورد هو الأقدم
    const firstMonth=allKroob.find(e=>e.date)?.date?.slice(0,7)||'';
    const shouldUpdateOpening=(opDinar!==0||opDollar!==0)&&targetMonth===firstMonth;
    if(shouldUpdateOpening) DB.set('kroob_opening',{dinar:opDinar,dollar:opDollar});

    // حفظ رصيد افتتاحي خاص بهذا الشهر — يُستخدم مباشرة بدلاً من الحساب التراكمي
    if(opDinar!==0||opDollar!==0){
      const monthOpenings=DB.get('kroob_month_openings',{});
      monthOpenings[targetMonth]={dinar:opDinar,dollar:opDollar};
      DB.set('kroob_month_openings',monthOpenings);
    }

    DB.set('kroob',allKroob);
    DB.set('kroob_cleared',false);
    renderContent();
    showToast('⏳ جاري الحفظ في السحابة...','info',3000);
    try{
      const saves=[...kroob.map(k=>FDB.save('kroob',k.id,k))];
      if(shouldUpdateOpening) saves.push(FDB.save('kroob_opening','opening',{dinar:opDinar,dollar:opDollar}));
      if(opDinar!==0||opDollar!==0) saves.push(FDB.save('kroob_month_openings',targetMonth,{id:targetMonth,dinar:opDinar,dollar:opDollar}));
      await Promise.all(saves);
      showToast('✅ تم استيراد '+imported+' حركة لشهر '+targetMonth+' وحفظها في السحابة ☁️','success',5000);
    }catch(err){
      showToast('✅ تم الاستيراد محلياً | ⚠️ فشل الحفظ في السحابة: '+err.message,'warning',5000);
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function getRafidList(){let list=DB.get('rafid_accounts',[]);list.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));return list;}
function calcRafidBalance(list){const opening=DB.get('rafid_opening',{dinar:0,dollar:0});let balDinar=parseFloat(opening.dinar||0),balDollar=parseFloat(opening.dollar||0);return list.map(e=>{const d=parseFloat(e.dinar||0),dl=parseFloat(e.dollar||0),com=parseFloat(e.commission||0),commD=parseFloat(e.commission_dollar||0),tdD=(e.type_dinar||'مدين').trim(),tdDol=(e.type_dollar||'مدين').trim();if(tdD==='دائن')balDinar+=d;else balDinar-=d;if(tdDol==='دائن')balDollar+=dl;else balDollar-=dl;balDinar-=com;balDollar-=commD;return{...e,bal_dinar:balDinar,bal_dollar:balDollar};});}
