<script>
// ===== قاعدة البيانات (Firebase + localStorage للنسخ الاحتياطي) =====
const DB = {
  get(key, def) { try { const v=localStorage.getItem('oil_'+key); return v?JSON.parse(v):(def!==undefined?def:[]); } catch { return (def!==undefined?def:[]); } },
  set(key, val) { try { localStorage.setItem('oil_'+key, JSON.stringify(val)); } catch {} }
};

// Firebase Cloud DB
const FDB = {
  async save(collection, id, data) {
    try {
      if (!window._fbReady) return;
      const {db, doc, setDoc} = window._fb;
      await setDoc(doc(db, collection, id), {...data, _updated: Date.now()});
    } catch(e) { console.warn('FDB.save error:', e); }
  },
  async delete(collection, id) {
    try {
      if (!window._fbReady) return;
      const {db, doc, deleteDoc} = window._fb;
      await deleteDoc(doc(db, collection, id));
    } catch(e) { console.warn('FDB.delete error:', e); }
  },
  async getAll(col) {
    try {
      if (!window._fbReady) return null;
      const {db, collection, getDocs} = window._fb;
      const snap = await getDocs(collection(db, col));
      return snap.docs.map(d => d.data());
    } catch(e) { console.warn('FDB.getAll error:', e); return null; }
  },
  listen(col, callback) {
    try {
      if (!window._fbReady) { setTimeout(()=>this.listen(col,callback), 1000); return; }
      const {db, collection, onSnapshot} = window._fb;
      return onSnapshot(collection(db, col), snap => {
        callback(snap.docs.map(d => d.data()));
      });
    } catch(e) { console.warn('FDB.listen error:', e); }
  }
};

// Sync from Firebase to localStorage on load
async function syncFromCloud() {
  try {
    const [entries, sales, drivers, salaf] = await Promise.all([
      FDB.getAll('entries'), FDB.getAll('sales'),
      FDB.getAll('drivers'), FDB.getAll('salaf')
    ]);
    if (entries && entries.length) {
      const local = DB.get('entries', []);
      const merged = {};
      local.forEach(function(e){ merged[e.id] = e; });
      entries.forEach(function(e){ merged[e.id] = e; });
      DB.set('entries', Object.values(merged));
    }
    if (sales && sales.length) {
      const localS = DB.get('sales', []);
      const mergedS = {};
      localS.forEach(function(s){ mergedS[s.id] = s; });
      sales.forEach(function(s){ mergedS[s.id] = s; });
      DB.set('sales', Object.values(mergedS));
    }
    if (salaf && salaf.length) DB.set('salaf', salaf);
    const expenses = await FDB.getAll('expenses');
    if (expenses && expenses.length) DB.set('expenses', expenses);
    const kroob = await FDB.getAll('kroob');
    if (kroob && kroob.length) DB.set('kroob', kroob);
    const kroobOpeningArr = await FDB.getAll('kroob_opening');
    if (kroobOpeningArr && kroobOpeningArr.length) {
      const op = kroobOpeningArr.find(x => x.id === 'opening') || kroobOpeningArr[0];
      if (op) DB.set('kroob_opening', {dinar: parseFloat(op.dinar||0), dollar: parseFloat(op.dollar||0)});
    }
    if (drivers && drivers.length) {
      const driversObj = {};
      drivers.forEach(d => { if(d.name) driversObj[d.name] = d; });
      DB.set('drivers', driversObj);
    }
    console.log('✅ Synced from Firebase');
    return true;
  } catch(e) { console.warn('Sync error:', e); return false; }
}

// ===== تشفير كلمات السر =====
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
async function verifyPassword(password, hash) {
  if (!hash || !hash.match(/^[0-9a-f]{64}$/)) return password === hash;
  const hashed = await hashPassword(password);
  return hashed === hash;
}

// ===== مساعدات =====
// دوال العرض مع تصحيح تلقائي للوحدات
function sc(v){ return parseFloat(v)||0; }
function fmtTon(v)  { return fmt(sc(v)); }
function fmtLiter(v){ return fmt(sc(v)); }
function fmtKg(v)   { return fmt(sc(v)); }

function fmtKaban(v){
  const n = parseFloat(v);
  if (!n || isNaN(n)) return '0';
  return n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:3});
}
function fmt(v,d=3){
  const n=parseFloat(v); if(!n||isNaN(n))return'0';
  const fixed=n.toFixed(d);
  const parts=fixed.split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const dec=parts[1]?parts[1].replace(/0+$/,''):'';
  return dec?parts[0]+'.'+dec:parts[0];
}
function fmtM(v){ var n=Math.round(parseFloat(v)||0); return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function today(){ return new Date().toISOString().split('T')[0]; }
function uid(e){ return e.replace(/[\.\@\+]/g,'_'); }
function el(id){ return document.getElementById(id); }

// ===== تصحيح القيم تلقائياً =====
function fixEntry(e) { return e; }
function fixSale(s) { return s; }
function loadEntries() { return DB.get('entries',[]).map(fixEntry); }
function loadSales()   { return DB.get('sales',[]).map(fixSale);   }

// ===== تحليل =====
function getAnalysis(fromDate, toDate) {
  let entries = loadEntries();
  if(fromDate) entries = entries.filter(e=>e.date>=fromDate);
  if(toDate)   entries = entries.filter(e=>e.date<=toDate);
  const t=today(), res={};
  for (const f of FACTORIES) {
    const ft=entries.filter(e=>e.factory===f), fd=ft.filter(e=>e.date===t);
    const agg=arr=>({cars:arr.length,tons:arr.reduce((s,e)=>s+sc(e.qty_tons),0),liters:arr.reduce((s,e)=>s+sc(e.natural_liters),0),kg:arr.reduce((s,e)=>s+sc(e.weight_kg),0),money:arr.reduce((s,e)=>s+parseFloat(e.refinery_price||0),0)});
    res[f]={today:agg(fd),total:agg(ft)};
  }
  return res;
}
function getSaleAnalysis(fromDate, toDate) {
  let sales = loadSales();
  if(fromDate) sales = sales.filter(s=>s.date>=fromDate);
  if(toDate)   sales = sales.filter(s=>s.date<=toDate);
  const t=today(), res={};
  for (const f of FACTORIES) {
    const ft=sales.filter(s=>s.factory===f), fd=ft.filter(s=>s.date===t);
    const agg=arr=>({cars:arr.length,kaban:arr.reduce((s,e)=>s+parseFloat(e.kaban||0),0),liters:arr.reduce((s,e)=>s+parseFloat(e.qty_liters||0),0),money:arr.reduce((s,e)=>s+(parseFloat(e.advance||0)*parseFloat(e.received||0)),0)});
    res[f]={today:agg(fd),total:agg(ft)};
  }
  return res;
}

}

function setThisWeek(){
  const now=new Date(), day=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  S.wFrom=mon.toISOString().split('T')[0]; S.wTo=sun.toISOString().split('T')[0]; renderContent();
}
function setThisMonth(){
  const now=new Date();
  S.wFrom=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
  S.wTo=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
  renderContent();
}

function copyWhatsapp() {
  const wf=S.wFrom, wt=S.wTo;
  const analysis=getAnalysis(wf,wt), saleAn=getSaleAnalysis(wf,wt), sf=S.selectedFactory;
  const facts=sf==='الكل'?FACTORIES:[sf];
  const period = wf&&wt ? wf+' → '+wt : wf ? 'من '+wf : wt ? 'إلى '+wt : 'الكلي';
  let txt=`*📊 الموقف الإجمالي — ${sf}*\n*الفترة:* ${period}\n*تاريخ التقرير:* ${today()}\n================================\n\n`;
  txt+=`*🛢️ المشتريات:*\n`;
  for(const f of facts){const d=analysis[f].total;if(!d.cars)continue;txt+=`🏭 ${f}: ${d.cars} سيارة | ${fmt(d.tons)} طن | ${fmt(d.liters)} لتر | ${fmt(d.kg)} كغم\n`;}
  txt+=`\n*📦 المبيعات:*\n`;
  for(const f of facts){const d=saleAn[f].total;if(!d.cars)continue;txt+=`🏭 ${f}: ${d.cars} سيارة | ${fmtKaban(d.kaban)} كبان\n`;}
  txt+=`\n✅ نظام المراقبة v40.0`;
  navigator.clipboard.writeText(txt).catch(()=>{});
  const c=el('copy-ok');if(c){c.style.display='block';setTimeout(()=>c.style.display='none',3000);}
}

function updateProduct(){const r=gv('f_ref'),pt=el('f_pt');if(pt)pt.value=r==='مصفى كربلاء'?'HFO':r==='مصفى صلاح الدين'?'VR':'';}
function calcTotal(){const l=parseFloat(el('f_liters')?.value||0),t=el('f_tot');if(t)t.textContent=fmtM(l*150)+' د.ع';}
function showDriversList(inputId, carId, locId) {
  const drivers = DB.get('drivers', {});
  const list = Object.values(drivers);
  if (!list.length) return;
  const old = document.getElementById('drv-drop');
  if (old) old.remove();
  const input = el(inputId);
  if (!input) return;
  const rect = input.getBoundingClientRect();
  const drop = document.createElement('div');
  drop.id = 'drv-drop';
  drop.style.cssText = 'position:fixed;top:'+(rect.bottom+2)+'px;right:'+(window.innerWidth-rect.right)+'px;width:'+rect.width+'px;background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:99999;max-height:220px;overflow-y:auto';
  list.forEach(d => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9';
    item.innerHTML = '<div style="font-size:13px;font-weight:900;color:#0f172a">'+d.name+'</div><div style="font-size:10px;color:#64748b;margin-top:2px">🚗 '+d.car_no+' &nbsp;|&nbsp; 📍 '+d.location+'</div>';
    item.onmouseover = ()=>item.style.background='#eff6ff';
    item.onmouseout  = ()=>item.style.background='';
    item.onmousedown = (ev)=>{
      ev.preventDefault();
      input.value = d.name;
      const c=el(carId), l=el(locId);
      if(c) c.value = d.car_no||'';
      if(l) l.value = d.location||'';
      drop.remove();
    };
    drop.appendChild(item);
  });
  document.body.appendChild(drop);
  input.onblur = ()=>setTimeout(()=>{ const d=document.getElementById('drv-drop'); if(d)d.remove(); },200);
}function autoFillDriver(name){const d=DB.get('drivers',{});if(d[name]){const c=el('f_car'),l=el('f_loc');if(c)c.value=d[name].car_no||'';if(l)l.value=d[name].location||'';}}

function saveEntry(){
  const sf=S.selectedFactory, e=S.editEntry||{};
  const v=gv('f_voucher'),date=gv('f_date'),ref=gv('f_ref'),pt=gv('f_pt');
  const driver=gv('f_driver'),car=gv('f_car'),loc=gv('f_loc'),po=gv('f_po');
  const tons=parseFloat(el('f_tons')?.value||0),liters=parseFloat(el('f_liters')?.value||0),kg=parseFloat(el('f_kg')?.value||0);
const allEntries = DB.get('entries', []);
const dupVoucher = allEntries.find(x => x.voucher_no == v && x.id !== (e.id||''));
if(dupVoucher) {
  const m = el('form-msg');
  if(m){ m.style.display='block'; m.style.background='#fef2f2'; m.style.color='#dc2626'; m.textContent='⚠️ رقم البوجر ' + v + ' موجود مسبقاً! يرجى التحقق.'; }
  return;
}  if(!v||!date||!ref||!driver||!car||!loc||!po||!liters){const m=el('form-msg');if(m){m.style.display='block';m.style.background='#fef2f2';m.style.color='#dc2626';m.textContent='يرجى ملء جميع الحقول (*)'}return;}
  const entry={id:e.id||('e_'+Date.now()),voucher_no:v,refinery:ref,date,product_type:pt,driver_name:driver,car_no:car,location:loc,qty_tons:tons,natural_liters:liters,weight_kg:kg,po_no:po,price:150,transport_fee:42,refinery_price:150*liters,factory:sf,accountant:currentUser.email,time:Date.now()};
  let entries=DB.get('entries',[]);
  if(e.id){const idx=entries.findIndex(x=>x.id===e.id);if(idx>=0)entries[idx]=entry;else entries.push(entry);}
  else entries.push(entry);
  DB.set('entries',entries);
  // Save to Firebase
  FDB.save('entries', entry.id, entry);
  let drivers=DB.get('drivers',{});drivers[driver]={name:driver,car_no:car,location:loc};DB.set('drivers',drivers);
  FDB.save('drivers', driver.replace(/\s+/g,'_'), drivers[driver]);
  S.editEntry=null;S.view='table';render();
}

function exportCSV(type){
  let list, headers, row2csv, fname;
  if(type==='purchases'){
    list=getList();
    headers='ت,المعمل,البوجر,المصفى,التاريخ,النوع,السائق,السيارة,العائدية,طن,لتر,كغم,PO,السعر,نقل,الإجمالي\n';
    row2csv=(e,i)=>`${i+1},"${e.factory}","${e.voucher_no}","${e.refinery}","${e.date}","${e.product_type}","${e.driver_name}","${e.car_no}","${e.location}",${e.qty_tons},${e.natural_liters},${e.weight_kg},"${e.po_no}",${e.price},${e.transport_fee||42},${e.refinery_price}\n`;
    fname=`مشتريات_${today()}.csv`;
  } else {
    list=getSaleList();
    headers='ت,المعمل,السائق,السيارة,التاريخ,العائدية,العنوان,النوع,الكبان,كمية لتر,السلفة,الواصل,مصدر السيارة\n';
    row2csv=(e,i)=>`${i+1},"${e.factory}","${e.driver_name}","${e.car_no}","${e.date}","${e.location}","${e.address||''}","${e.product_type}",${e.kaban},${e.qty_liters||0},${e.advance||0},${e.received||0},"${e.car_source||''}"\n`;
    fname=`مبيعات_${today()}.csv`;
  }
  let csv='\ufeff'+headers;
  list.forEach((e,i)=>csv+=row2csv(e,i));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=fname; a.click();
}

// ===== تصدير Excel حقيقي =====
function exportXLSX(type){
  if(typeof XLSX === 'undefined'){ alert('مكتبة Excel غير محملة، يرجى إعادة تحديث الصفحة'); return; }
  let list, sheetName, fname;
  let rows = [];

  if(type==='purchases'){
    list = getList();
    sheetName = 'المشتريات';
    fname = 'مشتريات_' + today() + '.xlsx';
    rows.push(['ت','المعمل','البوجر','المصفى','التاريخ','النوع','السائق','السيارة','العائدية','طن','لتر','كغم','PO','السعر','نقل','الإجمالي']);
    list.forEach((e,i) => rows.push([
      i+1, e.factory, e.voucher_no, e.refinery, e.date, e.product_type,
      e.driver_name, e.car_no, e.location,
      sc(e.qty_tons), sc(e.natural_liters), sc(e.weight_kg),
      e.po_no, e.price||150, e.transport_fee||42, parseFloat(e.refinery_price)||0
    ]));
  } else {
    list = getSaleList();
    sheetName = 'المبيعات';
    fname = 'مبيعات_' + today() + '.xlsx';
    rows.push(['ت','المعمل','السائق','السيارة','التاريخ','العائدية','العنوان','النوع','الكبان','كمية لتر','السلفة','الواصل','مصدر السيارة']);
    list.forEach((e,i) => rows.push([
      i+1, e.factory, e.driver_name, e.car_no, e.date,
      e.location, e.address||'', e.product_type,
      parseFloat(e.kaban)||0, parseFloat(e.qty_liters)||0,
      parseFloat(e.advance)||0, parseFloat(e.received)||0, e.car_source||''
    ]));
  }

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Style header row
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let C = range.s.c; C <= range.e.c; C++){
    const cell = ws[XLSX.utils.encode_cell({r:0, c:C})];
    if(cell) cell.s = { font:{bold:true}, fill:{fgColor:{rgb:"1E3A8A"}}, alignment:{horizontal:"center"} };
  }

  // Set column widths
  ws['!cols'] = rows[0].map(() => ({wch:18}));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fname);
}

function normalizeCol(col, map){
  const c=(col||'').toString().trim().replace(/\s+/g,' ');
  for(const k of Object.keys(map)){if(c.includes(k))return map[k];}
  return null;
}
function autoScale(val) {
  // Detect unit automatically: < 1000 means metric tons/kL → multiply by 1000
  var n = parseFloat(val) || 0;
  if (n > 0 && n < 1000) return n * 1000;
  return n;
}

function parseXLDate(d){
  if(!d)return'';
  d=d.toString().trim();
  // YYYY.M.D  e.g. 2026.4.9
  const m1=d.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);
  if(m1)return`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
  // D.M.YYYY  e.g. 6.7.2025  ← الذهب الأسود
  const m2=d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m2)return`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  // D/M/YYYY
  const m3=d.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{4})$/);
  if(m3)return`${m3[3]}-${m3[2].padStart(2,'0')}-${m3[1].padStart(2,'0')}`;
  // YYYY-MM-DD already
  if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;
  // Excel serial
  const n=parseFloat(d);
  if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);return dt.toISOString().split('T')[0];}
  return d;
}

function handleDrop(e){e.preventDefault();document.getElementById('imp-dropzone').style.background='#f8fafc';const f=e.dataTransfer.files[0];if(f)previewExcel(f);}

function previewExcel(file){
  if(!file)return;
  const hrow=parseInt(gv('imp_hrow')||'2'), sheetIdx=parseInt(gv('imp_sheet')||'0');
  const iType=gv('imp_type')||'purchases';
  const map=iType==='sales'?COL_MAP_S:COL_MAP_P;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[sheetIdx]||wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const headers=raw[hrow]||[];
      const colMap={};
      headers.forEach((h,i)=>{const m=normalizeCol(h,map);if(m)colMap[i]=m;});
      importedRows=[];
      for(let r=hrow+1;r<raw.length;r++){
        const row=raw[r];
        if(!row[1]&&!row[2])continue;
        const obj={};
        Object.entries(colMap).forEach(([i,f])=>{obj[f]=row[i];});
        // Skip completely empty rows
        if(!obj.driver_name&&!obj.refinery&&!obj.car_no)continue;
        // Skip rows where all numeric values are 0 or missing (phantom rows)
        const hasNums = parseFloat(obj.qty_tons||0)||parseFloat(obj.natural_liters||0)||
                        parseFloat(obj.weight_kg||0)||parseFloat(obj.kaban||0)||
                        parseFloat(obj.qty_liters||0);
        const hasText = (obj.driver_name||'').trim()||(obj.refinery||'').trim()||
                        (obj.car_no||'').toString().trim();
        if(!hasNums && !hasText) continue;
        importedRows.push(obj);
      }
      const factory=gv('imp_factory');
      const info=el('imp-info');
      
      // Show column mapping and sample values for diagnosis
      const mappedCols = Object.values(colMap);
      const hasRefPrice = mappedCols.includes('refinery_price');
      
      // Calculate sample totals from first row
      const sample = importedRows[0] || {};
      const sampleLiters = parseFloat(sample.natural_liters||0);
      const samplePrice  = parseFloat(sample.price||150);
      const sampleRefP   = parseFloat(sample.refinery_price||0);
      
      // Total refinery_price from Excel
      const totalRefPrice = importedRows.reduce((s,r)=>s+parseFloat(r.refinery_price||0),0);
      const totalLiters   = importedRows.reduce((s,r)=>s+parseFloat(r.natural_liters||0),0);
      
      const fmtNum = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');
      
      if(info)info.innerHTML = 
        '✅ الملف: <b>'+file.name+'</b> | السجلات: <b>'+importedRows.length+'</b><br>' +
        'الأعمدة المكتشفة: <b>'+mappedCols.join('، ')+'</b><br>' +
        '<span style="color:'+(hasRefPrice?'#065f46':'#dc2626')+'">' +
        (hasRefPrice ? '✅ عمود سعر المصفى موجود' : '⚠️ عمود سعر المصفى غير مكتشف — سيُحسب تلقائياً') +
        '</span><br>' +
        'مجموع سعر المصفى من الإكسل: <b>'+fmtNum(totalRefPrice)+'</b> | ' +
        'مجموع اللتر من الإكسل: <b>'+fmtNum(totalLiters)+'</b><br>' +
        'قيمة الصف الأول — لتر: <b>'+sampleLiters+'</b> | سعر: <b>'+samplePrice+'</b> | سعر المصفى: <b>'+sampleRefP+'</b>';
      
      const prev=el('imp-preview');if(prev)prev.style.display='block';
    }catch(err){alert('خطأ: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

async function doImport(){
  window._importing = true;
if(!importedRows.length){ window._importing = false; return; }
  const factory=gv('imp_factory'), iType=gv('imp_type')||'purchases';
  let drivers=DB.get('drivers',{}), added=0;
  if(iType==='purchases'){
    let entries=DB.get('entries',[]);
    const newEntries=[];
    importedRows.forEach((row,i)=>{
      const xlTons=autoScale(row.qty_tons);
      const xlLiters=autoScale(row.natural_liters);
      const xlKg=autoScale(row.weight_kg);
      const xlPrice=parseFloat(row.price)||150;
      const xlRefPrice=parseFloat(row.refinery_price)||(xlPrice*xlLiters);
      const dName=(row.driver_name||'').toString().trim();
      const carNo=(row.car_no||'').toString().trim().replace(/\.0$/,'');
      const loc=(row.location||'').toString().trim();
      const entry={id:'xl_p_'+Date.now()+'_'+i,voucher_no:row.voucher_no||(row._num||String(i+1)),refinery:(row.refinery||'').toString().trim(),date:parseXLDate(row.date),product_type:(row.product_type||'').toString().trim(),driver_name:dName,car_no:carNo,location:loc,qty_tons:xlTons,natural_liters:xlLiters,weight_kg:xlKg,po_no:(row.po_no||'').toString().trim(),price:xlPrice,transport_fee:42,refinery_price:xlRefPrice,factory,accountant:currentUser.email,time:Date.now()+i};
      entries.push(entry);
      newEntries.push(entry);
      if(dName)drivers[dName]={name:dName,car_no:carNo,location:loc};
      added++;
    });
    entries.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    DB.set('entries',entries);
    for(let i=0;i<newEntries.length;i++){
      await FDB.save('entries',newEntries[i].id,newEntries[i]);
    }
  } else {
    let sales=DB.get('sales',[]);
    const newSales=[];
    importedRows.forEach((row,i)=>{
      const dName=(row.driver_name||'').toString().trim();
      const carNo=(row.car_no||'').toString().trim().replace(/\.0$/,'');
      const loc=(row.location||'').toString().trim();
      const sale={id:'xl_s_'+Date.now()+'_'+i,driver_name:dName,car_no:carNo,date:parseXLDate(row.date),location:loc,address:(row.address||'').toString().trim(),product_type:(row.product_type||'').toString().trim(),kaban:autoScale(row.kaban),qty_liters:autoScale(row.qty_liters),advance:parseFloat(row.advance)||0,received:parseFloat(row.received)||0,car_source:(row.car_source||'').toString().trim(),factory,accountant:currentUser.email,time:Date.now()+i};
      sales.push(sale);
      newSales.push(sale);
      if(dName)drivers[dName]={name:dName,car_no:carNo,location:loc};
      added++;
    });
    if(newSales.length>0){var _fd=(newSales[0].date||'').toString();if(_fd&&!_fd.match(/\d{4}/)){newSales.forEach(function(s){var t=s.date;s.date=s.location;s.location=t;});}}sales.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    DB.set('sales',sales);
    for(let i=0;i<newSales.length;i++){
      await FDB.save('sales',newSales[i].id,newSales[i]);
    }
  }
  DB.set('drivers',drivers);
  const res=el('imp-result');
  if(res){res.style.display='block';res.style.background='#ecfdf5';res.style.color='#065f46';res.style.border='1px solid #6ee7b7';res.textContent=`✅ تم استيراد ${added} سجل إلى "${factory}" وحفظها في Firebase`;}
  importedRows=[];
  window._importing = false;
  setTimeout(()=>{S.view=iType==='sales'?'sale_table':'table';S.selectedFactory=factory;render();},1500);
}

      drivers[name] = { name: name, car_no: e.car_no || '', location: e.location || '' };

async function clearFactoryData(factory, type) {
  if (!factory || !type) return;
  var typeLabel = type==='purchases'?'المشتريات':type==='sales'?'المبيعات':'المشتريات والمبيعات';
  if (!confirm('⚠️ حذف بيانات '+typeLabel+' لـ "'+factory+'" ؟')) return;
  if (!confirm('⚠️ تأكيد أخير — لا يمكن التراجع.')) return;
  var deletedEntries=[], deletedSales=[];
  if (type==='purchases'||type==='all') {
    var allEntries=DB.get('entries',[]);
    deletedEntries=allEntries.filter(function(e){return e.factory===factory;});
    DB.set('entries', allEntries.filter(function(e){return e.factory!==factory;}));
    deletedEntries.forEach(function(e){try{const{db,doc,deleteDoc}=window._fb;deleteDoc(doc(db,'entries',e.id));}catch(_){}});
  }
  if (type==='sales'||type==='all') {
    var allSales=DB.get('sales',[]);
    deletedSales=allSales.filter(function(s){return s.factory===factory;});
    DB.set('sales', allSales.filter(function(s){return s.factory!==factory;}));
    deletedSales.forEach(function(s){try{const{db,doc,deleteDoc}=window._fb;deleteDoc(doc(db,'sales',s.id));}catch(_){}});
  }
  if (window._fbReady) {
    for (var i=0; i<deletedEntries.length; i++) await FDB.delete('entries', deletedEntries[i].id);
    for (var j=0; j<deletedSales.length; j++) await FDB.delete('sales', deletedSales[j].id);
  }
  alert('✅ تم حذف '+typeLabel+' للمعمل: '+factory+'\nالجهاز وFirebase كلاهما ✓');
  renderContent();
}


// ===== إصلاح البيانات الموجودة =====
function fixExistingData(factory) {
  var fixed = 0;
  
  // Fix entries (purchases)
  var entries = DB.get('entries', []);
  entries = entries.map(function(e) {
    if (factory && e.factory !== factory) return e;
    var changed = false;
    
    if (e.qty_tons > 0 && e.qty_tons < 1000) {
      e.qty_tons = e.qty_tons * 1000; changed = true;
    }
    if (e.natural_liters > 0 && e.natural_liters < 1000) {
      e.natural_liters = e.natural_liters * 1000; changed = true;
    }
    if (e.weight_kg > 0 && e.weight_kg < 1000) {
      e.weight_kg = e.weight_kg * 1000; changed = true;
    }
    if (changed) {
      e.refinery_price = (e.price || 150) * e.natural_liters;
      fixed++;
    }
    return e;
  });
  DB.set('entries', entries);

  // Fix sales
  var sales = DB.get('sales', []);
  sales = sales.map(function(s) {
    if (factory && s.factory !== factory) return s;
    if (s.qty_liters > 0 && s.qty_liters < 1000) {
      s.qty_liters = s.qty_liters * 1000; fixed++;
    }
    if (s.kaban > 0 && s.kaban < 1000) {
      s.kaban = s.kaban * 1000; fixed++;
    }
    return s;
  });
  DB.set('sales', sales);

  return fixed;
}

function runFixData(factory) {
  var label = factory || 'كل المعامل';
  if (!confirm('إصلاح بيانات ' + label + '؟\nسيتم ضرب القيم الصغيرة (< 1000) × 1000 تلقائياً.')) return;
  var fixed = fixExistingData(factory);
  alert('✅ تم إصلاح ' + fixed + ' سجل في ' + label);
  renderContent();
}

function importDataBackup(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var backup = JSON.parse(e.target.result);
      var msg = el('migration-msg');
      if (!backup.entries && !backup.sales) {
        if (msg) { msg.style.display='block'; msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent='❌ الملف غير صالح'; }
        return;
      }
      if (backup.entries && backup.entries.length)  { DB.set('entries',  backup.entries);  backup.entries.forEach(function(x){ FDB.save('entries', x.id, x); }); }
      if (backup.sales   && backup.sales.length)    { DB.set('sales',    backup.sales);    backup.sales.forEach(function(x){ FDB.save('sales', x.id, x); }); }
      if (backup.drivers) DB.set('drivers', backup.drivers);
      if (backup.kroob && backup.kroob.length)      { DB.set('kroob', backup.kroob);       backup.kroob.forEach(function(x){ FDB.save('kroob', x.id, x); }); }
      if (backup.kroob_opening)                     { DB.set('kroob_opening', backup.kroob_opening); FDB.save('kroob_opening','opening', backup.kroob_opening); }
      if (backup.salaf && backup.salaf.length)      { DB.set('salaf', backup.salaf);       backup.salaf.forEach(function(x){ FDB.save('salaf', x.id, x); }); }
      if (backup.expenses && backup.expenses.length){ DB.set('expenses', backup.expenses); backup.expenses.forEach(function(x){ FDB.save('expenses', x.id, x); }); }
      if (backup.factories && backup.factories.length) {
        FACTORIES.length = 0;
        backup.factories.forEach(function(f){ FACTORIES.push(f); });
        DB.set('factories', FACTORIES);
      }
      var total = (backup.entries||[]).length + (backup.sales||[]).length + (backup.kroob||[]).length + (backup.salaf||[]).length + (backup.expenses||[]).length;
      if (msg) { msg.style.display='block'; msg.style.background='#ecfdf5'; msg.style.color='#065f46'; msg.textContent='✅ تم نقل ' + total + ' سجل بنجاح ورفعها لـ Firebase!'; }
      setTimeout(function(){ render(); }, 1500);
    } catch(err) {
      var msg = el('migration-msg');
      if (msg) { msg.style.display='block'; msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent='❌ خطأ: ' + err.message; }
    }
  };
  reader.readAsText(file);
}

let notifications = [];
let notifUnread = 0;
let notifListener = null;
let lastKnownEntries = new Set();
let lastKnownSales = new Set();

function initNotifications() {
  if (!isManager() || !window._fbReady) return;
  const {db, collection, onSnapshot} = window._fb;

  // Load existing IDs first (don't notify for old data)
  const existingEntries = DB.get('entries', []);
  const existingSales = DB.get('sales', []);
  existingEntries.forEach(e => lastKnownEntries.add(e.id));
  existingSales.forEach(s => lastKnownSales.add(s.id));

  // Listen for new entries
  onSnapshot(collection(db, 'entries'), snap => {
    snap.docs.forEach(doc => {
      const data = doc.data();
      if (!lastKnownEntries.has(data.id)) {
        lastKnownEntries.add(data.id);
     if (!window._importing && lastKnownEntries.size > existingEntries.length + 1) {
          addNotification({
            type: 'purchase',
            icon: '🛢️',
            title: 'بوجر مشتريات جديد',
            body: `${data.factory} — ${data.driver_name}`,
            detail: `${fmt(data.natural_liters)} لتر | ${fmtM(data.refinery_price)} د.ع`,
            time: new Date().toLocaleTimeString('ar-IQ'),
            color: '#2563eb'
          });
        }
      }
    });
  });

  // Listen for new sales
  onSnapshot(collection(db, 'sales'), snap => {
    snap.docs.forEach(doc => {
      const data = doc.data();
      if (!lastKnownSales.has(data.id)) {
        lastKnownSales.add(data.id);
       if (!window._importing && lastKnownSales.size > existingSales.length + 1) {
          addNotification({
            type: 'sale',
            icon: '📦',
            title: 'بيانات مبيعات جديدة',
            body: `${data.factory} — ${data.driver_name}`,
            detail: `${fmtKaban(data.kaban)} كبان`,
            time: new Date().toLocaleTimeString('ar-IQ'),
            color: '#7c3aed'
          });
        }
      }
    });
  });
}

function addNotification(notif) {
  notifications.unshift(notif);
  if (notifications.length > 20) notifications.pop();
  notifUnread++;
  const badge = document.getElementById('notif-badge');
  if (badge) { badge.style.display = 'flex'; badge.textContent = notifUnread > 9 ? '9+' : notifUnread; }
  // Browser notification
  if (Notification.permission === 'granted') {
    new Notification(notif.title, { body: notif.body + '\n' + notif.detail, icon: '🛢️' });
  }
}

function toggleNotif() {
  const existing = document.getElementById('notif-panel');
  if (existing) { existing.remove(); return; }
  notifUnread = 0;
  const badge = document.getElementById('notif-badge');
  if (badge) badge.style.display = 'none';

  const panel = document.createElement('div');
  panel.id = 'notif-panel';
  panel.className = 'notif-panel';
  panel.innerHTML = `
    <div style="padding:14px 16px;background:#0f172a;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#fff;font-weight:900;font-size:13px">🔔 الإشعارات</span>
      <div style="display:flex;gap:8px">
        <button onclick="clearNotifications()" style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:Cairo">مسح الكل</button>
        <button onclick="document.getElementById('notif-panel').remove()" style="background:#334155;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer">✕</button>
      </div>
    </div>
    <div style="max-height:340px;overflow-y:auto">
      ${notifications.length === 0
        ? '<div style="padding:30px;text-align:center;color:#94a3b8;font-size:12px">لا توجد إشعارات جديدة</div>'
        : notifications.map(n => `
          <div class="notif-item">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span style="font-size:16px">${n.icon}</span>
              <span style="font-weight:900;color:${n.color};font-size:12px">${n.title}</span>
              <span style="margin-right:auto;color:#94a3b8;font-size:10px">${n.time}</span>
            </div>
            <div style="color:#334155;font-size:12px">${n.body}</div>
            <div style="color:#64748b;font-size:11px;margin-top:2px">${n.detail}</div>
          </div>`).join('')
      }
    </div>`;
  document.body.appendChild(panel);
  // Close on outside click
  setTimeout(() => document.addEventListener('click', function handler(e) {
    if (!panel.contains(e.target) && e.target.closest('[onclick="toggleNotif()"]') === null) {
      panel.remove(); document.removeEventListener('click', handler);
    }
  }), 100);
}

function clearNotifications() {
  notifications = []; notifUnread = 0;
  const panel = document.getElementById('notif-panel');
  if (panel) panel.remove();
}

function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function importSalafXLSX(input) {
  const file = input.files[0];
  if(!file) return;
  if(typeof XLSX === 'undefined') { alert('مكتبة Excel غير محملة'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const personMap = {
      'سيد حيدر ': 'سيد حيدر',
      'سيد رافد': 'سيد رافد',
      'فايق رويمي ': 'فايق رويمي'
    };
    let imported = 0;
    let salaf = DB.get('salaf', []);
    const existingIds = new Set(salaf.map(s=>s.id));

    wb.SheetNames.forEach(sheetName => {
      const person = personMap[sheetName] || sheetName.trim();
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // Find header row
      let headerRow = -1;
      for(let i=0;i<rows.length;i++){
        const r = rows[i].map(v=>String(v).trim());
        if(r.includes('ت') || r.includes('التاريخ') || r.includes('تاريخ ')) { headerRow=i; break; }
      }
      if(headerRow < 0) return;

      const headers = rows[headerRow].map(v=>String(v).trim());
      const getCol = (names) => {
        for(const n of names){
          const idx = headers.findIndex(h=>h.includes(n));
          if(idx>=0) return idx;
        }
        return -1;
      };

      const dateCol   = getCol(['التاريخ','تاريخ']);
      const dinarCol  = getCol(['المبلغ دينار','الملغ','المبلغ د']);
      const dollarCol = getCol(['المبلغ دولار','دولار']);
      const centerCol = getCol(['مركز الكلفة','مركز الكلفه','الحساب']);
      const noteCol   = getCol(['البيان','الغرض','البيان']);

      for(let r=headerRow+1; r<rows.length; r++) {
        const row = rows[r];
        const num = String(row[0]).trim();
        if(!num || isNaN(parseFloat(num))) continue;

        const rawDate = dateCol>=0 ? String(row[dateCol]).trim() : '';
        const dinar   = dinarCol>=0  ? parseFloat(String(row[dinarCol]).replace(/,/g,''))||0 : 0;
        const dollar  = dollarCol>=0 ? parseFloat(String(row[dollarCol]).replace(/,/g,''))||0 : 0;
        const center  = centerCol>=0 ? String(row[centerCol]).trim() : '';
        const note    = noteCol>=0   ? String(row[noteCol]).trim() : '';

        if(!dinar && !dollar && !note) continue;

        // Parse date
        let date = '';
        if(rawDate && rawDate !== 'nan') {
          const m1 = rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
          const m2 = rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);
          const m3 = rawDate.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);
          if(m1) date = m1[3]+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0');
          else if(m2) date = m2[1]+'-'+m2[2]+'-'+m2[3];
          else if(m3) date = m3[1]+'-'+m3[2].padStart(2,'0')+'-'+m3[3].padStart(2,'0');
          else {
            const n=parseFloat(rawDate);
            if(!isNaN(n)&&n>40000){
              const dt=new Date((n-25569)*86400*1000);
              date=dt.toISOString().split('T')[0];
            }
          }
        }

        const id = 'sl_xl_'+person+'_'+r+'_'+Date.now();
        const entry = { id, person, date, amount_dinar:dinar, amount_dollar:dollar, cost_center:center, note, accountant:'import', time:Date.now()+r };
        salaf.push(entry);
        FDB.save('salaf', id, entry);
        imported++;
      }
    });

    salaf.sort((a,b)=>(a.person+'_'+a.date).localeCompare(b.person+'_'+b.date));
    DB.set('salaf', salaf);
    alert('✅ تم استيراد '+imported+' سلفة بنجاح!');
    input.value = '';
    renderContent();
  };
  reader.readAsArrayBuffer(file);
}

function clearAllSalaf() {

  if(!confirm('تأكيد نهائي — لا يمكن التراجع!')) return;
  DB.set('salaf', []);
  renderContent();
}

function editSalaf(id, person) {
  S.salafEditId = id;
  S.salafPerson = person;
  renderContent();
  // Scroll to form
  setTimeout(()=>{
    const form = document.querySelector('[id="sf_date"]');
    if(form) form.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function saveSalaf(person) {
  const date   = gv('sf_date');
  const dinar  = parseFloat(document.getElementById('sf_dinar')?.value||0);
  const dollar = parseFloat(document.getElementById('sf_dollar')?.value||0);
  const center = gv('sf_center');
  const note   = gv('sf_note');
  if(!note){ const m=el('salaf-msg'); if(m){m.style.display='block';m.style.background='#fef2f2';m.style.color='#dc2626';m.textContent='يرجى كتابة البيان';} return; }
  
  let salaf = DB.get('salaf', []);
  const editId = S.salafEditId || '';
  let entry;
  if(editId) {
    // Update existing
    const idx = salaf.findIndex(s=>s.id===editId);
    if(idx>=0){
      entry = {...salaf[idx], date, amount_dinar:dinar, amount_dollar:dollar, cost_center:center, note};
      salaf[idx] = entry;
    }
    S.salafEditId = '';
  } else {
    entry = { id:'sl_'+Date.now(), person, date, amount_dinar:dinar, amount_dollar:dollar, cost_center:center, note, accountant:currentUser.email, time:Date.now() };
    salaf.push(entry);
  }
  salaf.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  DB.set('salaf', salaf);
  FDB.save('salaf', entry.id, entry);
  
  const m=el('salaf-msg'); if(m){m.style.display='block';m.style.background='#ecfdf5';m.style.color='#065f46';m.textContent='✅ تم حفظ السلفة بنجاح';}
  setTimeout(()=>renderContent(), 600);
}

function deleteSalaf(id) {
  if(!confirm('حذف هذه السلفة؟')) return;
  let salaf = DB.get('salaf', []).filter(s=>s.id!==id);
  DB.set('salaf', salaf);
  FDB.delete('salaf', id);
  renderContent();
}

function exportSalafXLSX(person) {
  if(typeof XLSX === 'undefined') return;
  const list = getSalafList(person);
  const rows = [['ت','الشخص','التاريخ','المبلغ دينار','المبلغ دولار','مركز الكلفة','البيان']];
  list.forEach((e,i)=>rows.push([i+1,e.person,e.date,e.amount_dinar||0,e.amount_dollar||0,e.cost_center||'',e.note||'']));
  // Totals row
  rows.push(['','الإجمالي','',
    list.reduce((s,e)=>s+parseFloat(e.amount_dinar||0),0),
    list.reduce((s,e)=>s+parseFloat(e.amount_dollar||0),0),'','']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:5},{wch:15},{wch:14},{wch:16},{wch:16},{wch:20},{wch:30}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'سلف '+person);
  XLSX.writeFile(wb, 'سلف_'+person+'_'+today()+'.xlsx');
}

  var da = document.getElementById('exp_date');

function saveExpense(factory) {
  saveExpFormState();
  const date    = S.expDate    || gv('exp_date') || today();
  const dinar   = parseFloat(S.expDinar||0)   || parseFloat(document.getElementById('exp_dinar')?.value||0);
  const dollar  = parseFloat(S.expDollar||0)  || parseFloat(document.getElementById('exp_dollar')?.value||0);
  const details = S.expDetails || gv('exp_details');
  if(!details){ const m=el('exp-msg'); if(m){m.style.display='block';m.style.background='#fef2f2';m.style.color='#dc2626';m.textContent='يرجى كتابة التفاصيل';} return; }
  
  let expenses = DB.get('expenses', []);
  const editId = S.expEditId || '';
  let entry;
  if(editId) {
    const idx = expenses.findIndex(e=>e.id===editId);
    if(idx>=0){ entry = {...expenses[idx], date, amount_dinar:dinar, amount_dollar:dollar, details}; expenses[idx]=entry; }

function importExpensesXLSX(input) {
  const file = input.files[0];
  if(!file||typeof XLSX==='undefined') return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const sheetToFactory = {
      'مصاريف الجوههرة ': 'مصاريف الجوهرة',
      'الوطنيه': 'الوطنية',
      'عطاء الذهب': 'عطاء الذهب',
      'ايجار كراج': 'ايجار كراج',
      'مصارف الفهد': 'الفهد',
      'الروعه': 'الروعة المشرق',
      'الذهب الاسود': 'الذهب الأسود',
      'ابرار شط العرب': 'ابرار شط العرب',
      'الذهب الاصفر': 'الذهب الأصفر',
      'نذره الذهب': 'نذره الذهب',
      'اياد عودة': 'اياد عودة',
      'الكرستال': 'الكرستال',
      'حميد جاسم': 'حميد جاسم'
    };
    let imported = 0;
    let expenses = DB.get('expenses', []);
    const settlement = DB.get('expenses_settlement', {});

    wb.SheetNames.forEach(sheetName => {
      const factory = sheetToFactory[sheetName] || sheetName.trim();
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      let headerRow = -1;
      for(let i=0;i<Math.min(rows.length,5);i++){
        const r = rows[i].map(v=>String(v).trim());
        if(r.includes('ت')){ headerRow=i; break; }
      }
      if(headerRow<0) return;

      const headers = rows[headerRow].map(v=>String(v).trim());
      const dateCol    = headers.findIndex(h=>h.includes('تاريخ')||h.includes('التاريخ')||h.includes('سنة'));
      const dinarCol   = headers.findIndex(h=>h.includes('دينار')||h.includes('الملغ'));
      const dollarCol  = headers.findIndex(h=>h.includes('دولار'));
      const detailsCol = headers.findIndex(h=>h.includes('تفاصيل')||h.includes('البيان')||h.includes('الغرض'));

      for(let r=headerRow+1; r<rows.length; r++) {
        const row = rows[r];
        const num = String(row[0]).trim();
        if(!num || isNaN(parseFloat(num))) continue;

        const rawDate = dateCol>=0 ? String(row[dateCol]).trim() : '';
        const dinar   = dinarCol>=0   ? parseFloat(String(row[dinarCol]).replace(/,/g,''))||0 : 0;
        const dollar  = dollarCol>=0  ? parseFloat(String(row[dollarCol]).replace(/,/g,''))||0 : 0;
        const details = detailsCol>=0 ? String(row[detailsCol]).trim() : '';

        if(!dinar && !dollar && !details) continue;

        let date = '';
        const m1=rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);
        const m2=rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        const m3=rawDate.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);
        if(m1) date=m1[1]+'-'+m1[2]+'-'+m1[3];
        else if(m2) date=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
        else if(m3) date=m3[1]+'-'+m3[2].padStart(2,'0')+'-'+m3[3].padStart(2,'0');
        else { const n=parseFloat(rawDate); if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);date=dt.toISOString().split('T')[0];} }

        const id='exp_xl_'+factory+'_'+r+'_'+Date.now();
        const entry={id,factory,date,amount_dinar:dinar,amount_dollar:dollar,details,accountant:'import',time:Date.now()+r};
        expenses.push(entry);
        FDB.save('expenses',id,entry);
        imported++;
      }

      // Read settlement data (rows 100-104)
      for(let r=95;r<Math.min(rows.length,110);r++){
        const row=rows[r];
        const label=String(row[0]||row[1]||'').trim();
        const val=parseFloat(String(row[row.length-1]||'').replace(/,/g,''))||0;
        if(label.includes('الواصل')&&label.includes('رافد')&&val){
          if(!settlement[factory]) settlement[factory]={received_dinar:0,received_dollar:0};
          settlement[factory].received_dinar = val;
        }
      }
    });

    expenses.sort((a,b)=>(a.factory+'_'+a.date).localeCompare(b.factory+'_'+b.date));
    DB.set('expenses', expenses);
    DB.set('expenses_settlement', settlement);
    FDB.save('expenses_settlement', 'all', settlement);
    alert('✅ تم استيراد '+imported+' مصروف بنجاح!');
    input.value='';
    renderContent();
  };
  reader.readAsArrayBuffer(file);
}

function exportExpensesXLSX(factory) {
  if(typeof XLSX==='undefined') return;
  const list = getExpenseList(factory);
  const settlement = DB.get('expenses_settlement',{});
  const stl = settlement[factory]||{};
  const totalD = list.reduce((s,e)=>s+parseFloat(e.amount_dinar||0),0);
  const totalDol = list.reduce((s,e)=>s+parseFloat(e.amount_dollar||0),0);
  const rows=[['ت','المعمل','التاريخ','المبلغ دينار','المبلغ دولار','التفاصيل']];
  list.forEach((e,i)=>rows.push([i+1,e.factory,e.date,e.amount_dinar||0,e.amount_dollar||0,e.details||'']));
  rows.push(['','المجموع','',totalD,totalDol,'']);
  rows.push(['','الواصل من سيد رافد','',stl.received_dinar||0,stl.received_dollar||0,'']);
  rows.push(['','المتبقي','',totalD-(stl.received_dinar||0),totalDol-(stl.received_dollar||0),'']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:18},{wch:14},{wch:16},{wch:16},{wch:35}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'مصاريف '+factory);
  XLSX.writeFile(wb,'مصاريف_'+factory+'_'+today()+'.xlsx');
}

function getKroobList() {
  let list = DB.get('kroob', []);
  list.sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.time||0)-(b.time||0));
  return list;
}

function calcKroobBalance(list) {
  const opening = DB.get('kroob_opening', {dinar: 0, dollar: 0});
  let balDinar  = parseFloat(opening.dinar||0);
  let balDollar = parseFloat(opening.dollar||0);
  return list.map(e => {
    const dinar  = parseFloat(e.amount_dinar||0);
    const dollar = parseFloat(e.amount_dollar||0);
    const op = (e.operation_type || 'صرف').trim();
    const comm = parseFloat(e.commission||0);
    if(op === 'إيداع' || op === 'ايداع') {
      balDinar  += dinar;
      balDollar += dollar;
    } else {
      // صرف و حواله = debit
      balDinar  -= dinar;
      balDollar -= dollar;
    }
    // العمولة تُطرح دائماً من الرصيد كمصروف
    balDinar -= comm; balDollar -= parseFloat(e.commission_dollar||0);
    return {...e, bal_dinar: balDinar, bal_dollar: balDollar};
  });
}

function importKroobXLSX(input) {
  const file=input.files[0];
  if(!file||typeof XLSX==='undefined') return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    // Read opening balance - scan first 5 rows for رصيد مدور
    let opDinar=0, opDollar=0;
    for(let ri=0; ri<Math.min(rows.length,6); ri++){
      const row = rows[ri];
      const rowStr = row.map(v=>String(v||'')).join('|');
      // Look for رصيد مدور row
      if(rowStr.includes('مدور') || rowStr.includes('رصيد مدور')) {
        // Find the largest number in this row = dinar opening
        for(let i=0;i<row.length;i++){
          const v = parseFloat(String(row[i]).replace(/,/g,''));
          if(!isNaN(v) && v > 100000000 && v > opDinar) opDinar = v;
        }
        // Find dollar (small number, not zero, not same as dinar)
        for(let i=0;i<row.length;i++){
          const v = parseFloat(String(row[i]).replace(/,/g,''));
          if(!isNaN(v) && v !== 0 && v !== opDinar && Math.abs(v) < 10000000) opDollar = v;
        }
        if(opDinar) break;
      }
    }
    // If still not found, scan row 0 header for label+value pairs
    if(!opDinar) {
      const row0 = rows[0];
      for(let i=0;i<row0.length-1;i++){
        const lbl = String(row0[i]||'');
        if(lbl.includes('رصيد الدينار')) opDinar = parseFloat(String(row0[i+1]||'').replace(/,/g,''))||0;
        if(lbl.includes('رصيد الدولار')) opDollar = parseFloat(String(row0[i+1]||'').replace(/,/g,''))||0;
      }
    }
    console.log('Detected opening: Dinar='+opDinar+' Dollar='+opDollar);
    if(opDinar !== 0 || opDollar !== 0) {
      DB.set('kroob_opening',{dinar:opDinar, dollar:opDollar});
      FDB.save('kroob_opening','opening',{dinar:opDinar, dollar:opDollar});
    }

    // Headers at row 1
    const headers=rows[1].map(v=>String(v).trim());
    const getCol=(names)=>{ for(const n of names){ const idx=headers.findIndex(h=>h.includes(n)); if(idx>=0)return idx; } return -1; };
    const dateCol  =getCol(['التاريخ']);
    const descCol  =getCol(['البيان']);
    const benefCol =getCol(['الجهه','الجهة']);
    const recvCol  =getCol(['المستلم']);
    const dinarCol =getCol(['الدينار العراقي','بالدينار']);
    const dollarCol=getCol(['الدولار','بالدولار']);
    const typeCol  =getCol(['نوع العملية']);
    const commCol  =getCol(['عموله','عمولة']);       const commDollarCol =getCol(['تحويل دولار','عموله دولار']);

    // مسح البيانات القديمة قبل الاستيراد
    const oldKroob=DB.get('kroob',[]);
    for(const old of oldKroob){ try{FDB.delete('kroob',old.id);}catch(e){} }
    let kroob=[];
    let imported=0;
    for(let r=2;r<rows.length;r++){
      const row=rows[r];
      const num=String(row[0]).trim();
      if(!num||isNaN(parseFloat(num)))continue;
      const rawDate=dateCol>=0?String(row[dateCol]).trim():'';
      let date='';
      const m1=rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);
      const m2=rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if(m1) date=m1[1]+'-'+m1[2]+'-'+m1[3];
      else if(m2) date=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
      else{const n=parseFloat(rawDate);if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);date=dt.toISOString().split('T')[0];}}
      const dinar =dinarCol>=0?parseFloat(String(row[dinarCol]).replace(/,/g,''))||0:0;
      const dollar=dollarCol>=0?parseFloat(String(row[dollarCol]).replace(/,/g,''))||0:0;
      const desc  =descCol>=0?String(row[descCol]).trim():'';
      const benef =benefCol>=0?String(row[benefCol]).trim():'';
      const recv  =recvCol>=0?String(row[recvCol]).trim():'';
      const opType=typeCol>=0?String(row[typeCol]).trim():'صرف';
      const comm  =commCol>=0?parseFloat(String(row[commCol]).replace(/,/g,''))||0:0;
      if(!dinar&&!dollar&&!desc)continue;
      const id='kr_xl_'+r+'_'+Date.now();
      const commDollar=commDollarCol>=0?parseFloat(String(row[commDollarCol]).replace(/,/g,''))||0:0;       const entry={id,date,description:desc,operation_type:opType||'صرف',beneficiary:benef,receiver:recv,amount_dinar:dinar,amount_dollar:dollar,commission:comm,commission_dollar:commDollar,accountant:'import',time:Date.now()+r};
      kroob.push(entry);
      FDB.save('kroob',id,entry);
      imported++;
    }
    kroob.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));
    DB.set('kroob',kroob);
    alert('✅ تم استيراد '+imported+' حركة بنجاح!');
    input.value='';
    renderContent();
  };
  reader.readAsArrayBuffer(file);
}

function exportKroobXLSX() {
  if(typeof XLSX==='undefined') return;
  const list=getKroobList();
  const withBal=calcKroobBalance(list);

async function doLogin(){
  const email=gv('l_email').toLowerCase(), pass=gv('l_pass');
  const id2 = uid(email);

  // Step 1: Check localStorage first (fastest)
  let users = DB.get('users', {});
  
  // Step 2: If not in localStorage, try Firebase
  if (!users[id2] && window._fbReady) {
    try {
      const {db, doc, getDoc} = window._fb;
      const snap = await getDoc(doc(db, 'users', id2));
      if (snap.exists()) {
        const u = snap.data();
        users[id2] = u;
        DB.set('users', users);
      }
    } catch(e) { console.warn('Firebase user fetch error:', e); }
  }

  const passwordMatch = users[id2] ? await verifyPassword(pass, users[id2].password) : false;
  if (users[id2] && passwordMatch) {
    currentUser = users[id2];
    // Hash password if not already hashed (migration)
    if (users[id2].password && !users[id2].password.match(/^[0-9a-f]{64}$/)) {
      users[id2].password = await hashPassword(pass);
      DB.set('users', users);
    }
    FDB.save('users', id2, users[id2]);
    S.selectedFactory = (isManager() || currentUser.factory === 'الكل') ? 'الكل' : currentUser.factory;
    // Sync all data from Firebase
    if (window._fbReady) {
      render(); // show UI immediately
      await syncFromCloud();
      // Reload user permissions from Firebase after sync
      const freshUsers = DB.get('users', {});
      if (freshUsers[id2]) { currentUser = freshUsers[id2]; }
      render(); // re-render with fresh data
      // Request notification permission and start listener
      requestNotifPermission();
      setTimeout(initNotifications, 2000);
    } else {
      render();
      document.addEventListener('fb-ready', function() {
        requestNotifPermission();
        setTimeout(initNotifications, 2000);
      });
    }
  } else {
    renderLogin('البريد أو كلمة السر غير صحيحة');
  }
}

function filterTableRows(type) {
  if(type === 'p') {
    const search = (S.pSearch||'').toLowerCase();
    const refinery = S.pRefinery||'';
    const ptype = S.pType||'';
    const rows = document.querySelectorAll('#purchases-tbody tr');
    let visible = 0;
    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      if(!cells.length) return;
      const driver  = (cells[5]?.textContent||'').toLowerCase();
      const car     = (cells[6]?.textContent||'').toLowerCase();
      const loc     = (cells[7]?.textContent||'').toLowerCase();
      const voucher = (cells[1]?.textContent||'').toLowerCase();
      const ref     = cells[2]?.textContent||'';
      const pt      = cells[4]?.textContent||'';
      const matchSearch  = !search  || driver.includes(search)||car.includes(search)||loc.includes(search)||voucher.includes(search);
      const matchRefinery= !refinery|| ref===refinery;
      const matchType    = !ptype   || pt===ptype;
      if(matchSearch && matchRefinery && matchType){ row.style.display=''; visible++; }
      else row.style.display='none';
    });
    // Update counter
    const counter = document.getElementById('p-counter');
    if(counter) counter.textContent = visible + ' سجل';
  } else {
    const search = (S.sSearch||'').toLowerCase();
    const stype = S.sTypeFilter||'';
    const rows = document.querySelectorAll('#sales-tbody tr');
    let visible = 0;
    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      if(!cells.length) return;
      const driver = (cells[1]?.textContent||'').toLowerCase();
      const car    = (cells[2]?.textContent||'').toLowerCase();
      const loc    = (cells[4]?.textContent||'').toLowerCase();
      const pt     = cells[7]?.textContent||'';
      const matchSearch = !search || driver.includes(search)||car.includes(search)||loc.includes(search);
      const matchType   = !stype  || pt===stype;
      if(matchSearch && matchType){ row.style.display=''; visible++; }
      else row.style.display='none';
    });
    const counter = document.getElementById('s-counter');
    if(counter) counter.textContent = visible + ' سجل';
  }
}

<script>

// إعادة تعريف showDriversList مع دعم الفلترة
window.showDriversList = function(inputId, carId, locId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  window._renderDriverDrop(inputId, carId, locId, input.value || '');
};

// دالة مُحسَّنة: قائمة منسدلة قابلة للتصفية
window._renderDriverDrop = function(inputId, carId, locId, filter) {
  const drivers = (function(){
    try { const v = localStorage.getItem('oil_drivers'); return v ? JSON.parse(v) : {}; } catch { return {}; }
  })();
  
  let list = Object.values(drivers);
  if (!list.length) return;

  // تصفية بالاسم أو رقم السيارة أو العائدية
  if (filter && filter.trim()) {
    const f = filter.trim().toLowerCase();
    list = list.filter(function(d) {
      return (d.name || '').toLowerCase().includes(f) ||
             (d.car_no || '').toString().toLowerCase().includes(f) ||
             (d.location || '').toLowerCase().includes(f);
    });
  }

  const input = document.getElementById(inputId);
  if (!input) return;

  // استعادة أو إنشاء القائمة المنسدلة
  let drop = document.getElementById('drv-drop');
  if (!drop) {
    drop = document.createElement('div');
    drop.id = 'drv-drop';
    drop.style.cssText = 'position:fixed;background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:99999;max-height:260px;overflow-y:auto';
    document.body.appendChild(drop);
    input.onblur = function() {
      setTimeout(function() { var d = document.getElementById('drv-drop'); if (d) d.remove(); }, 200);
    };
  }

  drop.innerHTML = '';

  if (!list.length) {
    drop.innerHTML = '<div style="padding:12px 14px;color:#94a3b8;font-size:12px;text-align:center">لا يوجد سائق مطابق</div>';
  } else {
    list.forEach(function(d) {
      var item = document.createElement('div');
      item.style.cssText = 'padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9';
      item.innerHTML =
        '<div style="font-size:13px;font-weight:900;color:#0f172a">' + d.name + '</div>' +
        '<div style="font-size:10px;color:#64748b;margin-top:2px">🚗 ' + (d.car_no || '—') + ' &nbsp;|&nbsp; 📍 ' + (d.location || '—') + '</div>';
      item.onmouseover = function() { item.style.background = '#eff6ff'; };
      item.onmouseout  = function() { item.style.background = ''; };
      item.onmousedown = function(ev) {
        ev.preventDefault();
        input.value = d.name;
        var c = document.getElementById(carId);
        var l = document.getElementById(locId);
        if (c) c.value = d.car_no || '';
        if (l) l.value = d.location || '';
        drop.remove();
      };
      drop.appendChild(item);
    });
  }

  // تحديث الموضع في كل مرة
  var rect = input.getBoundingClientRect();
  drop.style.top   = (rect.bottom + 2) + 'px';
  drop.style.right = (window.innerWidth - rect.right) + 'px';
  drop.style.width = rect.width + 'px';
};

  <!-- PATCH: إصلاح شكل رسالة الواتساب - عمولة في نفس السطر وحذف ملخص العمولة -->
<script>
window.copyKroobWhatsapp = function() {
  var date = S.wFrom && S.wTo && S.wFrom === S.wTo ? S.wFrom : (S.wFrom || today());
  var todayList = getKroobByDate(date);
  var openingBal = getKroobBalanceBefore(date);
  var balDinar  = openingBal.dinar;
  var balDollar = openingBal.dollar;

  // حساب الرصيد الختامي
  todayList.forEach(function(e){
    var d  = parseFloat(e.amount_dinar||0);
    var dl = parseFloat(e.amount_dollar||0);
    var op = (e.operation_type||'صرف').trim();
    var comm  = parseFloat(e.commission||0);
    var commD = parseFloat(e.commission_dollar||0);
    if(op==='إيداع'||op==='ايداع'){ balDinar+=d; balDollar+=dl; }
    else { balDinar-=d; balDollar-=dl; }
    balDinar -= comm; balDollar -= commD;
  });

  var N    = '\n';
  var LINE = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
  var txt  = '';

  txt += '🏦 *كشف يومي — كروب رافد فيصل*' + N;
  txt += '📅 *' + date + '*' + N;
  txt += LINE + N;

  // الرصيد السابق
  txt += '📊 *الرصيد السابق:*' + N;
  txt += '   💛 ' + fmtM(openingBal.dinar) + ' د.ع';
  if(openingBal.dollar) txt += '  |  🖤 $ ' + fmtM(openingBal.dollar);
  txt += N + LINE + N;

  // الحركات — كل شيء في سطر واحد أفقي
  txt += '📋 *الحركات (' + todayList.length + '):*' + N;

  todayList.forEach(function(e, i){
    var op    = (e.operation_type||'صرف').trim();
    var isIn  = op==='إيداع'||op==='ايداع';
    var icon  = isIn ? '🟢' : (op==='حواله' ? '🔵' : '🔴');
    var d     = parseFloat(e.amount_dinar||0);
    var dl    = parseFloat(e.amount_dollar||0);
    var comm  = parseFloat(e.commission||0);
    var commD = parseFloat(e.commission_dollar||0);
    var desc  = (e.description  || '').trim();
    var benef = (e.beneficiary  || '').trim();
    var recv  = (e.receiver     || '').trim();

    // سطر واحد أفقي
    var row = icon + ' ' + (i+1) + '. ';
    if(desc)  row += desc;
    if(benef) row += ' | 🏢 ' + benef;
    if(recv)  row += ' | 👤 ' + recv;
    row += ' | ' + op;
    if(d)     row += ' | 💛 ' + fmtM(d) + ' د.ع';
    if(dl)    row += ' | 🖤 $ ' + fmtM(dl);

    // العمولة في نفس السطر بجانب كلمة عمولة
    if(comm && commD) {
      row += ' | عمولة: ' + fmtM(comm) + ' د.ع / $' + fmtM(commD);
    } else if(comm) {
      row += ' | عمولة: ' + fmtM(comm) + ' د.ع';
    } else if(commD) {
      row += ' | عمولة: $' + fmtM(commD);
    }

    txt += row + N;
  });

  txt += LINE + N;

  // الرصيد الختامي فقط — بدون ملخص العمولة
  txt += '💰 *الرصيد الحالي:*' + N;
  txt += '   💛 ' + fmtM(balDinar) + ' د.ع';
  if(balDollar) txt += '  |  🖤 $ ' + fmtM(balDollar);
  txt += N + LINE + N;
  txt += '✅ نظام المراقبة v40.5';

  if(navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function(){ alert('✅ تم نسخ الكشف!'); });
  } else {
    var t = document.createElement('textarea');
    t.value = txt; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    alert('✅ تم النسخ!');
  }
};
console.log('✅ WhatsApp format v2 — inline commission, no total line');
</script>

window.exportRefineryXLSX = function() {
  if(typeof XLSX === 'undefined') return;
  var entries = DB.get('entries',[]);
  var wf=S.wFrom||'', wt=S.wTo||'';
  if(wf) entries=entries.filter(function(e){return (e.date||'')>=wf;});
  if(wt) entries=entries.filter(function(e){return (e.date||'')<=wt;});
  var rows=[['ت','المعمل','طن مصفى كربلاء','طن مصفى صلاح الدين','إجمالي الطن','سعر الطن','إجمالي المبلغ']];
  var gT=0,gA=0;
  FACTORIES.forEach(function(f,i){
    var fe=entries.filter(function(e){return e.factory===f;});
    var tK=fe.filter(function(e){return e.refinery==='مصفى كربلاء';}).reduce(function(s,e){return s+(parseFloat(e.qty_tons)||0);},0);
    var tS=fe.filter(function(e){return e.refinery==='مصفى صلاح الدين';}).reduce(function(s,e){return s+(parseFloat(e.qty_tons)||0);},0);
    var tot=tK+tS, amt=tot*REFINERY_PRICE_PER_TON;
    gT+=tot; gA+=amt;
    rows.push([i+1,f,tK,tS,tot,REFINERY_PRICE_PER_TON,amt]);
  });
  rows.push(['','الإجمالي','','',gT,REFINERY_PRICE_PER_TON,gA]);
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:20},{wch:18},{wch:20},{wch:14},{wch:14},{wch:20}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'حساب المصفى');
  XLSX.writeFile(wb,'حساب_المصفى_'+today()+'.xlsx');
};

// ===== 3. ربط الصفحة بـ renderContent =====
var _origRC2 = window.renderContent;

};

// ===== 4. حقن زر القائمة بـ MutationObserver =====

  nav.appendChild(div);

// MutationObserver يراقب الـ sidebar ويُضيف الزر فور ظهوره

_navObserver.observe(document.body, { childList: true, subtree: true });

// محاولة فورية أيضاً

console.log('✅ Refinery account v2 ready');

<script>

  var facts       = (sf !== 'الكل') ? [sf] : FACTORIES;
  var periodLabel = wf&&wt ? wf+' → '+wt : wf ? 'من '+wf : wt ? 'إلى '+wt : 'الكلي';
  var PRICE = 42000;

  function buildTable(refName, color) {
    var rows = '', grandTons=0, grandAmt=0, grandRec=0, grandRem=0;
    var recData = received[refName] || {};
    var hasRows = false;

      var fe   = entries.filter(function(e){ return e.factory===f && e.refinery===refName; });

      var rem  = amt - rec;
      grandTons+=tons; grandAmt+=amt; grandRec+=rec; grandRem+=rem;

      var safeRef = refName.replace(/\s+/g,'_');
      var safeF   = f.replace(/\s+/g,'_').replace(/['"]/g,'');

// حفظ المبلغ المستلم
window.saveRefineryReceived = function(refinery, factory, value) {
  var data = DB.get('refinery_received', {});
  if(!data[refinery]) data[refinery] = {};
  data[refinery][factory] = parseFloat(value)||0;
  DB.set('refinery_received', data);
  // تحديث المتبقي فوراً بدون إعادة رندر كامل
  var PRICE = 42000;
  var entries = DB.get('entries',[]);
  var fe = entries.filter(function(e){ return e.factory===factory && e.refinery===refinery; });
  var tons = fe.reduce(function(s,e){ return s+(parseFloat(e.qty_tons)||0); },0);
  var amt  = tons * PRICE;
  var rec  = parseFloat(value)||0;
  var rem  = amt - rec;
  // بحث عن خلية المتبقي وتحديثها
  var safeRef = refinery.replace(/\s+/g,'_');
  var safeF   = factory.replace(/\s+/g,'_').replace(/['"]/g,'');
  var inp = document.getElementById('rec_'+safeRef+'_'+safeF);
  if(inp) {
    var row = inp.closest('tr');
    if(row) {
      var lastCell = row.cells[row.cells.length-1];
      if(lastCell) {
        lastCell.textContent = fmtM(Math.abs(rem)) + (rem<=0?' ✅':' ⚠️');
        lastCell.style.color  = rem<=0 ? '#059669' : '#dc2626';
        lastCell.style.background = rem<=0 ? '#ecfdf5' : '#fef2f2';
      }
    }
  }
};

  return list;
}

function calcRafidBalance(list) {
  var opening = DB.get('rafid_opening', {dinar:0, dollar:0});
  var balDinar  = parseFloat(opening.dinar||0);
  var balDollar = parseFloat(opening.dollar||0);
  return list.map(function(e) {
    var dinar   = parseFloat(e.dinar||0);
    var dollar  = parseFloat(e.dollar||0);
    var comm    = parseFloat(e.commission||0);
    var commD   = parseFloat(e.commission_dollar||0);
    var typeD   = (e.type_dinar  || 'مدين').trim();
    var typeDol = (e.type_dollar || 'مدين').trim();
    if(typeD   === 'دائن') balDinar  += dinar;  else balDinar  -= dinar;
    if(typeDol === 'دائن') balDollar += dollar; else balDollar -= dollar;
    balDinar  -= comm;
    balDollar -= commD;
    return Object.assign({}, e, {bal_dinar: balDinar, bal_dollar: balDollar});
  });
}

window.importRafidXLSX = function(input) {
  var file=input.files[0]; if(!file||typeof XLSX==='undefined')return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // رصيد الباقي
    var opDinar=0,opDollar=0;
    for(var ri=0;ri<Math.min(rows.length,5);ri++){
      var r=rows[ri]; var rs=r.map(function(v){return String(v||'');}).join('|');
      if(rs.includes('الباقي')){
        for(var ci=0;ci<r.length;ci++){var v=parseFloat(String(r[ci]).replace(/,/g,''));if(!isNaN(v)&&Math.abs(v)>10000&&Math.abs(v)>Math.abs(opDinar))opDinar=v;}
        break;
      }
    }
    DB.set('rafid_opening',{dinar:opDinar,dollar:opDollar});
    // أعمدة البيانات — صف 2 هو الرأس (index 1)
    var headers=rows[1]?rows[1].map(function(v){return String(v).trim();}):[];
    function gc(names){for(var ni=0;ni<names.length;ni++){var idx=headers.findIndex(function(h){return h.includes(names[ni]);});if(idx>=0)return idx;}return -1;}
    var dateC =gc(['التاريخ']),descC=gc(['البيان']),benefC=gc(['الجهه','الجهة']),recvC=gc(['المستلم']),
        dinCC =gc(['دائن بالدينار','دائن بالدين']),dinDC=gc(['مدين بالدينار','مدين بالدين']),
        dolCC =gc(['دائن بالدولار']),dolDC=gc(['مدين بالدولار']),
        typeC =gc(['نوع العملية']),commC=gc(['عموله','عمولة']);
    var list=[],imported=0;
    for(var r2=2;r2<rows.length;r2++){
      var row=rows[r2];
      var num=String(row[0]).trim(); if(!num||isNaN(parseFloat(num)))continue;
      var rawDate=dateC>=0?String(row[dateC]).trim():'';
      var date2=''; var m1=rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);var m2=rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if(m1)date2=m1[1]+'-'+m1[2]+'-'+m1[3]; else if(m2)date2=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
      else{var n=parseFloat(rawDate);if(!isNaN(n)&&n>40000){var dt=new Date((n-25569)*86400*1000);date2=dt.toISOString().split('T')[0];}}
      var dinC2=dinCC>=0?parseFloat(String(row[dinCC]).replace(/,/g,''))||0:0;
      var dinD2=dinDC>=0?parseFloat(String(row[dinDC]).replace(/,/g,''))||0:0;
      var dolC2=dolCC>=0?parseFloat(String(row[dolCC]).replace(/,/g,''))||0:0;
      var dolD2=dolDC>=0?parseFloat(String(row[dolDC]).replace(/,/g,''))||0:0;
      if(!dinC2&&!dinD2&&!dolC2&&!dolD2)continue;
      var comm2=commC>=0?parseFloat(String(row[commC]).replace(/,/g,''))||0:0;
      var entry2={id:'rf_xl_'+r2+'_'+Date.now(),date:date2,
        description:descC>=0?String(row[descC]).trim():'',
        beneficiary:benefC>=0?String(row[benefC]).trim():'',
        receiver:recvC>=0?String(row[recvC]).trim():'',
        op_type:typeC>=0?String(row[typeC]).trim():'',
        dinar:dinC2||dinD2, type_dinar:dinC2?'دائن':'مدين',
        dollar:dolC2||dolD2,type_dollar:dolC2?'دائن':'مدين',
        commission:comm2,commission_dollar:0,
        accountant:'import',time:Date.now()+r2};
      list.push(entry2); FDB.save('rafid_accounts',entry2.id,entry2); imported++;
    }
    list.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    DB.set('rafid_accounts',list);
    alert('✅ تم استيراد '+imported+' حركة بنجاح!');
    input.value=''; renderContent();
  };
  reader.readAsArrayBuffer(file);
};

  var t='💼 *حسابات سيد رافد*\n📅 *'+today()+'*\n'+L+N;

  t+=L+N+'💰 *الرصيد الحالي:*\n';
  t+='   💛 '+fmtM(last?last.bal_dinar:opening.dinar)+' د.ع\n';
  t+='   🖤 '+fmtM(last?last.bal_dollar:opening.dollar)+' $\n';
  t+=L+'\n✅ نظام المراقبة v40.5';
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){alert('✅ تم النسخ!');});
  else{var tx=document.createElement('textarea');tx.value=t;document.body.appendChild(tx);tx.select();document.execCommand('copy');document.body.removeChild(tx);alert('✅ تم النسخ!');}
};

function getRafidList() {
  var list = DB.get('rafid_accounts', []);
  list.sort(function(a,b){ return (a.date||'').localeCompare(b.date||'') || (a.time||0)-(b.time||0); });
  return list;
}

function calcRafidBalance(list) {
  var opening = DB.get('rafid_opening', {dinar:0, dollar:0});
  var balDinar  = parseFloat(opening.dinar||0);
  var balDollar = parseFloat(opening.dollar||0);
  return list.map(function(e) {
    var dinar   = parseFloat(e.dinar||0);
    var dollar  = parseFloat(e.dollar||0);
    var comm    = parseFloat(e.commission||0);
    var commD   = parseFloat(e.commission_dollar||0);
    var typeD   = (e.type_dinar  || 'مدين').trim();
    var typeDol = (e.type_dollar || 'مدين').trim();
    if(typeD   === 'دائن') balDinar  += dinar;  else balDinar  -= dinar;
    if(typeDol === 'دائن') balDollar += dollar; else balDollar -= dollar;
    balDinar  -= comm;
    balDollar -= commD;
    return Object.assign({}, e, {bal_dinar: balDinar, bal_dollar: balDollar});
  });
}

window.importRafidXLSX = function(input) {
  var file=input.files[0]; if(!file||typeof XLSX==='undefined')return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // رصيد الباقي
    var opDinar=0,opDollar=0;
    for(var ri=0;ri<Math.min(rows.length,5);ri++){
      var r=rows[ri]; var rs=r.map(function(v){return String(v||'');}).join('|');
      if(rs.includes('الباقي')){
        for(var ci=0;ci<r.length;ci++){var v=parseFloat(String(r[ci]).replace(/,/g,''));if(!isNaN(v)&&Math.abs(v)>10000&&Math.abs(v)>Math.abs(opDinar))opDinar=v;}
        break;
      }
    }
    DB.set('rafid_opening',{dinar:opDinar,dollar:opDollar});
    // أعمدة البيانات — صف 2 هو الرأس (index 1)
    var headers=rows[1]?rows[1].map(function(v){return String(v).trim();}):[];
    function gc(names){for(var ni=0;ni<names.length;ni++){var idx=headers.findIndex(function(h){return h.includes(names[ni]);});if(idx>=0)return idx;}return -1;}
    var dateC =gc(['التاريخ']),descC=gc(['البيان']),benefC=gc(['الجهه','الجهة']),recvC=gc(['المستلم']),
        dinCC =gc(['دائن بالدينار','دائن بالدين']),dinDC=gc(['مدين بالدينار','مدين بالدين']),
        dolCC =gc(['دائن بالدولار']),dolDC=gc(['مدين بالدولار']),
        typeC =gc(['نوع العملية']),commC=gc(['عموله','عمولة']);
    var list=[],imported=0;
    for(var r2=2;r2<rows.length;r2++){
      var row=rows[r2];
      var num=String(row[0]).trim(); if(!num||isNaN(parseFloat(num)))continue;
      var rawDate=dateC>=0?String(row[dateC]).trim():'';
      var date2=''; var m1=rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);var m2=rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if(m1)date2=m1[1]+'-'+m1[2]+'-'+m1[3]; else if(m2)date2=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
      else{var n=parseFloat(rawDate);if(!isNaN(n)&&n>40000){var dt=new Date((n-25569)*86400*1000);date2=dt.toISOString().split('T')[0];}}
      var dinC2=dinCC>=0?parseFloat(String(row[dinCC]).replace(/,/g,''))||0:0;
      var dinD2=dinDC>=0?parseFloat(String(row[dinDC]).replace(/,/g,''))||0:0;
      var dolC2=dolCC>=0?parseFloat(String(row[dolCC]).replace(/,/g,''))||0:0;
      var dolD2=dolDC>=0?parseFloat(String(row[dolDC]).replace(/,/g,''))||0:0;
      if(!dinC2&&!dinD2&&!dolC2&&!dolD2)continue;
      var comm2=commC>=0?parseFloat(String(row[commC]).replace(/,/g,''))||0:0;
      var entry2={id:'rf_xl_'+r2+'_'+Date.now(),date:date2,
        description:descC>=0?String(row[descC]).trim():'',
        beneficiary:benefC>=0?String(row[benefC]).trim():'',
        receiver:recvC>=0?String(row[recvC]).trim():'',
        op_type:typeC>=0?String(row[typeC]).trim():'',
        dinar:dinC2||dinD2, type_dinar:dinC2?'دائن':'مدين',
        dollar:dolC2||dolD2,type_dollar:dolC2?'دائن':'مدين',
        commission:comm2,commission_dollar:0,
        accountant:'import',time:Date.now()+r2};
      list.push(entry2); FDB.save('rafid_accounts',entry2.id,entry2); imported++;
    }
    list.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    DB.set('rafid_accounts',list);
    alert('✅ تم استيراد '+imported+' حركة بنجاح!');
    input.value=''; renderContent();
  };
  reader.readAsArrayBuffer(file);
};

window.exportRafidXLSX = function(){
  if(typeof XLSX==='undefined')return;
  var list=getRafidList(),withBal=calcRafidBalance(list);
  var opening=DB.get('rafid_opening',{dinar:0,dollar:0});
  var rows=[['ت','التاريخ','البيان','الجهة','المستلم','دائن دينار','مدين دينار','دائن دولار','مدين دولار','نوع العملية','العمولة','رصيد دينار','رصيد دولار']];
  withBal.forEach(function(e,i){
    var isDainD=(e.type_dinar||'مدين')==='دائن';var isDainDol=(e.type_dollar||'مدين')==='دائن';
    rows.push([i+1,e.date,e.description,e.beneficiary||'',e.receiver||'',
      isDainD?e.dinar:0,!isDainD?e.dinar:0,isDainDol?e.dollar:0,!isDainDol?e.dollar:0,
      e.op_type||'',e.commission||0,e.bal_dinar,e.bal_dollar]);
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:13},{wch:30},{wch:18},{wch:20},{wch:14},{wch:14},{wch:14},{wch:14},{wch:18},{wch:12},{wch:16},{wch:14}];
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'حسابات سيد رافد');

};

window.copyRafidWhatsapp = function(){
  var list=getRafidList(),withBal=calcRafidBalance(list);
  var opening=DB.get('rafid_opening',{dinar:0,dollar:0});
  var last=withBal[withBal.length-1];
  var N='\n',L='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
  var t='💼 *حسابات سيد رافد*\n📅 *'+today()+'*\n'+L+N;
  t+='📊 *الرصيد السابق:* 💛 '+fmtM(opening.dinar)+' د.ع'+N+L+N;
  t+='📋 *الحركات ('+list.length+'):*\n';
  withBal.forEach(function(e,i){
    var isDainD=(e.type_dinar||'مدين')==='دائن';
    var isDainDol=(e.type_dollar||'مدين')==='دائن';
    var row=(isDainD?'🟢':'🔴')+' '+(i+1)+'. '+(e.description||'');
    if(e.receiver) row+=' | 👤 '+e.receiver;
    if(e.dinar)    row+=' | '+(isDainD?'💛 +':' 💛 -')+fmtM(e.dinar)+' د.ع';
    if(e.dollar)   row+=' | '+(isDainDol?'💚 +':'💔 -')+fmtM(e.dollar)+' $';
    if(e.commission) row+=' | عمولة: '+fmtM(e.commission);
    t+=row+N;
  });
  t+=L+N+'💰 *الرصيد الحالي:*\n';
  t+='   💛 '+fmtM(last?last.bal_dinar:opening.dinar)+' د.ع\n';
  t+='   🖤 '+fmtM(last?last.bal_dollar:opening.dollar)+' $\n';
  t+=L+'\n✅ نظام المراقبة v40.5';
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){alert('✅ تم النسخ!');});
  else{var tx=document.createElement('textarea');tx.value=t;document.body.appendChild(tx);tx.select();document.execCommand('copy');document.body.removeChild(tx);alert('✅ تم النسخ!');}
};

        if(balDinarCol >= 0) {
          var rd = parseFloat(String(rows[ri][balDinarCol]||'').replace(/,/g,''));
          if(!isNaN(rd)) opDinar = rd;
        }
        if(balDollarCol >= 0) {
          var rdol = parseFloat(String(rows[ri][balDollarCol]||'').replace(/,/g,''));
          if(!isNaN(rdol)) opDollar = rdol;
        }
        console.log('Opening balance — Dinar:', opDinar, 'Dollar:', opDollar);
        break;
      }
    }
    DB.set('rafid_opening', {dinar: opDinar, dollar: opDollar});
    if(window._fbReady) FDB.save('rafid_opening', 'opening', {dinar: opDinar, dollar: opDollar});

    // ===== استيراد الحركات =====
    var list = [], imported = 0;
    for(var r=2; r<rows.length; r++) {
      var row2 = rows[r];
      var num  = String(row2[0]).trim();
      if(!num || isNaN(parseFloat(num))) continue;

      var rawDate = dateCol>=0 ? String(row2[dateCol]).trim() : '';
      var date2 = '';
      var m1=rawDate.match(/^(\d{4})-(\d{2})-(\d{2})/);
      var m2=rawDate.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if(m1) date2=m1[1]+'-'+m1[2]+'-'+m1[3];
      else if(m2) date2=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
      else { var n=parseFloat(rawDate); if(!isNaN(n)&&n>40000){var dt=new Date((n-25569)*86400*1000);date2=dt.toISOString().split('T')[0];} }

      var dainD   = dainDinarCol >=0 ? parseFloat(String(row2[dainDinarCol] ||'').replace(/,/g,''))||0 : 0;
      var madinD  = madinDinarCol>=0 ? parseFloat(String(row2[madinDinarCol]||'').replace(/,/g,''))||0 : 0;
      var dainDol = dainDollarCol >=0 ? parseFloat(String(row2[dainDollarCol] ||'').replace(/,/g,''))||0 : 0;
      var madinDol= madinDollarCol>=0 ? parseFloat(String(row2[madinDollarCol]||'').replace(/,/g,''))||0 : 0;
      if(!dainD && !madinD && !dainDol && !madinDol) continue;

      var comm = commCol>=0 ? parseFloat(String(row2[commCol]||'').replace(/,/g,''))||0 : 0;

      // تحديد عملة العمولة: إذا كانت العملية بالدولار → عمولة دولار، إذا بالدينار → عمولة دينار
      var isDollarTx = (dainDol > 0 || madinDol > 0) && dainD === 0 && madinD === 0;
      var commDinar  = isDollarTx ? 0    : comm;
      var commDollar = isDollarTx ? comm : 0;

      var entry = {
        id: 'rf_xl_'+r+'_'+Date.now(),
        date: date2,
        description: descCol>=0 ? String(row2[descCol]).trim() : '',
        beneficiary: benefCol>=0 ? String(row2[benefCol]).trim() : '',
        receiver:    recvCol>=0  ? String(row2[recvCol]).trim()  : '',
        op_type:     typeCol>=0  ? String(row2[typeCol]).trim()  : '',
        dinar:       dainD  || madinD,
        type_dinar:  dainD  ? 'دائن' : 'مدين',
        dollar:      dainDol || madinDol,
        type_dollar: dainDol ? 'دائن' : 'مدين',
        commission:        commDinar,
        commission_dollar: commDollar,
        accountant: 'import',
        time: Date.now() + r
      };
      list.push(entry);
      FDB.save('rafid_accounts', entry.id, entry);
      imported++;
    }

    list.sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });
    DB.set('rafid_accounts', list);
    alert('✅ تم الاستيراد: '+imported+' حركة\nالرصيد الافتتاحي: '+opDinar.toLocaleString()+' د.ع');
    input.value = '';
    renderContent();
  };
  reader.readAsArrayBuffer(file);
};
console.log('✅ importRafidXLSX v3 — correct commission currency');
</script>
</body>
