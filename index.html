<script>
// ===== قاعدة البيانات =====
const DB = {
  get(key, def) { try { const v=localStorage.getItem('oil_'+key); return v?JSON.parse(v):(def!==undefined?def:[]); } catch { return (def!==undefined?def:[]); } },
  set(key, val) { try { localStorage.setItem('oil_'+key, JSON.stringify(val)); } catch {} }
};

const FDB = {
  async save(col, id, data) {
    try { if(!window._fbReady) return; const {db,doc,setDoc}=window._fb; await setDoc(doc(db,col,id),{...data,_updated:Date.now()}); } catch(e) { console.warn('FDB.save error:',e); }
  },
  async delete(col, id) {
    try { if(!window._fbReady) return; const {db,doc,deleteDoc}=window._fb; await deleteDoc(doc(db,col,id)); } catch(e) { console.warn('FDB.delete error:',e); }
  },
  async getAll(col) {
    try { if(!window._fbReady) return null; const {db,collection,getDocs}=window._fb; const snap=await getDocs(collection(db,col)); return snap.docs.map(d=>d.data()); } catch(e) { return null; }
  },
  listen(col, cb) {
    try { if(!window._fbReady){setTimeout(()=>this.listen(col,cb),1000);return;} const {db,collection,onSnapshot}=window._fb; return onSnapshot(collection(db,col),snap=>{cb(snap.docs.map(d=>d.data()));}); } catch(e) {}
  }
};

async function syncFromCloud() {
  try {
    const [entries,sales,drivers,salaf] = await Promise.all([FDB.getAll('entries'),FDB.getAll('sales'),FDB.getAll('drivers'),FDB.getAll('salaf')]);
    // المزامنة الذكية: localStorage يفوز إذا كان أحدث أو متطابق
    // المزامنة: Firebase هو المصدر الوحيد للحقيقة - نستبدل localStorage كاملاً
    if(entries&&entries.length){
      const byId={};entries.forEach(e=>{byId[e.id]=e;});
      DB.set('entries',Object.values(byId));
    }
    if(sales&&sales.length){
      const byId={};sales.forEach(s=>{byId[s.id]=s;});
      DB.set('sales',Object.values(byId));
    }
    if(salaf&&salaf.length) DB.set('salaf',salaf);
    const expenses=await FDB.getAll('expenses'); if(expenses&&expenses.length) DB.set('expenses',expenses);

async function hashPassword(password) {
  const msgBuffer=new TextEncoder().encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(password,hash) {
  if(!hash||!hash.match(/^[0-9a-f]{64}$/)) return password===hash;
  return (await hashPassword(password))===hash;
}

// ===== Toast System =====
function showToast(msg, type='success', duration=3000){
  const container = document.getElementById('toast-container');
  if(!container) return;
  const icons = {success:'✅', error:'❌', warning:'⚠️', info:'ℹ️'};
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span style="font-size:16px">' + (icons[type]||'✅') + '</span><span>' + msg + '</span>';
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function fmt(v,d=3){ const n=parseFloat(v); if(!n||isNaN(n))return'0'; const fixed=n.toFixed(d); const parts=fixed.split('.'); parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,','); const dec=parts[1]?parts[1].replace(/0+$/,''):''; return dec?parts[0]+'.'+dec:parts[0]; }
function fmtM(v){ var n=Math.round(parseFloat(v)||0); return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function fmtTon(v){ return fmt(sc(v)); }
function fmtLiter(v){ return fmt(sc(v)); }
function fmtKg(v){ return fmt(sc(v)); }
function fmtKaban(v){ const n=parseFloat(v); if(!n||isNaN(n))return'0'; return n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:3}); }

function getAnalysis(fromDate,toDate){
  let entries=loadEntries();
  if(fromDate)entries=entries.filter(e=>e.date>=fromDate);
  if(toDate)entries=entries.filter(e=>e.date<=toDate);
  const t=today(),res={};
  for(const f of FACTORIES){
    const ft=entries.filter(e=>e.factory===f),fd=ft.filter(e=>e.date===t);
    const agg=arr=>({cars:arr.length,tons:arr.reduce((s,e)=>s+sc(e.qty_tons),0),liters:arr.reduce((s,e)=>s+sc(e.natural_liters),0),kg:arr.reduce((s,e)=>s+sc(e.weight_kg),0),money:arr.reduce((s,e)=>s+parseFloat(e.refinery_price||0),0)});
    res[f]={today:agg(fd),total:agg(ft)};
  }
  return res;
}
function getSaleAnalysis(fromDate,toDate){
  let sales=loadSales();
  if(fromDate)sales=sales.filter(s=>s.date>=fromDate);
  if(toDate)sales=sales.filter(s=>s.date<=toDate);
  const t=today(),res={};
  for(const f of FACTORIES){
    const ft=sales.filter(s=>s.factory===f),fd=ft.filter(s=>s.date===t);
    const agg=arr=>({cars:arr.length,kaban:arr.reduce((s,e)=>s+parseFloat(e.kaban||0),0),liters:arr.reduce((s,e)=>s+parseFloat(e.qty_liters||0),0),money:arr.reduce((s,e)=>s+(parseFloat(e.advance||0)*parseFloat(e.received||0)),0)});
    res[f]={today:agg(fd),total:agg(ft)};
  }
  return res;
}

      <div style="font-size:11px;color:#64748b;font-weight:700;margin-bottom:6px">📦 سيارات المبيعات</div>

function copyPortWhatsapp(){var t=window._portWAText||'';if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>showToast('تم النسخ','success'));}else{var e=document.createElement('textarea');e.value=t;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);showToast('تم النسخ','success');}}

function viewPorts(){
  var wf=S.wFrom,wt=S.wTo,sf=S.selectedFactory;
  var facts=sf==='الكل'?FACTORIES:[sf];
  var periodLabel=wf&&wt?wf+' → '+wt:wf?'من '+wf:wt?'إلى '+wt:'الكل';
  var allSales=DB.get('sales',[]);
  var fs=allSales.filter(function(s){if(sf!=='الكل'&&s.factory!==sf)return false;if(wf&&s.date<wf)return false;if(wt&&s.date>wt)return false;return(s.address||'').includes('الخور')||(s.address||'').includes('الحرة');});
  var html='',wa='موقف مبيعات الموانئ\n'+periodLabel+'\n---\n';
  facts.forEach(function(fac){
    var fH='',fT=fac+'\n',ok=false;
    [['ميناء الخور','الخور'],['ميناء الحرة','الحرة']].forEach(function(p){
      var ps=fs.filter(function(s){return s.factory===fac&&(s.address||'').includes(p[1]);});
      if(ps.length){var c=ps.length,k=ps.reduce((s,e)=>s+(parseFloat(e.kaban)||0),0),m=ps.reduce((s,e)=>s+(parseFloat(e.advance||0)*parseFloat(e.received||0)),0);
        fH+='<div style="display:flex;justify-content:space-between;padding:8px 10px;background:#f5f3ff;border-radius:6px;margin:4px 0"><span style="color:#7c3aed;font-weight:700">'+p[0]+'</span><span>'+c+' سيارة | كبان: <b style="color:#7c3aed">'+fmtKaban(k)+'</b></span></div>';
        fT+=p[0]+'\nالسيارات: '+c+' | الكبان: '+fmtKaban(k)+'\n';ok=true;}
    });
    if(ok){html+='<div style="margin-bottom:16px;border-right:4px solid #7c3aed;padding-right:10px"><div style="font-weight:900;color:#5b21b6;font-size:13px;margin-bottom:6px">'+fac+'</div>'+fH+'</div>';wa+=fT+'---\n';}
  });
  window._portWAText=wa;
  if(!html)html='<div style="color:#94a3b8;text-align:center;padding:20px">لا توجد بيانات للموانئ</div>';
  return '<div class="card no-print" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><h2 style="font-size:15px;font-weight:900">⚓ موقف مبيعات الموانئ</h2><button class="btn btn-green" onclick="copyPortWhatsapp()">📱 نسخ الواتساب</button></div>'+
    '<div class="card no-print" style="margin-bottom:14px;background:#f8fafc;padding:14px"><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-blue" style="font-size:12px" onclick="S.wFrom=today();S.wTo=today();renderContent()">اليوم</button><button class="btn btn-gray" style="font-size:12px" onclick="setThisMonth()">هذا الشهر</button></div><div style="margin-top:8px;font-size:12px;color:#2563eb">الفترة: <span style="background:#eff6ff;padding:2px 10px;border-radius:6px">'+periodLabel+'</span></div></div>'+
    '<div class="card">'+html+'</div>';
}

function viewWhatsapp() {
  const wf=S.wFrom,wt=S.wTo;
  const analysis=getAnalysis(wf,wt),saleAn=getSaleAnalysis(wf,wt),sf=S.selectedFactory;
  const facts=sf==='الكل'?FACTORIES:[sf];
  const periodLabel=wf&&wt?wf+' → '+wt:wf?'من '+wf:wt?'إلى '+wt:'الكلي';
  const targetDate=wf&&wt&&wf===wt?wf:(wf||today());

  const pRows=facts.map((f,i)=>{const d=analysis[f].total;return`<tr><td class="td" style="color:#94a3b8">${i+1}</td><td class="td" style="font-weight:900">${f}</td><td class="td">${d.cars}</td><td class="td" style="color:#2563eb;font-weight:900">${fmt(d.tons)}</td><td class="td" style="color:#059669;font-weight:900">${fmt(d.liters)}</td><td class="td" style="color:#d97706;font-weight:900">${fmt(d.kg)}</td></tr>`;}).join('');
  const sRows=facts.map((f,i)=>{const d=saleAn[f].total;return`<tr><td class="td-p" style="color:#94a3b8">${i+1}</td><td class="td-p" style="font-weight:900">${f}</td><td class="td-p">${d.cars}</td><td class="td-p" style="color:#7c3aed;font-weight:900">${fmtKaban(d.kaban)}</td><td class="td-p" style="color:#1e3a8a;font-weight:900">${fmtM(d.money)}</td></tr>`;}).join('');

  let html = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px" class="no-print">
    <h2 style="font-size:15px;font-weight:900">📊 الموقف الإجمالي</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-blue" onclick="copyWhatsappPurchases()" title="نسخ المشتريات فقط">📱 نسخ المشتريات</button>
      <button class="btn" style="background:#7c3aed;color:#fff" onclick="copyWhatsappSales()" title="نسخ المبيعات فقط">📱 نسخ المبيعات</button>
      <button class="btn btn-green" onclick="copyWhatsapp()" title="نسخ الكل معاً">📋 نسخ الكل</button>
    </div>
  </div>
  <div class="card no-print" style="margin-bottom:14px;background:#f8fafc;padding:14px">
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div><label class="lbl">📅 من التاريخ</label><input class="inp" type="date" id="w_from" value="${wf}" style="width:160px" onchange="S.wFrom=this.value;renderContent()"></div>
      <div><label class="lbl">📅 إلى التاريخ</label><input class="inp" type="date" id="w_to" value="${wt}" style="width:160px" onchange="S.wTo=this.value;renderContent()"></div>
      <button class="btn btn-blue" style="font-size:12px" onclick="S.wFrom=today();S.wTo=today();renderContent()">اليوم فقط</button>
      <button class="btn btn-gray" style="font-size:12px" onclick="setThisWeek()">هذا الأسبوع</button>
      <button class="btn btn-gray" style="font-size:12px" onclick="setThisMonth()">هذا الشهر</button>
      <button class="btn btn-red" style="font-size:12px" onclick="S.wFrom='';S.wTo='';renderContent()">الكل</button>
    </div>
    <div style="margin-top:8px;font-size:12px;color:#2563eb;font-weight:700">📊 الفترة: <span style="background:#eff6ff;padding:2px 10px;border-radius:6px">${periodLabel}</span></div>
  </div>
  <h3 style="font-size:13px;font-weight:900;margin-bottom:8px;color:#1e40af">🛢️ المشتريات</h3>
  <div class="card" style="overflow:hidden;padding:0;margin-bottom:14px"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:500px">
    <thead><tr><th class="th">ت</th><th class="th">المعمل</th><th class="th">السيارات</th><th class="th">طن</th><th class="th">لتر</th><th class="th">كغم</th></tr></thead>
    <tbody>${pRows}</tbody></table></div></div>
  <h3 style="font-size:13px;font-weight:900;margin-bottom:8px;color:#6d28d9">📦 المبيعات</h3>
  <div class="card" style="overflow:hidden;padding:0;margin-bottom:14px"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:400px">
    <thead><tr><th class="th-p">ت</th><th class="th-p">المعمل</th><th class="th-p">السيارات</th><th class="th-p">كبان</th><th class="th-p">إجمالي المبلغ</th></tr></thead>
    <tbody>${sRows}</tbody></table></div></div>`;

  // كشف الكروب اليومي
  html += '<h3 style="font-size:13px;font-weight:900;margin-bottom:8px;margin-top:16px;color:#065f46">🏦 الكشف اليومي للكروب</h3>';
  html += renderKroobDailySection(targetDate);

  // كشف سيد رافد اليومي
  html += '<h3 style="font-size:13px;font-weight:900;margin-bottom:8px;margin-top:16px;color:#92400e">💼 كشف حسابات سيد رافد اليومي</h3>';
  html += renderRafidDailySection(targetDate);

  return html;
}

function setThisWeek(){const now=new Date(),day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);S.wFrom=mon.toISOString().split('T')[0];S.wTo=sun.toISOString().split('T')[0];renderContent();}
function setThisMonth(){const now=new Date();S.wFrom=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];S.wTo=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];renderContent();}

function copyWhatsapp(){
  const wf=S.wFrom,wt=S.wTo;
  const analysis=getAnalysis(wf,wt),saleAn=getSaleAnalysis(wf,wt),sf=S.selectedFactory;
  const facts=sf==='الكل'?FACTORIES:[sf];
  const periodLabel=wf&&wt?wf+' → '+wt:wf?'من '+wf:wt?'إلى '+wt:'الكلي';
  let txt=`*📊 الموقف الإجمالي*\n📅 ${periodLabel}\n`;
  txt+=`\n*🛢️ المشتريات:*\n`;
  for(const f of facts){const d=analysis[f].total;if(!d.cars)continue;txt+=`🏭 ${f}: ${d.cars} سيارة | ${fmt(d.tons)} طن | ${fmt(d.liters)} لتر | ${fmt(d.kg)} كغم\n`;}
  txt+=`\n*📦 المبيعات:*\n`;
  for(const f of facts){const d=saleAn[f].total;if(!d.cars)continue;txt+=`🏭 ${f}: ${d.cars} سيارة | ${fmtKaban(d.kaban)} كبان\n`;}
  txt+=`\n✅ نظام المشتريات النفطية v42.0`;
  navigator.clipboard?.writeText(txt).catch(()=>{});
  showToast('تم نسخ الموقف الكامل','success');
}

function copyWhatsappPurchases(){
  const wf=S.wFrom,wt=S.wTo;

function updateProduct(){const r=gv('f_ref'),pt=el('f_pt');if(pt)pt.value=r==='مصفى كربلاء'?'HFO':r==='مصفى صلاح الدين'?'VR':'';}
function calcTotal(){const l=parseFloat(el('f_liters')?.value||0),t=el('f_tot');if(t)t.textContent=fmtM(l*150)+' د.ع';}
function validateQty(inp){
  const raw=(inp.value||'').toString().trim();
  if(!raw)return;
  const v=parseFloat(raw);
  const intPart=Math.floor(Math.abs(v)).toString();
  let warn='';
  if(v>0&&intPart.length<5) warn='⚠️ يجب أن يكون 5 أرقام على الأقل (مثال: 31500)';
  else if(v>0&&intPart.length>5) warn='⚠️ يجب ألا يتجاوز 5 أرقام (مثال: 99999)';
  if(warn){
    inp.style.borderColor='#dc2626';
    inp.style.background='#fef2f2';
    // نعرض رسالة تحذير تحت الحقل
    let msg=inp.nextElementSibling;
    if(!msg||!msg.classList.contains('qty-warn')){
      msg=document.createElement('div');
      msg.className='qty-warn';
      msg.style.cssText='font-size:10px;color:#dc2626;font-weight:700;margin-top:2px';
      inp.parentNode.appendChild(msg);
    }
    msg.textContent=warn;
  } else {
    inp.style.borderColor='';
    inp.style.background='';
    const msg=inp.nextElementSibling;
    if(msg&&msg.classList.contains('qty-warn'))msg.remove();
  }
}

function showDriversList(inputId,carId,locId){
  const drivers=DB.get('drivers',{});
  const list=Object.values(drivers);
  if(!list.length)return;
  const old=document.getElementById('drv-drop');if(old)old.remove();
  const input=el(inputId);if(!input)return;
  const rect=input.getBoundingClientRect();
  const drop=document.createElement('div');
  drop.id='drv-drop';
  drop.style.cssText=`position:fixed;top:${rect.bottom+2}px;right:${window.innerWidth-rect.right}px;width:${rect.width}px;background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:99999;max-height:220px;overflow-y:auto`;
  const filter=(input.value||'').toLowerCase();
  const filtered=filter?list.filter(d=>(d.name||'').toLowerCase().includes(filter)||(d.car_no||'').toLowerCase().includes(filter)):list;
  filtered.forEach(d=>{
    const item=document.createElement('div');
    item.style.cssText='padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9';
    item.innerHTML=`<div style="font-size:13px;font-weight:900;color:#0f172a">${d.name}</div><div style="font-size:10px;color:#64748b;margin-top:2px">🚗 ${d.car_no||'—'} | 📍 ${d.location||'—'}</div>`;
    item.onmouseover=()=>item.style.background='#eff6ff';
    item.onmouseout=()=>item.style.background='';
    item.onmousedown=(ev)=>{ev.preventDefault();input.value=d.name;const c=el(carId),l=el(locId);if(c)c.value=d.car_no||'';if(l)l.value=d.location||'';drop.remove();};
    drop.appendChild(item);
  });
  document.body.appendChild(drop);
  input.oninput=()=>{drop.remove();showDriversList(inputId,carId,locId);};
  input.onblur=()=>setTimeout(()=>{const d=document.getElementById('drv-drop');if(d)d.remove();},200);
}

function saveEntry(){
  const sf=S.selectedFactory,e=S.editEntry||{};
  const v=gv('f_voucher'),date=gv('f_date'),ref=gv('f_ref'),pt=gv('f_pt');
  const driver=gv('f_driver'),car=gv('f_car'),loc=gv('f_loc'),po=gv('f_po');
  const tons=parseFloat(el('f_tons')?.value||0),liters=parseFloat(el('f_liters')?.value||0),kg=parseFloat(el('f_kg')?.value||0);
  const allEntries=DB.get('entries',[]);
  const dupVoucher=allEntries.find(x=>x.voucher_no==v&&x.id!==(e.id||''));
  if(dupVoucher){showToast('رقم البوجر '+v+' موجود مسبقاً!','error');return;}
  if(!v||!date||!ref||!driver||!car||!loc||!po||!liters){showToast('يرجى ملء جميع الحقول (*)','error');return;}
  const entry={id:e.id||('e_'+Date.now()),voucher_no:v,refinery:ref,date,product_type:pt,driver_name:driver,car_no:car,location:loc,qty_tons:tons,natural_liters:liters,weight_kg:kg,po_no:po,price:150,transport_fee:42,refinery_price:150*liters,factory:sf,accountant:currentUser.email,time:Date.now()};
  let entries=DB.get('entries',[]);
  if(e.id){const idx=entries.findIndex(x=>x.id===e.id);if(idx>=0)entries[idx]=entry;else entries.push(entry);}else entries.push(entry);
  DB.set('entries',entries);FDB.save('entries',entry.id,entry);
  let drivers=DB.get('drivers',{});drivers[driver]={name:driver,car_no:car,location:loc};DB.set('drivers',drivers);
  FDB.save('drivers',driver.replace(/\s+/g,'_'),drivers[driver]);
  S.editEntry=null;S.view='table';render();
}

const PAGE_SIZE = 50;
function buildPagination(total, page, pageKey, color='#2563eb'){
  if(total<=PAGE_SIZE) return '';
  const totalPages = Math.ceil(total/PAGE_SIZE);
  if(S[pageKey]>totalPages) S[pageKey]=totalPages;
  const p = S[pageKey];
  let btns='';
  // زر الأول
  btns += `<button onclick="S.${pageKey}=1;renderContent()" style="padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:${p===1?color:'#fff'};color:${p===1?'#fff':'#334155'};font-weight:700;font-size:11px;cursor:pointer">«</button>`;
  // زر السابق
  btns += `<button onclick="if(S.${pageKey}>1){S.${pageKey}--;renderContent();}" style="padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;color:#334155;font-weight:700;font-size:11px;cursor:pointer">‹</button>`;
  // أرقام الصفحات
  let start=Math.max(1,p-2), end=Math.min(totalPages,p+2);
  for(let i=start;i<=end;i++){
    btns+=`<button onclick="S.${pageKey}=${i};renderContent()" style="padding:4px 10px;border-radius:6px;border:1px solid ${i===p?color:'#e2e8f0'};background:${i===p?color:'#fff'};color:${i===p?'#fff':'#334155'};font-weight:700;font-size:11px;cursor:pointer">${i}</button>`;
  }
  // زر التالي
  btns += `<button onclick="if(S.${pageKey}<${totalPages}){S.${pageKey}++;renderContent();}" style="padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;color:#334155;font-weight:700;font-size:11px;cursor:pointer">›</button>`;
  // زر الأخير
  btns += `<button onclick="S.${pageKey}=${totalPages};renderContent()" style="padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:${p===totalPages?color:'#fff'};color:${p===totalPages?'#fff':'#334155'};font-weight:700;font-size:11px;cursor:pointer">»</button>`;
  const from=(p-1)*PAGE_SIZE+1, to=Math.min(p*PAGE_SIZE,total);
  return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f8fafc;border-top:1px solid #e2e8f0;flex-wrap:wrap;gap:8px">
    <span style="font-size:11px;color:#64748b;font-weight:700">عرض ${from}–${to} من ${total} سجل</span>
    <div style="display:flex;gap:4px;flex-wrap:wrap">${btns}</div>
  </div>`;
}

function normalizeCol(col,map){
  const c=(col||'').toString().trim().replace(/\s+/g,' ').replace(/\u200f|\u200e|\u202a|\u202c/g,'');
  // Try exact match first
  if(map[c])return map[c];
  // Then includes match (longer keys first to avoid false positives)
  const keys=Object.keys(map).sort((a,b)=>b.length-a.length);
  for(const k of keys){if(c.includes(k))return map[k];}
  return null;
}
function autoScale(val){var n=parseFloat(val)||0;if(n>0&&n<1000)return n*1000;return n;}
function parseXLDate(d){if(!d)return'';d=d.toString().trim();const m1=d.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);if(m1)return`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;const m2=d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);if(m2)return`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;const m3=d.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{4})$/);if(m3)return`${m3[3]}-${m3[2].padStart(2,'0')}-${m3[1].padStart(2,'0')}`;if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;const n=parseFloat(d);if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);return dt.toISOString().split('T')[0];}return d;}

function previewExcel(file){
  if(!file)return;
  const hrow=parseInt(gv('imp_hrow')||'2'),sheetIdx=parseInt(gv('imp_sheet')||'0');
  const iType=gv('imp_type')||'purchases';
  const map=iType==='sales'?COL_MAP_S:COL_MAP_P;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[sheetIdx]||wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const headers=raw[hrow]||[];
      const colMap={};
      headers.forEach((h,i)=>{const m=normalizeCol(h,map);if(m)colMap[i]=m;});
      importedRows=[];
      for(let r=hrow+1;r<raw.length;r++){
        const row=raw[r];
        if(!row[1]&&!row[2])continue;
        const obj={};
        Object.entries(colMap).forEach(([i,f])=>{obj[f]=row[i];});
        if(!obj.driver_name&&!obj.refinery&&!obj.car_no)continue;
        const hasNums=parseFloat(obj.qty_tons||0)||parseFloat(obj.natural_liters||0)||parseFloat(obj.weight_kg||0)||parseFloat(obj.kaban||0)||parseFloat(obj.qty_liters||0);
        const hasText=(obj.driver_name||'').trim()||(obj.refinery||'').trim()||(obj.car_no||'').toString().trim();
        if(!hasNums&&!hasText)continue;
        importedRows.push(obj);
      }
      const info=el('imp-info');
      if(info)info.innerHTML=`✅ الملف: <b>${file.name}</b> | عدد السجلات: <b>${importedRows.length}</b><br>الأعمدة: <b>${Object.values(colMap).join('، ')}</b>`;
      const prev=el('imp-preview');if(prev)prev.style.display='block';
    }catch(err){showToast('خطأ: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

async function doImport(){
  window._importing=true;
  if(!importedRows.length){window._importing=false;return;}
  const factory=gv('imp_factory'),iType=gv('imp_type')||'purchases';
  let drivers=DB.get('drivers',{}),added=0;
  if(iType==='purchases'){
    let entries=DB.get('entries',[]);
    const newEntries=[];
    importedRows.forEach((row,i)=>{
      const xlTons=autoScale(row.qty_tons),xlLiters=autoScale(row.natural_liters),xlKg=autoScale(row.weight_kg);
      const xlPrice=parseFloat(row.price)||150,xlRefPrice=parseFloat(row.refinery_price)||(xlPrice*xlLiters);
      const dName=(row.driver_name||'').toString().trim(),carNo=(row.car_no||'').toString().trim().replace(/\.0$/,''),loc=(row.location||'').toString().trim();
      const entry={id:'xl_p_'+Date.now()+'_'+i,voucher_no:row.voucher_no||(row._num||String(i+1)),refinery:(row.refinery||'').toString().trim(),date:parseXLDate(row.date),product_type:(row.product_type||'').toString().trim(),driver_name:dName,car_no:carNo,location:loc,qty_tons:xlTons,natural_liters:xlLiters,weight_kg:xlKg,po_no:(row.po_no||'').toString().trim(),price:xlPrice,transport_fee:42,refinery_price:xlRefPrice,factory,accountant:currentUser.email,time:Date.now()+i};
      entries.push(entry);newEntries.push(entry);
      if(dName)drivers[dName]={name:dName,car_no:carNo,location:loc};
      added++;
    });
    entries.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    DB.set('entries',entries);
    for(let i=0;i<newEntries.length;i++) await FDB.save('entries',newEntries[i].id,newEntries[i]);
  }else{
    let sales=DB.get('sales',[]);const newSales=[];
    importedRows.forEach((row,i)=>{
      const dName=(row.driver_name||'').toString().trim(),carNo=(row.car_no||'').toString().trim().replace(/\.0$/,''),loc=(row.location||'').toString().trim();
      const sale={id:'xl_s_'+Date.now()+'_'+i,driver_name:dName,car_no:carNo,date:parseXLDate(row.date),location:loc,address:(row.address||'').toString().trim(),product_type:(row.product_type||'').toString().trim(),kaban:autoScale(row.kaban),qty_liters:autoScale(row.qty_liters),advance:parseFloat(row.advance)||0,received:parseFloat(row.received)||0,car_source:(row.car_source||'').toString().trim(),factory,accountant:currentUser.email,time:Date.now()+i};
      sales.push(sale);newSales.push(sale);

    });

  importedRows=[];window._importing=false;
  setTimeout(()=>{S.view=iType==='sales'?'sale_table':'table';S.selectedFactory=factory;render();},1500);
}

function saveExpense(factory){

function calcKroobBalance(list){const opening=DB.get('kroob_opening',{dinar:0,dollar:0});let balDinar=parseFloat(opening.dinar||0),balDollar=parseFloat(opening.dollar||0);return list.map(e=>{const d=parseFloat(e.amount_dinar||0),dl=parseFloat(e.amount_dollar||0),op=(e.operation_type||'صرف').trim(),com=parseFloat(e.commission||0),commD=parseFloat(e.commission_dollar||0);if(op==='إيداع'||op==='ايداع'){balDinar+=d;balDollar+=dl;}else{balDinar-=d;balDollar-=dl;}balDinar-=com;balDollar-=commD;return{...e,bal_dinar:balDinar,bal_dollar:balDollar};});}

function exportKroobXLSX(){if(typeof XLSX==='undefined')return;const list=getKroobList(),withBal=calcKroobBalance(list),opening=DB.get('kroob_opening',{dinar:0,dollar:0});const rows=[['ت','التاريخ','البيان','الجهة','المستلم','مبلغ دينار','مبلغ دولار','نوع الحركة','العمولة دينار','العمولة دولار','رصيد دينار','رصيد دولار']];rows.push(['رصيد مدور','','','','','',opening.dinar,'','','',(opening.dollar||0)]);withBal.forEach((e,i)=>rows.push([i+1,e.date,e.description,e.beneficiary||'',e.receiver||'',e.amount_dinar||0,e.amount_dollar||0,e.operation_type,e.commission||0,e.commission_dollar||0,e.bal_dinar,e.bal_dollar]));const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:5},{wch:14},{wch:35},{wch:20},{wch:25},{wch:16},{wch:16},{wch:12},{wch:14},{wch:14},{wch:18},{wch:16}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'كروب رافد فيصل');XLSX.writeFile(wb,'كروب_'+today()+'.xlsx');}

function importKroobXLSX(input){
  const file=input.files[0];if(!file||typeof XLSX==='undefined')return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // الأعمدة بالأرقام (index 0-based)
    // Row 0: عنوان الملف + رصيد الدينار[10] رصيد الدولار[12]
    // Row 1: رؤوس الأعمدة
    // Row 2: الرصيد الباقي من الشهر السابق
    // Row 3+: البيانات
    
    // قراءة الرصيد الافتتاحي من Row 0
    let opDinar=0, opDollar=0;
    const row0=rows[0]||[];
    // رصيد الدينار في index 10, رصيد الدولار في index 12 من Row 0
    if(row0[10]&&!isNaN(parseFloat(String(row0[10]).replace(/,/g,''))))
      opDinar=parseFloat(String(row0[10]).replace(/,/g,''));
    if(row0[12]&&!isNaN(parseFloat(String(row0[12]).replace(/,/g,''))))
      opDollar=parseFloat(String(row0[12]).replace(/,/g,''));
    
    // بديل: الرصيد الباقي في Row 2 (index 2) - عمود رصيد الدينار[12] ودولار[11]
    const row2=rows[2]||[];
    const row2str=row2.join('|');
    if(row2str.includes('الرصيد الباقي')||row2str.includes('الباقي من الشهر')){
      const d=parseFloat(String(row2[12]||'').replace(/,/g,''));
      const dl=parseFloat(String(row2[11]||'').replace(/,/g,''));
      if(!isNaN(d)&&d)opDinar=d;
      if(!isNaN(dl)&&dl)opDollar=dl;
    }
    
    console.log('Kroob opening: dinar='+opDinar+' dollar='+opDollar);
    if(opDinar||opDollar){
      DB.set('kroob_opening',{dinar:opDinar,dollar:opDollar});
      FDB.save('kroob_opening','opening',{dinar:opDinar,dollar:opDollar});
    }
    
    // حذف البيانات القديمة
    const oldKroob=DB.get('kroob',[]);
    for(const old of oldKroob){try{FDB.delete('kroob',old.id);}catch(e){}}
    
    let kroob=[],imported=0;
    // البيانات من Row 3 (index 3) فما فوق - نتجاهل صف الرصيد السابق
    for(let r=3;r<rows.length;r++){
      const row=rows[r];
      const num=parseFloat(String(row[0]||''));
      if(!num||isNaN(num))continue;
      
      // قراءة التاريخ
      let date='';
      const rawDate=row[1];
      if(rawDate instanceof Date||typeof rawDate==='object'&&rawDate){
        try{const d=new Date((parseFloat(String(rawDate))-25569)*86400*1000);date=d.toISOString().split('T')[0];}catch(e){}
      }
      if(!date){
        const ds=String(rawDate||'').trim();
        const m1=ds.match(/^(\d{4})-(\d{2})-(\d{2})/);
        const m2=ds.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        if(m1)date=m1[1]+'-'+m1[2]+'-'+m1[3];
        else if(m2)date=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
        else{const n=parseFloat(ds);if(!isNaN(n)&&n>40000){const d2=new Date((n-25569)*86400*1000);date=d2.toISOString().split('T')[0];}}
      }
      
      const desc=String(row[2]||'').trim();
      const benef=String(row[3]||'').trim();
      const recv=String(row[4]||'').trim();
      // المبالغ
      const dolarMblgh=parseFloat(String(row[5]||'').replace(/,/g,''))||0;
      const dinarMblgh=parseFloat(String(row[6]||'').replace(/,/g,''))||0;
      const dainDol=parseFloat(String(row[7]||'').replace(/,/g,''))||0;
      const madinDol=parseFloat(String(row[8]||'').replace(/,/g,''))||0;
      const dainDin=parseFloat(String(row[9]||'').replace(/,/g,''))||0;
      const madinDin=parseFloat(String(row[10]||'').replace(/,/g,''))||0;
      const opType=String(row[13]||'').trim();
      const commDinar=parseFloat(String(row[14]||'').replace(/,/g,''))||0;
      const commDollar=parseFloat(String(row[15]||'').replace(/,/g,''))||0;
      
      // تحديد المبلغ والاتجاه
      const amount_dinar=dainDin||madinDin||dinarMblgh||0;
      const amount_dollar=dainDol||madinDol||dolarMblgh||0;
      // النوع: إيداع إذا كان دائن، صرف إذا كان مدين
      const isDeposit=dainDin>0||(opType&&(opType.includes('إيداع')||opType.includes('ايداع')));
      const operation_type=isDeposit?'إيداع':(opType||'صرف');
      
      if(!amount_dinar&&!amount_dollar&&!desc)continue;
      
      const id='kr_xl_'+r+'_'+Date.now();
      kroob.push({id,date,description:desc,operation_type,beneficiary:benef,receiver:recv,
        amount_dinar,amount_dollar,commission:commDinar,commission_dollar:commDollar,
        accountant:'import',time:Date.now()+r});
      imported++;
    }
    
    kroob.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));
    DB.set('kroob',kroob);
    DB.set('kroob_cleared',false);
    for(let i=0;i<kroob.length;i++)FDB.save('kroob',kroob[i].id,kroob[i]);
    showToast('تم استيراد '+imported+' حركة — الرصيد: '+opDinar.toLocaleString()+' د.ع','success');
    input.value='';
    renderContent();
  };
  reader.readAsArrayBuffer(file);
}

function calcRafidBalance(list){const opening=DB.get('rafid_opening',{dinar:0,dollar:0});let balDinar=parseFloat(opening.dinar||0),balDollar=parseFloat(opening.dollar||0);return list.map(e=>{const d=parseFloat(e.dinar||0),dl=parseFloat(e.dollar||0),com=parseFloat(e.commission||0),commD=parseFloat(e.commission_dollar||0),tdD=(e.type_dinar||'مدين').trim(),tdDol=(e.type_dollar||'مدين').trim();if(tdD==='دائن')balDinar+=d;else balDinar-=d;if(tdDol==='دائن')balDollar+=dl;else balDollar-=dl;balDinar-=com;balDollar-=commD;return{...e,bal_dinar:balDinar,bal_dollar:balDollar};});}

function saveRafid(){
  const date=gv('rf_date'),desc=gv('rf_desc'),benef=gv('rf_benef'),recv=gv('rf_recv'),opType=document.getElementById('rf_type')?.value||'';
  const dinar=parseFloat(document.getElementById('rf_dinar')?.value||0),typeDin=document.getElementById('rf_type_dinar')?.value||'مدين';
  const dollar=parseFloat(document.getElementById('rf_dollar')?.value||0),typeDol=document.getElementById('rf_type_dollar')?.value||'مدين';
  const comm=parseFloat(document.getElementById('rf_comm')?.value||0),commD=parseFloat(document.getElementById('rf_comm_d')?.value||0);
  if(!desc){showToast('يرجى كتابة البيان','error');return;}
  let list=DB.get('rafid_accounts',[]);const editId=S.rafidEditId||'';
  const entry={id:editId||('rf_'+Date.now()),date,description:desc,beneficiary:benef,receiver:recv,op_type:opType,dinar,type_dinar:typeDin,dollar,type_dollar:typeDol,commission:comm,commission_dollar:commD,accountant:currentUser.email,time:Date.now()};
  if(editId){const idx=list.findIndex(e=>e.id===editId);if(idx>=0)list[idx]=entry;else list.push(entry);}else list.push(entry);
  list.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||0)-(b.time||0));
  DB.set('rafid_accounts',list);FDB.save('rafid_accounts',entry.id,entry);S.rafidEditId='';
  showToast('تم الحفظ','success');
  setTimeout(()=>renderContent(),500);
}

function importRafidXLSX(input){
  const file=input.files[0];if(!file||typeof XLSX==='undefined')return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    
    // قراءة الرصيد الافتتاحي بدقة
    // هيكل الملف:
    // Row 0: عنوان | col11=رصيد الدينار النهائي | col13=رصيد الدولار النهائي
    // Row 1: رؤوس الأعمدة
    // Row 2: فارغ أو صفر
    // Row 3: "الباقي من شهر X" | col10=مدين دينار | col11=رصيد دولار | col12=رصيد دينار (سالب)
    // Row 4+: البيانات
    let opDinar=0, opDollar=0;
    
    // البحث عن صف "الباقي" في الصفوف الأولى (3-7)
    for(let ri=2;ri<Math.min(rows.length,8);ri++){
      const row=rows[ri];
      const rowStr=row.map(v=>String(v||'')).join('|');
      if(rowStr.includes('الباقي')||rowStr.includes('السابق')||rowStr.includes('مدور')){
        // col12 = رصيد الدينار (القيمة السالبة = مدين)
        const balD=parseFloat(String(row[12]||'').replace(/,/g,''));
        const balDol=parseFloat(String(row[11]||'').replace(/,/g,''));
        if(!isNaN(balD)) opDinar=balD; // نأخذ القيمة كما هي (سالبة أو موجبة)
        if(!isNaN(balDol)) opDollar=balDol;
        console.log('Rafid opening from row '+ri+': dinar='+opDinar+' dollar='+opDollar);
        break;
      }
    }
    
    // إذا لم نجد صف "الباقي" - نأخذ من Row 0
    if(opDinar===0){
      const row0=rows[0]||[];
      // col11 = رصيد الدينار, col13 = رصيد الدولار
      const d0=parseFloat(String(row0[11]||'').replace(/,/g,''));
      const dl0=parseFloat(String(row0[13]||'').replace(/,/g,''));
      if(!isNaN(d0)&&d0) opDinar=d0;
      if(!isNaN(dl0)) opDollar=dl0;
    }
    
    console.log('Rafid opening final: dinar='+opDinar+' dollar='+opDollar);
    DB.set('rafid_opening',{dinar:opDinar,dollar:opDollar});
    if(window._fbReady)FDB.save('rafid_opening','opening',{dinar:opDinar,dollar:opDollar});
    
    let list=[],imported=0;
    // البيانات من Row 4 (index 4) - نتجاهل صفوف الرصيد السابق
    const dataStartRow=4; // بعد الرأس وصف الباقي
    for(let r=dataStartRow;r<rows.length;r++){
      const row=rows[r];
      const num=parseFloat(String(row[0]||''));
      if(!num||isNaN(num))continue;
      
      // التاريخ
      let date='';
      const rawDate=row[1];
      if(rawDate instanceof Date){
        date=rawDate.toISOString().split('T')[0];
      } else {
        const ds=String(rawDate||'').trim();
        const m1=ds.match(/^(\d{4})-(\d{2})-(\d{2})/);
        const m2=ds.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        if(m1)date=m1[1]+'-'+m1[2]+'-'+m1[3];
        else if(m2)date=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');
        else{const n=parseFloat(ds);if(!isNaN(n)&&n>40000){const d2=new Date((n-25569)*86400*1000);date=d2.toISOString().split('T')[0];}}
      }
      
      const desc=String(row[2]||'').trim();
      const benef=String(row[3]||'').trim();
      const recv=String(row[4]||'').trim();
      
      // المبالغ - من الأعمدة المباشرة
      const dainDol=parseFloat(String(row[7]||'').replace(/,/g,''))||0;
      const madinDol=parseFloat(String(row[8]||'').replace(/,/g,''))||0;
      const dainDin=parseFloat(String(row[9]||'').replace(/,/g,''))||0;
      const madinDin=parseFloat(String(row[10]||'').replace(/,/g,''))||0;
      const opType=String(row[13]||'').trim();
      // العمولات - الأعمدة 14 و 15
      const commDinar=parseFloat(String(row[14]||'').replace(/,/g,''))||0;
      const commDollar=parseFloat(String(row[15]||'').replace(/,/g,''))||0;
      
      if(!dainDin&&!madinDin&&!dainDol&&!madinDol&&!desc)continue;
      
      const dinar=dainDin||madinDin||0;
      const dollar=dainDol||madinDol||0;
      
      const entry={
        id:'rf_xl_'+r+'_'+Date.now(),
        date, description:desc, beneficiary:benef, receiver:recv,
        op_type:opType,
        dinar, type_dinar:dainDin>0?'دائن':'مدين',
        dollar, type_dollar:dainDol>0?'دائن':'مدين',
        commission:commDinar, commission_dollar:commDollar,
        accountant:'import', time:Date.now()+r
      };
      list.push(entry);
      FDB.save('rafid_accounts',entry.id,entry);
      imported++;
    }
    
    list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    DB.set('rafid_accounts',list);
    DB.set('rafid_cleared',false);
    showToast('تم استيراد '+imported+' حركة — الرصيد: '+opDinar.toLocaleString()+' د.ع','success');
    input.value='';
    renderContent();
  };
  reader.readAsArrayBuffer(file);
}

// ===== حساب المصفى =====
const REFINERY_PRICE_PER_TON = 42000;

// جلب مبالغ المصفى من سجلات الكروب
// يبحث في عمود البيان عن أي نص يذكر حوالة/صرف + اسم المصفى
function getKroobRefineryPayments(refineryName){
  const kroob=DB.get('kroob',[]);
  // مجموع المدفوعات لكل تاريخ  
  const byDate={};
  // الحركات المطابقة (لعرضها في الجدول)
  const details={};

  // كلمات تدل على المصفى
  const isKarbala = (refineryName||'').trim()==='مصفى كربلاء';
  const refWords = isKarbala
    ? ['كربلاء','مصفى كربلاء','كربلاء']
    : ['صلاح الدين','صلاح','مصفى صلاح'];

  kroob.forEach(k=>{
    const desc=(k.description||k.description||'');
    const descLow=desc.toLowerCase();
    // شرط 1: يذكر حوالة أو صرف
    const isTransfer=(descLow.includes('حوالة')||descLow.includes('حواله')||descLow.includes('صرف'));
    // شرط 2: يذكر اسم المصفى
    const isRefinery=refWords.some(w=>desc.includes(w));
    if(isTransfer&&isRefinery){
      const date=k.date||'';
      const amt=parseFloat(k.amount_dinar||0);
      if(!byDate[date])byDate[date]=0;
      byDate[date]+=amt;
      if(!details[date])details[date]=[];
      details[date].push({desc,amt,date});
    }
  });
  return {byDate, details};
}

function sendRefineryWhatsapp(){
  var entries=DB.get('entries',[]);
  var wf=S.wFrom,wt=S.wTo;
  var NL='\n';
  var periodLabel=wf&&wt?(wf+' -> '+wt):wf?('من '+wf):wt?('إلى '+wt):'الكلي';
  var sep='─────────────────────────';
  var lines=[];
  lines.push('🏭 حساب المصفى');
  lines.push('📅 الفترة: '+periodLabel);
  lines.push(sep);
  var refineries=['مصفى كربلاء','مصفى صلاح الدين'];
  refineries.forEach(function(ref){
    var list=entries.filter(function(e){return e.refinery===ref;});
    if(wf)list=list.filter(function(e){return e.date>=wf;});
    if(wt)list=list.filter(function(e){return e.date<=wt;});
    if(!list.length)return;
    var totalTons=list.reduce(function(s,e){return s+parseFloat(e.qty_tons||0);},0);
    var grandAmount=Math.round(totalTons*REFINERY_PRICE_PER_TON);
    var kroobData=getKroobRefineryPayments(ref);
    var grandReceived=Object.values(kroobData.byDate).reduce(function(s,v){return s+v;},0);
    var grandRemaining=grandAmount-grandReceived;
    lines.push('');
    lines.push('🏭 *'+ref+'*');
    lines.push('🚛 السيارات: '+list.length);
    lines.push('⚖️ الطن: '+fmt(totalTons));
    lines.push('💰 المبلغ المستحق: '+fmtM(grandAmount)+' د.ع');
    lines.push('✅ المستلم: '+fmtM(grandReceived)+' د.ع');
    lines.push((grandRemaining>0?'⚠️':'✅')+' المتبقي: '+fmtM(Math.abs(grandRemaining))+' د.ع '+(grandRemaining>0?'(غير مسوى)':'(مسوى)'));
    lines.push(sep);
  });
  lines.push('✅ نظام المشتريات النفطية v42.0');
  var msg=lines.join(NL);
  var phone='9647703277743';
  var encoded=encodeURIComponent(msg);
  window.open('https://wa.me/'+phone+'?text='+encoded,'_blank');
}

async function addUser(){
  const email=gv('new_email'),pass=gv('new_pass'),role=gv('new_role'),factory=gv('new_factory_sel');
  if(!email||!pass){showToast('البريد وكلمة السر مطلوبان','error');return;}
  if(pass.length<6){showToast('كلمة السر يجب أن تكون 6 أحرف على الأقل','error');return;}
  const addBtn=document.querySelector('button[onclick="addUser()"]');
  if(addBtn){addBtn.textContent='⏳ جاري الإنشاء...';addBtn.disabled=true;}
  try{
    // إنشاء حساب Firebase Auth
    if(window._auth){
      const {auth,createUserWithEmailAndPassword:cup}=window._auth;
      await cup(auth,email,pass);
    }
    // حفظ بيانات المستخدم في Firestore
    const k=uid(email);
    const hash=await hashPassword(pass);
    let users=DB.get('users',{});
    users[k]={email,password:hash,role,factory,createdAt:Date.now()};
    DB.set('users',users);
    await FDB.save('users',k,users[k]);
    showToast('✅ تم إنشاء الحساب في Firebase Auth وحفظ بياناته','success');
    setTimeout(()=>{if(addBtn){addBtn.textContent='إضافة المستخدم';addBtn.disabled=false;}renderContent();},800);
  } catch(err){
    let msg='خطأ في إنشاء الحساب';
    if(err.code==='auth/email-already-in-use')msg='هذا البريد مسجل مسبقاً في Firebase Auth';
    else if(err.code==='auth/weak-password')msg='كلمة السر ضعيفة جداً';
    else if(err.code==='auth/invalid-email')msg='البريد الإلكتروني غير صحيح';
    showToast(msg,'error');
    if(addBtn){addBtn.textContent='إضافة المستخدم';addBtn.disabled=false;}
  }
}

async function clearTypeData(factory,type){
  const typeLabel=type==='purchases'?'المشتريات':'المبيعات';
  if(!confirm('مسح '+typeLabel+' لمعمل: '+factory+'?'))return;
  if(!confirm('تأكيد نهائي: مسح '+typeLabel+' لـ "'+factory+'" ؟'))return;
  
  const col=type==='purchases'?'entries':'sales';
  const key=type==='purchases'?'entries':'sales';
  
  // خطوة 1: مسح من localStorage أولاً
  const localData=DB.get(key,[]);
  const toDelete=localData.filter(x=>x.factory===factory);
  const remaining=localData.filter(x=>x.factory!==factory);
  DB.set(key,remaining);
  
  // خطوة 2: مسح من Firebase
  let fbDeleted=0;
  if(window._fbReady){
    try{
      const {db,collection:col2,getDocs,deleteDoc,doc}=window._fb;
      const snap=await getDocs(col2(db,col));
      const toDelFB=snap.docs.filter(d=>d.data().factory===factory);
      fbDeleted=toDelFB.length;
      // حذف على دفعات
      const batchSize=20;
      for(let i=0;i<toDelFB.length;i+=batchSize){
        const batch=toDelFB.slice(i,i+batchSize);
        await Promise.all(batch.map(d=>deleteDoc(doc(db,col,d.id))));
      }
      console.log('✅ Firebase deleted:',fbDeleted,'from',factory);
    }catch(e){console.warn('Firebase delete error:',e);}
  }
  
  showToast('تم مسح '+toDelete.length+' سجل من '+factory,'success');
  renderContent();
}

function exportFullBackup(){
  const keys=['entries','sales','drivers','salaf','expenses','expenses_settlement','kroob','kroob_opening','rafid_accounts','rafid_opening','factories','users','refinery_received'];
  const backup={version:'v42.0',date:today(),exported:new Date().toISOString(),data:{}};
  keys.forEach(k=>{ backup.data[k]=DB.get(k,null); });
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='oil_backup_'+today()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('✅ تم تصدير النسخة الاحتياطية الكاملة','success');
}

function importFullBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const backup=JSON.parse(e.target.result);
      // دعم صيغتين: {data:{...}} أو {...} مباشرة
      const d=backup.data||backup;
      if(!d.entries&&!d.sales&&!d.kroob&&!d.rafid_accounts){showToast('الملف غير صالح أو لا يحتوي بيانات','error');return;}
      let total=0;
      if(d.entries&&d.entries.length)     {DB.set('entries',d.entries);   d.entries.forEach(x=>FDB.save('entries',x.id,x));   total+=d.entries.length;}
      if(d.sales&&d.sales.length)         {DB.set('sales',d.sales);       d.sales.forEach(x=>FDB.save('sales',x.id,x));       total+=d.sales.length;}
      if(d.drivers)                        DB.set('drivers',d.drivers);
      if(d.factories&&d.factories.length) {FACTORIES.length=0;d.factories.forEach(f=>FACTORIES.push(f));DB.set('factories',FACTORIES);}
      if(d.kroob&&d.kroob.length)         {DB.set('kroob',d.kroob);       d.kroob.forEach(x=>FDB.save('kroob',x.id,x));       total+=d.kroob.length;}
      if(d.kroob_opening)                 {DB.set('kroob_opening',d.kroob_opening);FDB.save('kroob_opening','opening',d.kroob_opening);}
      if(d.salaf&&d.salaf.length)         {DB.set('salaf',d.salaf);       d.salaf.forEach(x=>FDB.save('salaf',x.id,x));       total+=d.salaf.length;}
      if(d.expenses&&d.expenses.length)   {DB.set('expenses',d.expenses); d.expenses.forEach(x=>FDB.save('expenses',x.id,x)); total+=d.expenses.length;}
      if(d.expenses_settlement)            DB.set('expenses_settlement',d.expenses_settlement);
      if(d.rafid_accounts&&d.rafid_accounts.length){DB.set('rafid_accounts',d.rafid_accounts);d.rafid_accounts.forEach(x=>FDB.save('rafid_accounts',x.id,x));total+=d.rafid_accounts.length;}
      if(d.rafid_opening)                 {DB.set('rafid_opening',d.rafid_opening);FDB.save('rafid_opening','opening',d.rafid_opening);}
      if(d.refinery_received)              DB.set('refinery_received',d.refinery_received);
      const dateLabel=(backup.date||backup.exported||'').split('T')[0]||'غير معروف';
      const msg='✅ تم استعادة '+total+' سجل — تاريخ النسخة: '+dateLabel;
      showToast(msg,'success',5000);
      input.value='';
      setTimeout(()=>render(),1800);
    }catch(err){showToast('خطأ في قراءة الملف: '+err.message,'error');}
  };
  reader.readAsText(file);
}

let _autoSyncTimer = null;
const AUTO_SYNC_INTERVAL = 60 * 60 * 1000; // ساعة واحدة

function startAutoSync(){
  if(_autoSyncTimer) clearInterval(_autoSyncTimer);
  _autoSyncTimer = setInterval(async ()=>{
    if(!currentUser||!window._fbReady) return;
    console.log('🔄 مزامنة تلقائية...');
    await syncAllToFirebase(true);
  }, AUTO_SYNC_INTERVAL);
  console.log('✅ المزامنة التلقائية مفعّلة (كل ساعة)');
}

function updateSyncBadge(text, color){

// ===== رفع كل البيانات إلى Firebase =====
async function syncAllToFirebase(silent=false){
  if(!window._fbReady){if(!silent)showToast('Firebase غير متصل','error');return;}
  const btn=document.getElementById('sync-fb-btn');
  if(btn&&!silent){btn.textContent='⏳ جاري الرفع...';btn.disabled=true;}
  updateSyncBadge('☁️ جاري...','#0891b2');
  let total=0,errors=0;
  try{
    const entries=DB.get('entries',[]);
    for(const x of entries){try{await FDB.save('entries',x.id,x);total++;}catch(e){errors++;}}

    const sales=DB.get('sales',[]);
    for(const x of sales){try{await FDB.save('sales',x.id,x);total++;}catch(e){errors++;}}

    const salaf=DB.get('salaf',[]);
    for(const x of salaf){try{await FDB.save('salaf',x.id,x);total++;}catch(e){errors++;}}

    const expenses=DB.get('expenses',[]);
    for(const x of expenses){try{await FDB.save('expenses',x.id,x);total++;}catch(e){errors++;}}

    const kroob=DB.get('kroob',[]);
    for(const x of kroob){try{await FDB.save('kroob',x.id,x);total++;}catch(e){errors++;}}

    const rafid=DB.get('rafid_accounts',[]);
    for(const x of rafid){try{await FDB.save('rafid_accounts',x.id,x);total++;}catch(e){errors++;}}

    const kroobOp=DB.get('kroob_opening',null);
    if(kroobOp){try{await FDB.save('kroob_opening','opening',kroobOp);total++;}catch(e){errors++;}}

    const rafidOp=DB.get('rafid_opening',null);
    if(rafidOp){try{await FDB.save('rafid_opening','opening',rafidOp);total++;}catch(e){errors++;}}

    const drivers=DB.get('drivers',{});
    for(const[k,v] of Object.entries(drivers)){try{await FDB.save('drivers',k.replace(/\s+/g,'_'),v);total++;}catch(e){errors++;}}

    const now=new Date();
    const timeStr=[now.getHours(),now.getMinutes()].map(v=>String(v).padStart(2,'0')).join(':');
    DB.set('last_sync_time',timeStr+' '+today());
    updateSyncBadge('☁️ '+timeStr, errors?'#d97706':'#059669');

    const msg=errors?`☁️ مزامنة: ${total} سجل ⚠️ ${errors} خطأ`:`☁️ مزامنة: ${total} سجل — ${timeStr}`;
    if(!silent) showToast(msg,errors?'warning':'success',4000);
    else showToast(msg,'info',3000);
  }catch(e){
    updateSyncBadge('☁️ خطأ','#dc2626');
    if(!silent)showToast('خطأ: '+e.message,'error');
  }
  if(btn&&!silent){btn.textContent='☁️ رفع كل البيانات إلى Firebase';btn.disabled=false;}
}

// ===== إدارة الصلاحيات =====
const ALL_PERMS=['salaf','expenses','kroob','table','sale_table','reports','import_p','import_s'];
const PERM_LABELS={'salaf':'💰 السلف','expenses':'📋 المصاريف','kroob':'🏦 الكروب','table':'📋 سجل المشتريات','sale_table':'📋 سجل المبيعات','reports':'📄 التقارير','import_p':'📥 استيراد المشتريات','import_s':'📥 استيراد المبيعات'};

function viewPermissions(){
  const users=DB.get('users',{});
  const accountants=Object.entries(users).filter(([k,u])=>u.role!=='manager');
  const cards=accountants.map(([k,u])=>{
    const perms=u.permissions||[];
    const checks=ALL_PERMS.map(p=>`<label style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;cursor:pointer;background:${perms.includes(p)?'#ecfdf5':'#f8fafc'};border:1px solid ${perms.includes(p)?'#6ee7b7':'#e2e8f0'}"><input type="checkbox" ${perms.includes(p)?'checked':''} onchange="togglePerm('${k}','${p}',this.checked)"> <span style="font-size:12px;font-weight:700;color:#1a3a5c">${PERM_LABELS[p]||p}</span></label>`).join('');
    return`<div class="card" style="border-right:5px solid #7c3aed;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><div style="font-weight:900;font-size:13px">${u.email}</div><div style="font-size:11px;color:#64748b">معمل: ${u.factory||'الكل'}</div></div><span class="badge" style="background:#f5f3ff;color:#7c3aed">محاسب</span></div><div style="display:flex;gap:8px;flex-wrap:wrap">${checks}</div><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-green" style="font-size:11px;padding:5px 12px" onclick="grantAll('${k}')">✅ كل الصلاحيات</button><button class="btn btn-red" style="font-size:11px;padding:5px 12px" onclick="revokeAll('${k}')">❌ سحب الكل</button></div></div>`;}).join('');
  return`<h2 style="font-size:15px;font-weight:900;margin-bottom:16px;color:#6d28d9">🔐 إدارة الصلاحيات</h2>${accountants.length?cards:'<div class="card" style="text-align:center;color:#94a3b8;padding:30px">لا يوجد محاسبون</div>'}`;
}

function togglePerm(userId,perm,checked){let users=DB.get('users',{});if(!users[userId])return;let perms=users[userId].permissions||[];if(checked){if(!perms.includes(perm))perms.push(perm);}else{perms=perms.filter(p=>p!==perm);}users[userId].permissions=perms;DB.set('users',users);FDB.save('users',userId,users[userId]);}
function grantAll(userId){let users=DB.get('users',{});if(!users[userId])return;users[userId].permissions=[...ALL_PERMS];DB.set('users',users);FDB.save('users',userId,users[userId]);renderContent();}
function revokeAll(userId){let users=DB.get('users',{});if(!users[userId])return;users[userId].permissions=[];DB.set('users',users);FDB.save('users',userId,users[userId]);renderContent();}

// ===== إشعارات =====
function initNotifications(){const badge=el('notif-badge');if(!badge)return;const all=DB.get('notifs',[]);const unread=all.filter(n=>!n.read);badge.style.display=unread.length?'flex':'none';badge.textContent=unread.length;}
function toggleNotif(){const panel=document.getElementById('notif-panel');if(panel){panel.remove();return;}const all=DB.get('notifs',[]).slice().reverse().slice(0,10);const items=all.map(n=>`<div class="notif-item" style="background:${n.read?'#f8fafc':'#eff6ff'}"><div style="font-size:12px;font-weight:700">${n.title}</div><div style="font-size:11px;color:#64748b">${n.msg||''}</div><div style="font-size:10px;color:#94a3b8;margin-top:3px">${new Date(n.time).toLocaleString('ar-IQ')}</div></div>`).join('');const np=document.createElement('div');np.id='notif-panel';np.className='notif-panel';np.innerHTML=`<div style="padding:12px 16px;background:#0f172a;color:#fff;font-weight:900;font-size:13px;display:flex;justify-content:space-between;align-items:center">🔔 الإشعارات<button onclick="clearNotifs()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:11px">مسح الكل</button></div><div style="overflow-y:auto;max-height:320px">${items||'<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">لا توجد إشعارات</div>'}</div>`;document.body.appendChild(np);all.forEach(n=>n.read=true);DB.set('notifs',all.reverse());initNotifications();}
function addNotif(title,msg){const all=DB.get('notifs',[]);all.push({id:'n_'+Date.now(),title,msg,time:Date.now(),read:false});DB.set('notifs',all.slice(-50));initNotifications();}
function clearNotifs(){DB.set('notifs',[]);const p=document.getElementById('notif-panel');if(p)p.remove();initNotifications();}

// ===== قائمة السائقين =====
function showDriversList(inputId,carId,locId){
  const drivers=DB.get('drivers',{});const list=Object.values(drivers);if(!list.length)return;
  const old=document.getElementById('drv-drop');if(old)old.remove();
  const input=el(inputId);if(!input)return;
  const rect=input.getBoundingClientRect();
  const drop=document.createElement('div');
  drop.id='drv-drop';
  drop.style.cssText=`position:fixed;top:${rect.bottom+2}px;right:${window.innerWidth-rect.right}px;width:${Math.max(rect.width,200)}px;background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:99999;max-height:220px;overflow-y:auto;`;
  const filter=(input.value||'').toLowerCase();
  const filtered=filter?list.filter(d=>(d.name||'').toLowerCase().includes(filter)||(d.car_no||'').toLowerCase().includes(filter)):list;
  if(!filtered.length){const empty=document.createElement('div');empty.style.cssText='padding:12px;text-align:center;color:#94a3b8;font-size:12px';empty.textContent='لا توجد نتائج';drop.appendChild(empty);}
  filtered.slice(0,50).forEach(d=>{
    const item=document.createElement('div');item.style.cssText='padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9';
    item.innerHTML=`<div style="font-size:13px;font-weight:900;color:#0f172a">${d.name||''}</div><div style="font-size:10px;color:#64748b;margin-top:2px">🚗 ${d.car_no||'—'} | 📍 ${d.location||'—'}</div>`;
    item.onmouseover=()=>item.style.background='#eff6ff';item.onmouseout=()=>item.style.background='';
    item.onmousedown=(ev)=>{ev.preventDefault();input.value=d.name||'';const c=el(carId),l=el(locId);if(c)c.value=d.car_no||'';if(l)l.value=d.location||'';drop.remove();};
    drop.appendChild(item);
  });
  document.body.appendChild(drop);
  input.addEventListener('input',()=>{drop.remove();showDriversList(inputId,carId,locId);},{once:true});
  input.addEventListener('blur',()=>setTimeout(()=>{const d=document.getElementById('drv-drop');if(d)d.remove();},200),{once:true});
}

// ===== تسجيل الدخول =====
function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)">
    <div style="background:#fff;border-radius:20px;padding:40px;width:360px;box-shadow:0 25px 60px rgba(0,0,0,.3)">
      <div style="text-align:center;margin-bottom:28px">
        <div style="width:60px;height:60px;background:#2563eb;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;margin:0 auto 12px">OIL</div>
        <h2 style="font-size:18px;font-weight:900;color:#0f172a">نظام المشتريات النفطية v42.0</h2>
        <p style="font-size:12px;color:#94a3b8;margin-top:4px">إدارة المشتريات النفطية</p>
      </div>
      <div style="margin-bottom:14px"><label class="lbl">📧 البريد الإلكتروني</label><input class="inp" id="login_email" type="email" placeholder="user@example.com" value="fadel.manger@gmail.com" style="font-size:14px"></div>
      <div style="margin-bottom:20px"><label class="lbl">🔐 كلمة السر</label><input class="inp" id="login_pass" type="password" placeholder="••••••••" value="admin123" style="font-size:14px" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-blue" style="width:100%;padding:12px;font-size:15px" onclick="doLogin()">🚀 تسجيل الدخول</button>
      <div style="margin-top:10px;background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:10px;color:#1e40af;font-weight:700;text-align:center">🔐 مؤمّن بـ Firebase Authentication</div>
    </div>
  </div>`;
}

async function doLogin(){
  const email=gv('login_email'),pass=gv('login_pass');
  if(!email||!pass){showToast('يرجى إدخال البريد وكلمة السر','error');return;}
  const loginBtn=document.querySelector('button[onclick="doLogin()"]');
  if(loginBtn){loginBtn.textContent='⏳ جاري التحقق...';loginBtn.disabled=true;}
  try{
    // Firebase Auth أولاً
    if(window._auth){
      const {auth,signInWithEmailAndPassword:sip}=window._auth;
      await sip(auth,email,pass);
    }
    // بعد نجاح Firebase Auth، نحمّل بيانات المستخدم من localStorage/Firestore
    const users=DB.get('users',{});const k=uid(email);
    let user=users[k];
    if(!user){
      // حاول جلبه من Firebase
      const fbUsers=await FDB.getAll('users');
      if(fbUsers){const found=fbUsers.find(u=>u.email===email);if(found){user=found;const obj={};fbUsers.forEach(u=>{if(u.email)obj[uid(u.email)]=u;});DB.set('users',obj);}}
    }
    if(!user){showToast('المستخدم غير موجود في النظام — راجع المدير','error');if(loginBtn){loginBtn.textContent='🚀 تسجيل الدخول';loginBtn.disabled=false;}return;}
    currentUser={...user,uid:k};
    S.selectedFactory=user.factory==='الكل'?'الكل':(user.factory||'الكل');
    DB.set('last_user',currentUser);
    if(isManager())syncFromCloud().then(()=>render());
    else render();
  } catch(err){
    let msg='خطأ في تسجيل الدخول';
    if(err.code==='auth/user-not-found'||err.code==='auth/invalid-credential')msg='البريد الإلكتروني أو كلمة السر غير صحيحة';
    else if(err.code==='auth/wrong-password')msg='كلمة السر غير صحيحة';
    else if(err.code==='auth/too-many-requests')msg='تم حظر الحساب مؤقتاً — حاول لاحقاً';
    else if(err.code==='auth/network-request-failed')msg='تحقق من الاتصال بالإنترنت';
    showToast(msg,'error');
    if(loginBtn){loginBtn.textContent='🚀 تسجيل الدخول';loginBtn.disabled=false;}
  }
}

function logout(){
  // Firebase Auth signOut
  if(window._auth){try{window._auth.signOut(window._auth.auth);}catch(e){}}
  currentUser=null;DB.set('last_user',null);
  S={view:'dashboard',selectedFactory:'الكل',filterFrom:'',filterTo:'',editEntry:null,editSale:null,wFrom:'',wTo:'',pSearch:'',pRefinery:'',pType:'',sSearch:'',sTypeFilter:'',salafPerson:'',salafEditId:'',expFactory:'',expEditId:'',expDate:'',expDinar:0,expDollar:0,expDetails:'',kroobEditId:'',rafidEditId:''};
  renderLogin();
}

// ===== التشغيل الرئيسي =====
document.addEventListener('fb-ready', function(){
  const lastUser=DB.get('last_user',null);
  if(lastUser&&lastUser.email){currentUser=lastUser;if(isManager())syncFromCloud().then(()=>render());else render();}
  else renderLogin();
  // مزامنة المعامل من Firebase
  FDB.getAll('users').then(users=>{if(users&&users.length){const obj={};users.forEach(u=>{if(u.email)obj[uid(u.email)]=u;});const local=DB.get('users',{});const merged={...obj,...local};DB.set('users',merged);}});
});

// تشغيل فوري لو Firebase تأخر
setTimeout(()=>{
  if(!window._fbReady){const lastUser=DB.get('last_user',null);if(lastUser&&lastUser.email){currentUser=lastUser;render();}else renderLogin();}
},3000);
</script>
